function buildRecordGroup(groupTitle, children) {
  const group = document.createElement('div');
  group.className = 'record-group';
  const heading = document.createElement('div');
  heading.className = 'record-group-title';
  heading.textContent = groupTitle;
  group.appendChild(heading);
  children.forEach((child) => group.appendChild(child));
  return group;
}

function buildSketchSections() {
  const wrap = document.createElement('div');
  const sketch = state.current.sketch;

  wrap.appendChild(buildRecordGroup('실루엣 · 넥라인 · 소매', VISUAL_CATEGORIES.map(({ key, order, title, thumb }) =>
    buildChipSection(
      title, order, sketch[key], LABEL.ko[key],
      (id) => updateSketchField(key, id), thumb,
      sketch.custom[key], (v) => updateCustomText(key, v),
    ),
  )));

  // 파츠별로 원단(소재)과 오버레이(장식)를 따로 고른다 (사용자 요청) — 참고 메모+이미지
  // (textureRef)로 목록에 없는 원단을 자유롭게 남길 수 있어서, 원단의 "기타" 칩은 굳이
  // 안 두기로 함. MATERIAL_ORDER 자체는 인코딩 호환성 때문에 그대로 두고 칩 렌더링에서만 제외한다
  const materialChildren = [];
  MATERIAL_CATEGORIES.forEach(({ key, refKey, title, materialOrder }, i) => {
    // 민소매면 소매 자체가 안 그려지니(소매 원단/오버레이가 렌더링에 전혀 영향을 못 준다)
    // 소매 원단/오버레이 칸을 통째로 숨긴다 (사용자 요청)
    if (refKey === 'sleeve' && sketch.sleeve === 'none') return;
    materialChildren.push(buildChipSection(
      title, materialOrder, sketch[key], LABEL.ko.material,
      (id) => updateSketchField(key, id), buildMaterialSwatch,
      sketch.custom[key], (v) => updateCustomText(key, v),
      MATERIAL_DESC,
    ));
    const overlayCat = OVERLAY_CATEGORIES[i];
    materialChildren.push(buildChipSection(
      overlayCat.title, OVERLAY_CHIP_ORDER, sketch[overlayCat.key], LABEL.ko.overlay,
      (id) => updateSketchField(overlayCat.key, id), buildOverlaySwatch,
      sketch.custom[overlayCat.key], (v) => updateCustomText(overlayCat.key, v),
      OVERLAY_DESC,
    ));
    materialChildren.push(buildTextureRefBlock(refKey));
  });
  wrap.appendChild(buildRecordGroup('원단 · 오버레이', materialChildren));

  const attrChildren = [];
  ATTR_CATEGORIES.forEach(({ key, order, title, thumb }) => {
    attrChildren.push(buildChipSection(
      title, order, sketch[key], LABEL.ko[key],
      (id) => updateSketchField(key, id), thumb,
      sketch.custom[key], (v) => updateCustomText(key, v),
    ));
    // 뒷모습은 정면 스케치로 표현이 안 되는 경우(리본/보우 백 등)가 있어서, 스커트/보디스/
    // 소매처럼 참고 메모+이미지를 남길 수 있게 한다 (사용자 요청)
    if (key === 'back') attrChildren.push(buildTextureRefBlock('back'));
  });
  wrap.appendChild(buildRecordGroup('허리 라인 · 뒷모습 · 트레인', attrChildren));

  return wrap;
}

// 매장에서는 대개 건너뛰는 항목이라 접어둔다 (SPEC.md §6.2)
function buildCollapsibleField(key, title, value, onInput) {
  const wrap = document.createElement('div');
  const header = document.createElement('div');
  header.className = 'collapsible-header';
  const arrow = state.uiCollapsed[key] ? '▸' : '▾';
  header.textContent = `${title} ${arrow}`;
  header.addEventListener('click', () => {
    state.uiCollapsed[key] = !state.uiCollapsed[key];
    render();
  });
  wrap.appendChild(header);

  if (!state.uiCollapsed[key]) {
    const textarea = document.createElement('textarea');
    textarea.value = value || '';
    textarea.addEventListener('input', (e) => onInput(e.target.value));
    wrap.appendChild(textarea);
  }
  return wrap;
}

function buildNotesSections() {
  const wrap = document.createElement('div');
  wrap.appendChild(buildCollapsibleField('memo', '메모', state.current.memo, (v) => updateCurrentField('memo', v)));
  return wrap;
}

// ── 목록 화면 ──────────────────────────────────────────────────────────────
function buildListScreen() {
  const wrap = document.createElement('div');
  wrap.className = 'list-screen';
  wrap.appendChild(buildListTopBar());

  if (state.store.fittings.length === 0) {
    wrap.appendChild(buildEmptyState());
    return wrap;
  }

  const note = document.createElement('p');
  note.className = 'backup-note';
  note.textContent = '투어 다녀온 날엔 아래 JSON 내보내기로 백업해두세요.';
  wrap.appendChild(note);

  wrap.appendChild(buildGroupedList());
  wrap.appendChild(buildBackupRow());
  return wrap;
}

function buildListTopBar() {
  const topBar = document.createElement('div');
  topBar.className = 'top-bar';

  const title = document.createElement('span');
  title.className = 'title';
  title.textContent = state.compareMode
    ? `비교할 드레스 선택 (${state.compareSelection.length}/3)`
    : '내 드레스 목록';
  topBar.appendChild(title);

  const actions = document.createElement('div');
  actions.className = 'top-bar-actions';

  if (state.compareMode) {
    const cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.className = 'btn';
    cancelBtn.textContent = '취소';
    cancelBtn.addEventListener('click', exitCompareMode);
    actions.appendChild(cancelBtn);

    const confirmBtn = document.createElement('button');
    confirmBtn.type = 'button';
    confirmBtn.className = 'btn primary';
    confirmBtn.textContent = `비교하기(${state.compareSelection.length})`;
    confirmBtn.disabled = state.compareSelection.length < 2;
    confirmBtn.addEventListener('click', openCompareScreen);
    actions.appendChild(confirmBtn);
  } else {
    if (state.store.fittings.length >= 2) {
      const compareBtn = document.createElement('button');
      compareBtn.type = 'button';
      compareBtn.className = 'btn';
      compareBtn.textContent = '비교하기';
      compareBtn.addEventListener('click', enterCompareMode);
      actions.appendChild(compareBtn);
    }

    const newBtn = document.createElement('button');
    newBtn.type = 'button';
    newBtn.className = 'btn primary';
    newBtn.textContent = '+ 새 기록';
    newBtn.addEventListener('click', startNewFitting);
    actions.appendChild(newBtn);
  }

  topBar.appendChild(actions);
  return topBar;
}

// ── 비교하기 선택 모드 (SPEC.md §6.3) ──────────────────────────────────────
function enterCompareMode() {
  state.compareMode = true;
  state.compareSelection = [];
  render();
}

function exitCompareMode() {
  state.compareMode = false;
  state.compareSelection = [];
  render();
}

function toggleCompareSelect(id) {
  const idx = state.compareSelection.indexOf(id);
  if (idx >= 0) {
    state.compareSelection.splice(idx, 1);
  } else if (state.compareSelection.length < 3) {
    state.compareSelection.push(id);
  }
  render();
}

function openCompareScreen() {
  if (state.compareSelection.length < 2) return;
  state.view = 'compare';
  render();
}

function backToListFromCompare() {
  state.view = 'list';
  state.compareMode = false;
  state.compareSelection = [];
  render();
}

function buildEmptyState() {
  const wrap = document.createElement('div');
  wrap.className = 'empty-state';
  const p1 = document.createElement('p');
  p1.textContent = '아직 기록한 드레스가 없어요.';
  const p2 = document.createElement('p');
  p2.textContent = '위의 "+ 새 기록"으로 첫 드레스를 기록해보세요.';
  wrap.appendChild(p1);
  wrap.appendChild(p2);
  return wrap;
}

function groupByShop(fittings) {
  const groups = [];
  const index = {};
  fittings.forEach((f) => {
    const key = f.shopName || '(매장명 없음)';
    if (!(key in index)) {
      index[key] = groups.length;
      groups.push({ shopName: key, items: [] });
    }
    groups[index[key]].items.push(f);
  });
  return groups;
}

function buildGroupedList() {
  const wrap = document.createElement('div');
  groupByShop(state.store.fittings).forEach((group) => {
    const title = document.createElement('div');
    title.className = 'shop-group-title';
    title.textContent = group.shopName;
    wrap.appendChild(title);
    group.items.forEach((fitting) => wrap.appendChild(buildFittingItem(fitting)));
  });
  return wrap;
}

function buildFittingItem(fitting) {
  const item = document.createElement('div');
  const isSelected = state.compareSelection.includes(fitting.id);
  item.className = 'fitting-item' + (isSelected ? ' selected-for-compare' : '');
  item.appendChild(buildPreviewSvg(fitting.sketch));

  const meta = document.createElement('div');
  meta.className = 'fitting-meta';
  const name = document.createElement('div');
  name.className = 'name';
  name.textContent = fitting.dressName || '(이름 없음)';
  meta.appendChild(name);
  const stars = document.createElement('div');
  stars.className = 'stars';
  stars.textContent = fitting.rating ? '★'.repeat(fitting.rating) : '';
  meta.appendChild(stars);
  item.appendChild(meta);

  if (state.compareMode) {
    const badge = document.createElement('div');
    badge.className = 'compare-badge';
    badge.textContent = isSelected ? '✓' : '';
    item.appendChild(badge);
    item.addEventListener('click', () => toggleCompareSelect(fitting.id));
  } else if (state.deleteMenuId === fitting.id) {
    item.appendChild(buildDeleteMenu(fitting.id));
  } else {
    attachLongPress(item, () => {
      state.deleteMenuId = fitting.id;
      render();
    });
    item.addEventListener('click', () => openFitting(fitting.id));
  }
  return item;
}

// 스와이프 삭제는 오작동 위험이 있어 금지 — 길게 눌러야 삭제 메뉴가 뜬다 (SPEC.md §6.3)
function attachLongPress(el, onLongPress) {
  let timer = null;
  el.addEventListener('pointerdown', () => { timer = setTimeout(onLongPress, 550); });
  el.addEventListener('pointerup', () => clearTimeout(timer));
  el.addEventListener('pointerleave', () => clearTimeout(timer));
  el.addEventListener('pointercancel', () => clearTimeout(timer));
}

function buildDeleteMenu(id) {
  const menu = document.createElement('div');
  menu.className = 'delete-menu';
  const del = document.createElement('button');
  del.type = 'button';
  del.className = 'btn';
  del.textContent = '삭제';
  del.addEventListener('click', (e) => { e.stopPropagation(); deleteFitting(id); });
  const cancel = document.createElement('button');
  cancel.type = 'button';
  cancel.className = 'btn';
  cancel.textContent = '취소';
  cancel.addEventListener('click', (e) => {
    e.stopPropagation();
    state.deleteMenuId = null;
    render();
  });
  menu.appendChild(del);
  menu.appendChild(cancel);
  return menu;
}

// ── JSON 백업 (SPEC.md §5.3) ───────────────────────────────────────────────
function buildBackupRow() {
  const wrap = document.createElement('div');
  wrap.className = 'backup-row';

  const exportBtn = document.createElement('button');
  exportBtn.type = 'button';
  exportBtn.className = 'btn';
  exportBtn.textContent = 'JSON 내보내기';
  exportBtn.addEventListener('click', exportJson);
  wrap.appendChild(exportBtn);

  const importLabel = document.createElement('label');
  importLabel.className = 'btn';
  importLabel.textContent = 'JSON 가져오기';
  const importInput = document.createElement('input');
  importInput.type = 'file';
  importInput.accept = 'application/json';
  importInput.style.display = 'none';
  importInput.addEventListener('change', (e) => importJson(e.target.files[0]));
  importLabel.appendChild(importInput);
  wrap.appendChild(importLabel);

  return wrap;
}

function exportJson() {
  const blob = new Blob([JSON.stringify(state.store, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `dress-tour-${todayStr().replace(/-/g, '')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// 기존 데이터와 병합하되 id 중복은 건너뛴다 (SPEC.md §5.3)
function importJson(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const incoming = JSON.parse(reader.result);
      const existingIds = new Set(state.store.fittings.map((f) => f.id));
      const merged = (incoming.fittings || []).filter((f) => !existingIds.has(f.id));
      merged.forEach((f) => { ensureTextureRef(f.sketch); ensureMaterialOverlay(f.sketch); });
      state.store.fittings = state.store.fittings.concat(merged);
      persistStore();
      render();
    } catch (e) {
      alert('JSON 파일을 읽을 수 없습니다.');
    }
  };
  reader.readAsText(file);
}

// 행=속성, 열=드레스. 셀 값이 전부 같은 행은 흐리게, 하나라도 다르면 강조한다 (SPEC.md §6.4)
// 원단과 오버레이를 "새틴 · 자수 레이스"처럼 한 칸에 합쳐 보여준다. 오버레이가 없음이면
// 원단 이름만 남긴다
function materialOverlayLabel(sketch, materialKey, overlayKey) {
  const materialLabel = LABEL.ko.material[sketch[materialKey]];
  const overlayId = sketch[overlayKey];
  if (!overlayId || overlayId === 'none') return materialLabel;
  return `${materialLabel} · ${LABEL.ko.overlay[overlayId]}`;
}

const COMPARE_ROWS = [
  { label: '매장', get: (f) => f.shopName || '-' },
  { label: '드레스명', get: (f) => f.dressName || '-' },
  { label: '가격', get: (f) => (f.priceKrw ? `${f.priceKrw.toLocaleString()}원` : '-') },
  { label: '별점', get: (f) => (f.rating ? '★'.repeat(f.rating) : '-') },
  { label: '실루엣', get: (f) => LABEL.ko.silhouette[f.sketch.silhouette] },
  { label: '넥라인', get: (f) => LABEL.ko.neckline[f.sketch.neckline] },
  { label: '소매', get: (f) => LABEL.ko.sleeve[f.sketch.sleeve] },
  { label: '스커트 원단', get: (f) => materialOverlayLabel(f.sketch, 'skirtMaterial', 'skirtOverlay') },
  { label: '보디스 원단', get: (f) => materialOverlayLabel(f.sketch, 'bodiceMaterial', 'bodiceOverlay') },
  { label: '소매 원단', get: (f) => materialOverlayLabel(f.sketch, 'sleeveMaterial', 'sleeveOverlay') },
  { label: '허리 라인', get: (f) => LABEL.ko.waist[f.sketch.waist] },
  { label: '뒷모습', get: (f) => LABEL.ko.back[f.sketch.back] },
  { label: '트레인', get: (f) => LABEL.ko.train[f.sketch.train] },
];

function buildCompareTable(fittings) {
  const table = document.createElement('table');
  table.className = 'compare-table';

  COMPARE_ROWS.forEach(({ label, get }) => {
    const values = fittings.map(get);
    const allSame = values.every((v) => v === values[0]);

    const tr = document.createElement('tr');
    tr.className = allSame ? 'row-same' : 'row-diff';

    const th = document.createElement('th');
    th.textContent = label;
    tr.appendChild(th);

    values.forEach((v) => {
      const td = document.createElement('td');
      td.textContent = v;
      tr.appendChild(td);
    });

    table.appendChild(tr);
  });

  return table;
}

// ── 이미지 내보내기 (SPEC.md §5.1) ─────────────────────────────────────────
const CANVAS_COLORS = { bg: '#EDE7E0', outline: '#8A7A6D', text: '#4A3F36' };

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

// 내보낼 SVG는 원본 문서와 분리된 독립 리소스로 래스터화되므로, 바깥 <style>의
// .dress-outline/.fold-line 클래스 규칙을 못 읽는다 — 값을 그대로 박아 자체완결시킨다
const EXPORT_SVG_STYLE = `
  .dress-outline { stroke: #8A7A6D; stroke-width: 1; }
  .dress-outline.other { stroke-dasharray: 4 3; }
  .mesh-overlay { stroke-dasharray: 2 2; }
  .fold-line { fill: none; stroke: #8A7A6D; stroke-width: 0.6; opacity: 0.45; }
  .torso-outline { fill: none; stroke: #8A7A6D; stroke-width: 0.8; opacity: 0.35; }
  .waist-seam { fill: none; stroke: #8A7A6D; stroke-width: 1.3; }
`;

// svg를 지정한 픽셀 크기로 래스터화하기 위해 width/height를 박아 직렬화한다
// (viewBox만 있으면 브라우저가 임의의 기본 크기로 그려버릴 수 있다)
async function loadSvgAsImage(svgEl, pixelW, pixelH) {
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('width', pixelW);
  clone.setAttribute('height', pixelH);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
  styleEl.textContent = EXPORT_SVG_STYLE;
  clone.insertBefore(styleEl, clone.firstChild);
  const svgStr = new XMLSerializer().serializeToString(clone);
  const dataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
  return loadImage(dataUrl);
}

// 실제로 그리지 않고 줄바꿈된 줄 배열만 계산한다 — 캔버스 크기를 정하기 전에 메모가 몇
// 줄이 될지 먼저 알아야, 메모가 길어질 때 다음 파츠 라벨과 겹치지 않게 셀 높이를 늘릴 수 있다
function wrapTextLines(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  words.forEach((word) => {
    const test = line ? `${line} ${word}` : word;
    if (line && ctx.measureText(test).width > maxWidth) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  });
  if (line) lines.push(line);
  return lines;
}

// 내보내기 전용 순서/라벨. 위→아래로 소매/바디/스커트 (사용자 요청 순서 — 앱 안의
// "보디스 텍스처" 칩 라벨과는 별개로, 이 참고 시트에서만 "바디"라는 짧은 이름을 쓴다)
const TEXTURE_REF_PARTS = [
  { key: 'sleeve', label: '소매' },
  { key: 'bodice', label: '바디' },
  { key: 'skirt', label: '스커트' },
  { key: 'back', label: '뒷모습' },
];

function textureRefPartsWithContent(textureRef) {
  return TEXTURE_REF_PARTS.filter(({ key }) => {
    const ref = textureRef[key];
    return ref && (ref.image || ref.note);
  });
}

const REF_IMG_SIZE = 64;
const REF_NOTE_LINE_H = 13;
const REF_NOTE_FONT = '11px sans-serif';

// 파츠 하나(라벨+이미지+메모)가 실제로 차지할 높이를 먼저 계산한다 — 메모가 길어져 여러 줄로
// 감기면 그만큼 셀이 커져야 다음 파츠 라벨과 안 겹친다. 캔버스 크기를 정하기 전에 미리
// 알아야 해서, 실제로 그리는 데 쓸 캔버스와는 별개인 측정 전용 컨텍스트로 계산한다
function measureTextureRefCells(measureCtx, textureRef, parts, colWidth) {
  return parts.map(({ key, label }) => {
    const ref = textureRef[key];
    let h = 10; // 라벨
    if (ref.image) h += REF_IMG_SIZE + 14;
    let noteLines = [];
    if (ref.note) {
      measureCtx.font = REF_NOTE_FONT;
      noteLines = wrapTextLines(measureCtx, ref.note, colWidth - 8);
      h += noteLines.length * REF_NOTE_LINE_H;
    }
    h += 16; // 다음 파츠와의 여백
    return { label, ref, noteLines, cellH: h };
  });
}

// textureRef 참고 메모+이미지를 드레스 그림 오른쪽에 위→아래로 쌓아 그려 넣는다 (SPEC.md §5.1).
// cellLayouts는 measureTextureRefCells()로 미리 계산해둔, 파츠별 실제 높이가 반영된 배열이다
async function drawTextureRefColumn(ctx, cellLayouts, x, y, colWidth) {
  const cx = x + colWidth / 2;
  let cellY = y;

  for (const { label, ref, noteLines, cellH } of cellLayouts) {
    ctx.fillStyle = CANVAS_COLORS.text;
    ctx.textAlign = 'center';
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText(label, cx, cellY);

    let nextY = cellY + 10;
    if (ref.image) {
      const img = await loadImage(ref.image);
      ctx.drawImage(img, cx - REF_IMG_SIZE / 2, nextY, REF_IMG_SIZE, REF_IMG_SIZE);
      ctx.strokeStyle = CANVAS_COLORS.outline;
      ctx.lineWidth = 1;
      ctx.strokeRect(cx - REF_IMG_SIZE / 2, nextY, REF_IMG_SIZE, REF_IMG_SIZE);
      nextY += REF_IMG_SIZE + 14;
    }
    if (noteLines.length) {
      ctx.font = REF_NOTE_FONT;
      ctx.fillStyle = CANVAS_COLORS.text;
      noteLines.forEach((line, i) => ctx.fillText(line, cx, nextY + i * REF_NOTE_LINE_H));
    }
    cellY += cellH;
  }
}

// 단일 드레스 한 장 — 왼쪽에 드레스, (참고가 있으면) 오른쪽에 소매/바디/스커트 세로 스와치
async function exportFittingImage(fitting) {
  const scale = 2;
  const gap = 16;
  const dressW = 230;
  const dressH = Math.round(dressW * (700 / 400));
  const headerH = 56;
  const refColW = 130;
  const refYOffset = 24; // 스와치 칼럼을 드레스 그림보다 살짝 아래에서 시작하게

  const parts = textureRefPartsWithContent(fitting.sketch.textureRef);
  const hasRef = parts.length > 0;
  const measureCtx = document.createElement('canvas').getContext('2d');
  const cellLayouts = measureTextureRefCells(measureCtx, fitting.sketch.textureRef, parts, refColW);
  const refColH = cellLayouts.reduce((sum, c) => sum + c.cellH, 0);

  const bodyH = Math.max(dressH, hasRef ? refYOffset + refColH : 0);
  const baseW = gap + dressW + (hasRef ? gap + refColW : 0) + gap;
  const totalH = headerH + bodyH + gap;

  const canvas = document.createElement('canvas');
  canvas.width = baseW * scale;
  canvas.height = totalH * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  ctx.fillStyle = CANVAS_COLORS.bg;
  ctx.fillRect(0, 0, baseW, totalH);

  ctx.fillStyle = CANVAS_COLORS.text;
  ctx.textAlign = 'left';
  ctx.font = 'bold 16px sans-serif';
  ctx.fillText(fitting.shopName || '(매장명 없음)', 16, 26);
  ctx.font = '13px sans-serif';
  ctx.fillText(fitting.dressName || '', 16, 46);
  ctx.textAlign = 'right';
  ctx.font = '14px sans-serif';
  ctx.fillText(fitting.rating ? '★'.repeat(fitting.rating) : '', baseW - 16, 26);

  const dressImg = await loadSvgAsImage(buildPreviewSvg(fitting.sketch), dressW * scale, dressH * scale);
  ctx.drawImage(dressImg, gap, headerH, dressW, dressH);

  if (hasRef) {
    await drawTextureRefColumn(ctx, cellLayouts, gap + dressW + gap, headerH + refYOffset, refColW);
  }

  return canvas;
}

// 비교 화면 한 장 — 최대 3벌 나란히 + 속성 표 (강조/흐림 그대로 반영)
async function exportCompareImage(fittings) {
  const scale = 2;
  const cellW = 150;
  const dressH = Math.round(cellW * (700 / 400));
  const gap = 16;
  const baseW = cellW * fittings.length + gap * (fittings.length + 1);
  const labelW = 90;
  const tableRowH = 20;
  const tableTop = dressH + 40;
  const totalH = tableTop + COMPARE_ROWS.length * tableRowH + 20;

  const canvas = document.createElement('canvas');
  canvas.width = baseW * scale;
  canvas.height = totalH * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  ctx.fillStyle = CANVAS_COLORS.bg;
  ctx.fillRect(0, 0, baseW, totalH);

  for (let i = 0; i < fittings.length; i++) {
    const f = fittings[i];
    const x = gap + i * (cellW + gap);
    const img = await loadSvgAsImage(buildPreviewSvg(f.sketch), cellW * scale, dressH * scale);
    ctx.drawImage(img, x, 0, cellW, dressH);
    ctx.fillStyle = CANVAS_COLORS.text;
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(f.dressName || '(이름 없음)', x + cellW / 2, dressH + 16);
  }

  const colsW = baseW - gap * 2 - labelW;
  const colW = colsW / fittings.length;
  let y = tableTop + 14;
  COMPARE_ROWS.forEach(({ label, get }) => {
    const values = fittings.map(get);
    const allSame = values.every((v) => v === values[0]);
    ctx.globalAlpha = allSame ? 0.5 : 1;
    ctx.fillStyle = CANVAS_COLORS.text;
    ctx.font = (allSame ? '' : 'bold ') + '11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(label, gap, y);
    values.forEach((v, i) => {
      const cx = gap + labelW + i * colW + colW / 2;
      ctx.textAlign = 'center';
      ctx.fillText(v, cx, y);
    });
    ctx.globalAlpha = 1;
    y += tableRowH;
  });

  return canvas;
}

function canvasToBlobPromise(canvas) {
  return new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
}

// 캡처 도구처럼 버튼 한 번으로 클립보드에 바로 복사한다 (SPEC.md §5.1).
// 공유 시트/다운로드 대화상자를 거치지 않는다 — 클립보드 API를 못 쓰는 환경에서만 다운로드 폴백
async function copyCanvasToClipboard(canvas, filename) {
  const blob = await canvasToBlobPromise(canvas);

  if (navigator.clipboard && window.ClipboardItem) {
    try {
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      return true;
    } catch (e) {
      // 클립보드 쓰기 권한 거부 등 — 다운로드로 폴백
    }
  }

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  return false;
}

// 클릭한 버튼 자신에 결과를 잠깐 표시해 복사됐는지 바로 알 수 있게 한다
function flashButtonResult(btnEl, copied, failText) {
  if (!btnEl) return;
  const original = btnEl.textContent;
  btnEl.textContent = copied ? '복사됨 ✓' : (failText || '다운로드됨');
  setTimeout(() => { btnEl.textContent = original; }, 1500);
}

async function handleExportSingle(fitting, btnEl) {
  const canvas = await exportFittingImage(fitting);
  const copied = await copyCanvasToClipboard(canvas, `dress-${todayStr()}.png`);
  flashButtonResult(btnEl, copied);
}

// 실사 렌더링은 이 앱의 스코프 밖("스케치이지 일러스트가 아님" — SPEC.md §0)이라, 대신
// 지금 고른 항목들을 영문 이미지 생성 AI 프롬프트 문장으로 조립해 복사할 수 있게 한다.
// "기타" 항목은 직접 입력한 텍스트가 있으면 그 텍스트를, 없으면 영문 라벨을 그대로 쓴다
// 프롬프트용 원단/오버레이 묘사 — LABEL.en.material/overlay는 화면/코드 공용 라벨이라 한
// 두 단어로 짧지만, 이미지 생성 AI에는 재질감이 그림으로 드러나는 서술형 표현이 더 잘 먹힌다
const MATERIAL_PROMPT_DESC = {
  satin: 'smooth glossy satin with a soft liquid sheen',
  mikado: 'structured mikado silk with body and a subtle matte-glossy finish',
  crepe: 'matte crepe with a soft, naturally draping fall',
  taffeta: 'crisp taffeta with a rustling texture that holds its shape',
  chiffon: 'lightweight, flowing chiffon',
  organza: 'crisp, sheer organza with light structured drape',
  tulle: 'sheer, airy tulle netting',
  illusiontulle: 'sheer illusion tulle mesh that reads like natural skin',
};
const OVERLAY_PROMPT_DESC = {
  embroiderylace: 'a delicate embroidered lace overlay',
  chemicallace: 'a bold, dimensional chemical (guipure) lace overlay with a graphic pattern',
  beads: 'a hand-beaded embellishment overlay with shimmering crystal details',
  pearl: 'a pearl-embellished overlay with a soft, classic luster',
  glitter: 'a glitter overlay that catches the light',
  flower3d: 'a 3D floral appliqué overlay',
  applique: 'lace appliqué motifs layered on top',
};

function buildAiPrompt(sketch) {
  const resolve = (category, key) => {
    const value = sketch[key];
    if (value === 'other' && sketch.custom && sketch.custom[key]) return sketch.custom[key];
    return (LABEL.en[category] && LABEL.en[category][value]) || value;
  };

  // 민소매면 소매 원단을 언급 자체를 하지 않는다 — "sleeves in ..." 문장이 남아 있으면
  // 이미지 생성 AI가 민소매 지시와 모순된다고 보고 어깨에 뭔가(시스루 캡 등)를 임의로
  // 그려 넣는 문제가 있었다 (사용자 확인)
  const fabricParts = [
    ['skirt', 'skirtMaterial', 'skirtOverlay', 'skirt'],
    ['bodice', 'bodiceMaterial', 'bodiceOverlay', 'bodice'],
  ];
  if (sketch.sleeve !== 'none') fabricParts.push(['sleeve', 'sleeveMaterial', 'sleeveOverlay', 'sleeves']);
  const fabricLine = fabricParts.map(([refKey, materialKey, overlayKey, labelEn]) => {
    const materialId = sketch[materialKey];
    const fabric = (materialId === 'other' && sketch.custom && sketch.custom[materialKey])
      || MATERIAL_PROMPT_DESC[materialId]
      || resolve('material', materialKey);
    const overlayId = sketch[overlayKey];
    const overlayDesc = overlayId && overlayId !== 'none' ? (OVERLAY_PROMPT_DESC[overlayId] || resolve('overlay', overlayKey)) : '';
    const overlayPhrase = overlayDesc ? ` with ${overlayDesc}` : '';
    const ref = sketch.textureRef && sketch.textureRef[refKey];
    const note = ref && ref.note ? `, matching this reference: ${ref.note}` : '';
    return `${labelEn} in ${fabric}${overlayPhrase}${note}`;
  }).join('; ');

  // 뒷모습은 정면 스케치로 표현이 안 되는 디테일(리본/보우 백 등)이 있을 수 있어서, 참고
  // 메모가 있으면 그대로 덧붙인다 (사용자 요청)
  const backRef = sketch.textureRef && sketch.textureRef.back;
  const backNote = backRef && backRef.note ? `, matching this reference: ${backRef.note}` : '';

  return [
    'A professional studio photograph of a couture wedding dress on a headless dress form mannequin, elegant bridal editorial style.',
    'Show exactly two full-body views side by side in one image: front view on the left, back view on the right. Each view must be a complete, uncropped shot showing the entire dress from shoulder to hem. Do not add any extra close-up, zoomed-in, or cropped detail insets of fabric/texture — only the two full views.',
    `Silhouette: ${resolve('silhouette', 'silhouette')}.`,
    `Neckline: ${resolve('neckline', 'neckline')}.`,
    `Sleeves: ${resolve('sleeve', 'sleeve')}.`,
    `Waistline: ${resolve('waist', 'waist')}.`,
    `Back: ${resolve('back', 'back')}${backNote}.`,
    `Train: ${resolve('train', 'train')}.`,
    `Fabric by part — ${fabricLine}.`,
    `Even though each part uses a different fabric, render the whole gown as one cohesive piece: unify the overall color into a single consistent ivory/white tone, with the same soft studio lighting and color grading across the${sketch.sleeve === 'none' ? ' skirt and bodice' : ' skirt, bodice, and sleeves'} so no part looks mismatched or pasted-on.`,
    'Soft studio lighting, realistic fabric drape and texture, photorealistic, high detail.',
  ].join(' ');
}

async function handleCopyAiPrompt(sketch, btnEl) {
  const text = buildAiPrompt(sketch);
  try {
    await navigator.clipboard.writeText(text);
    flashButtonResult(btnEl, true);
  } catch (e) {
    flashButtonResult(btnEl, false, '복사 실패');
  }
}

async function handleExportCompareClick(fittings, btnEl) {

  const copied = await copyCanvasToClipboard(canvas, `dress-compare-${todayStr()}.png`);
  flashButtonResult(btnEl, copied);
}

// ── 스케치 코드 인코딩 (SPEC.md §5.2) ──────────────────────────────────────
const CODE_ALPHABET = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
const SKETCH_CODE_VERSION = '1';
// 분류 순서는 절대 재배열하지 않는다 — 이미 나간 링크의 인코딩이 깨진다
const SKETCH_CODE_CATEGORIES = [
  { key: 'silhouette', order: SILHOUETTE_ORDER },
  { key: 'neckline', order: NECKLINE_ORDER },
  { key: 'sleeve', order: SLEEVE_ORDER },
  { key: 'waist', order: WAIST_ORDER },
  { key: 'back', order: BACK_ORDER },
  { key: 'train', order: TRAIN_ORDER },
  { key: 'skirtMaterial', order: MATERIAL_ORDER },
  { key: 'skirtOverlay', order: OVERLAY_ORDER },
  { key: 'bodiceMaterial', order: MATERIAL_ORDER },
  { key: 'bodiceOverlay', order: OVERLAY_ORDER },
  { key: 'sleeveMaterial', order: MATERIAL_ORDER },
  { key: 'sleeveOverlay', order: OVERLAY_ORDER },
];

function encodeSketch(sketch) {
  let code = SKETCH_CODE_VERSION;
  SKETCH_CODE_CATEGORIES.forEach(({ key, order }) => {
    const idx = order.indexOf(sketch[key]);
    code += CODE_ALPHABET[idx >= 0 ? idx : 0];
  });
  return code;
}

// 디코딩 실패 시 null을 반환한다 — 호출부가 "링크를 읽을 수 없습니다"로 처리 (SPEC.md §5.2)
function decodeSketch(code) {
  if (typeof code !== 'string' || code.length !== 1 + SKETCH_CODE_CATEGORIES.length) return null;
  if (code[0] !== SKETCH_CODE_VERSION) return null;

  const sketch = defaultSketch();
  for (let i = 0; i < SKETCH_CODE_CATEGORIES.length; i++) {
    const { key, order } = SKETCH_CODE_CATEGORIES[i];
    const idx = CODE_ALPHABET.indexOf(code[1 + i]);
    if (idx < 0 || idx >= order.length) return null;
    sketch[key] = order[idx];
  }
  return sketch;
}

// base64url: +/ → -_, 패딩(=) 제거. TextEncoder/Decoder로 UTF-8을 안전하게 다룬다
function base64UrlEncode(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  bytes.forEach((b) => { binary += String.fromCharCode(b); });
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function base64UrlDecode(str) {
  let b64 = str.replace(/-/g, '+').replace(/_/g, '/');
  while (b64.length % 4) b64 += '=';
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

function buildSketchShareUrl(sketch) {
  const url = new URL(window.location.href);
  url.hash = `d=${encodeSketch(sketch)}`;
  return url.toString();
}

// 최대 10벌. custom 텍스트와 textureRef는 크기 때문에 URL에 절대 포함하지 않는다 (SPEC.md §5.2)
function buildMultiShareUrl(fittings, opts) {
  const compact = fittings.map((f) => [
    encodeSketch(f.sketch),
    opts.includeShopName ? (f.shopName || '') : '',
    opts.includeDressName ? (f.dressName || '') : '',
    opts.includeRating ? (f.rating || null) : null,
  ]);
  const url = new URL(window.location.href);
  url.hash = `s=${base64UrlEncode(JSON.stringify(compact))}`;
  return url.toString();
}

// ── 공유 링크 다이얼로그 ────────────────────────────────────────────────────
function shareSingleFitting(fitting) {
  state.shareDialog = { mode: 'single', fittingIds: [fitting.id] };
  render();
}

function shareCompareSet() {
  state.shareDialog = {
    mode: 'multi',
    fittingIds: [...state.compareSelection],
    includeShopName: true,
    includeDressName: true,
    includeRating: true,
  };
  render();
}

function closeShareDialog() {
  state.shareDialog = null;
  render();
}

function renderShareLink(fittingIds, linkBox) {
  const fittings = fittingIds.map((id) => state.store.fittings.find((f) => f.id === id)).filter(Boolean);
  if (fittings.length === 0) return;

  if (fittings.length > 10) {
    linkBox.textContent = '10벌을 초과했습니다. 이미지나 파일로 공유해주세요.';
    return;
  }

  const url = fittings.length === 1
    ? buildSketchShareUrl(fittings[0].sketch)
    : buildMultiShareUrl(fittings, state.shareDialog);

  linkBox.innerHTML = '';
  const input = document.createElement('input');
  input.type = 'text';
  input.readOnly = true;
  input.value = url;
  linkBox.appendChild(input);

  const copyBtn = document.createElement('button');
  copyBtn.type = 'button';
  copyBtn.className = 'btn';
  copyBtn.textContent = '복사';
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(url).then(() => { copyBtn.textContent = '복사됨 ✓'; });
  });
  linkBox.appendChild(copyBtn);

  if (navigator.share) {
    const shareBtn = document.createElement('button');
    shareBtn.type = 'button';
    shareBtn.className = 'btn primary';
    shareBtn.textContent = '공유';
    shareBtn.addEventListener('click', () => navigator.share({ url }));
    linkBox.appendChild(shareBtn);
  }
}

// 공유 전 포함 항목 선택 (SPEC.md §5.2) — 단일 공유는 코드만 담겨 토글할 항목이 없다
function buildShareDialog() {
  const { mode, fittingIds } = state.shareDialog;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeShareDialog(); });

  const box = document.createElement('div');
  box.className = 'modal-box';

  const title = document.createElement('div');
  title.className = 'modal-title';
  title.textContent = mode === 'multi' ? '공유 항목 선택' : '공유 링크';
  box.appendChild(title);

  if (mode === 'multi') {
    [
      { key: 'includeShopName', label: '매장명 포함' },
      { key: 'includeDressName', label: '드레스명 포함' },
      { key: 'includeRating', label: '별점 포함' },
    ].forEach(({ key, label }) => {
      const row = document.createElement('label');
      row.className = 'modal-checkbox-row';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = state.shareDialog[key];
      cb.addEventListener('change', (e) => { state.shareDialog[key] = e.target.checked; });
      row.appendChild(cb);
      row.appendChild(document.createTextNode(label));
      box.appendChild(row);
    });
  }

  const note = document.createElement('p');
  note.className = 'modal-note';
  note.textContent = '메모·참고 이미지는 공유 링크에 포함되지 않습니다.';
  box.appendChild(note);

  const linkBox = document.createElement('div');
  linkBox.className = 'modal-link-box';
  box.appendChild(linkBox);

  const actions = document.createElement('div');
  actions.className = 'modal-actions';
  const closeBtn = document.createElement('button');
  closeBtn.type = 'button';
  closeBtn.className = 'btn';
  closeBtn.textContent = '닫기';
  closeBtn.addEventListener('click', closeShareDialog);
  actions.appendChild(closeBtn);

  if (mode === 'multi') {
    const makeBtn = document.createElement('button');
    makeBtn.type = 'button';
    makeBtn.className = 'btn primary';
    makeBtn.textContent = '링크 만들기';
    makeBtn.addEventListener('click', () => renderShareLink(fittingIds, linkBox));
    actions.appendChild(makeBtn);
  }

  box.appendChild(actions);
  overlay.appendChild(box);

  if (mode === 'single') {
    renderShareLink(fittingIds, linkBox);
  }

  return overlay;
}

// ── 읽기 전용 공유 뷰 (SPEC.md §6.5) ───────────────────────────────────────
function parseSharedFromHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return null;
  const params = new URLSearchParams(hash);

  if (params.has('d')) {
    const sketch = decodeSketch(params.get('d'));
    if (!sketch) return { error: true };
    return { items: [{ sketch, shopName: '', dressName: '', rating: null }] };
  }

  if (params.has('s')) {
    try {
      const arr = JSON.parse(base64UrlDecode(params.get('s')));
      const items = arr.map(([code, shopName, dressName, rating]) => {
        const sketch = decodeSketch(code);
        if (!sketch) throw new Error('invalid code');
        return { sketch, shopName: shopName || '', dressName: dressName || '', rating: rating || null };
      });
      return { items };
    } catch (e) {
      return { error: true };
    }
  }

  return null;
}

function textEl(tag, text) {
  const el = document.createElement(tag);
  el.textContent = text;
  return el;
}

function buildSharedScreen() {
  const wrap = document.createElement('div');
  wrap.className = 'shared-screen';

  const banner = document.createElement('div');
  banner.className = 'shared-banner';
  banner.appendChild(textEl('span', '공유받은 기록입니다'));
  const exitBtn = document.createElement('button');
  exitBtn.type = 'button';
  exitBtn.className = 'btn';
  exitBtn.textContent = '내 목록 보기';
  exitBtn.addEventListener('click', exitSharedView);
  banner.appendChild(exitBtn);
  wrap.appendChild(banner);

  state.shared.items.forEach((item) => wrap.appendChild(buildSharedItem(item)));
  return wrap;
}

function buildSharedItem(item) {
  const card = document.createElement('div');
  card.className = 'shared-item';
  card.appendChild(buildPreviewSvg(item.sketch));

  if (item.shopName || item.dressName || item.rating) {
    const meta = document.createElement('div');
    meta.className = 'shared-item-meta';
    if (item.shopName) meta.appendChild(textEl('div', item.shopName));
    if (item.dressName) meta.appendChild(textEl('div', item.dressName));
    if (item.rating) meta.appendChild(textEl('div', '★'.repeat(item.rating)));
    card.appendChild(meta);
  }

  const addBtn = document.createElement('button');
  addBtn.type = 'button';
  addBtn.className = 'btn primary';
  addBtn.textContent = '내 목록에 추가';
  addBtn.addEventListener('click', () => {
    addSharedItemToStore(item);
    addBtn.textContent = '추가됨 ✓';
    addBtn.disabled = true;
  });
  card.appendChild(addBtn);

  return card;
}

// 명시적으로 눌러야 저장된다 — 기존 데이터를 절대 덮어쓰지 않는다 (SPEC.md §5.2)
function addSharedItemToStore(item) {
  const fitting = {
    id: crypto.randomUUID(),
    shopName: item.shopName || '',
    visitedAt: todayStr(),
    dressName: item.dressName || '',
    priceKrw: null,
    rating: item.rating || null,
    memo: '',
    sketch: item.sketch,
  };
  state.store.fittings.push(fitting);
  persistStore();
}

function exitSharedView() {
  state.view = 'list';
  state.shared = null;
  history.replaceState(null, '', window.location.pathname + window.location.search);
  render();
}

// 페이지 로드시 공유 링크로 들어왔는지 확인. 디코딩 실패해도 앱이 깨지지 않고
// 안내 후 일반 화면으로 진입한다 (SPEC.md §5.2)
(function initSharedViewFromHash() {
  const result = parseSharedFromHash();
  if (!result) return;
  if (result.error) {
    alert('링크를 읽을 수 없습니다.');
    return;
  }
  state.shared = result;
  state.view = 'shared';
})();

render();
</script>
</body>
</html>
