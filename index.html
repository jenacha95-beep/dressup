<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웨딩드레스 투어 기록</title>
<style>
  :root {
    --bg: #EDE7E0;
    --dress-fill: #FBF8F4;
    --outline: #8A7A6D;
    --text: #4A3F36;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Malgun Gothic", sans-serif;
  }
  button, input, textarea { font-family: inherit; }
  .dress-outline {
    stroke: var(--outline);
    stroke-width: 1;
  }
  .dress-outline.other {
    stroke-dasharray: 4 3;
  }
  .mesh-overlay {
    stroke-dasharray: 2 2;
  }
  .fold-line {
    fill: none;
    stroke: var(--outline);
    stroke-width: 0.6;
    opacity: 0.45;
  }
  .torso-outline {
    fill: none;
    stroke: var(--outline);
    stroke-width: 0.8;
    opacity: 0.35;
  }
  .waist-seam {
    fill: none;
    stroke: var(--outline);
    stroke-width: 1.3;
  }

  /* 공용 */
  .btn {
    font-size: 14px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--outline);
    background: transparent;
    color: var(--text);
    cursor: pointer;
  }
  .btn.primary {
    background: var(--outline);
    color: var(--dress-fill);
  }
  .btn:focus-visible, .chip:focus-visible {
    outline: 2px solid var(--outline);
    outline-offset: 2px;
  }
  .top-bar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--outline);
  }
  .top-bar .title {
    font-size: 15px;
    font-weight: 600;
  }

  /* 기록 화면 */
  .record-screen {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .preview-pane {
    flex: 0 0 35vh;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--outline);
  }
  .preview-pane svg {
    /* 부모(.preview-pane)의 %height를 쓰면 flex 컬럼 레이아웃과 순환 의존이 생겨
       미리보기가 부풀어 오르는 버그가 생긴다. 뷰포트 단위로 직접 고정해 우회한다 */
    height: 35vh;
    width: auto;
  }
  .scroll-pane {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px 12px 32px;
  }
  .field-group { margin-bottom: 14px; }
  .field-group label {
    display: block;
    font-size: 12px;
    opacity: 0.75;
    margin-bottom: 4px;
  }
  .field-row { display: flex; gap: 8px; }
  .field-row > .field-group { flex: 1; }
  input[type="text"], input[type="date"], input[type="number"], textarea {
    width: 100%;
    font-size: 14px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--outline);
    background: #ffffff88;
    color: var(--text);
  }
  textarea { resize: vertical; min-height: 60px; }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    margin: 18px 0 6px;
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    min-height: 44px;
    padding: 4px 8px;
    border: 1.5px solid transparent;
    border-radius: 10px;
    background: #ffffff55;
    color: var(--text);
    cursor: pointer;
  }
  .chip.selected {
    border-color: var(--outline);
    border-width: 2px;
    background: #ffffffcc;
  }
  .chip svg { width: 40px; height: auto; }
  .chip .chip-label { font-size: 11px; margin-top: 2px; text-align: center; }
  .chip.text-only { min-width: auto; padding: 8px 12px; }
  .other-input-wrap { margin-top: 6px; }
  /* 소재/오버레이 칩 설명 — PC는 title 호버로도 보이지만, 모바일은 호버가 없어서 선택한
     칩의 설명을 제목 바로 아래 눈에 띄는 박스로 항상 보여준다 (사용자 요청). 참고 메모
     입력칸(.texture-ref, 흰 배경+테두리)과 서식이 비슷해 헷갈린다는 피드백으로, 배경보다
     어두운 톤의 패널을 써서 뚜렷하게 구분한다(테두리 없이 배경색만으로 구분) */
  .chip-desc {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    color: var(--text);
    background: #D9D1C9;
    border-radius: 8px;
    padding: 6px 10px;
    margin: 2px 0 8px;
  }
  .chip-desc::before {
    content: 'ℹ';
    font-size: 13px;
    flex-shrink: 0;
    opacity: 0.7;
  }
  .texture-ref {
    margin: 6px 0 4px;
    padding: 8px;
    border: 1px dashed var(--outline);
    border-radius: 8px;
  }
  .texture-ref input[type="text"] { margin-bottom: 6px; }
  .texture-ref-image-row { display: flex; align-items: center; gap: 8px; }
  .texture-ref-thumb {
    width: 44px;
    height: 44px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--outline);
  }
  /* 기록 화면의 칩 구간을 3그룹(형태/원단/디테일)으로 나눠 시각적으로 분리한다 (사용자 요청) */
  .record-group {
    padding-top: 18px;
    margin-top: 18px;
    border-top: 1px solid var(--outline);
  }
  .record-group:first-child { padding-top: 0; margin-top: 0; border-top: none; }
  .record-group-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .collapsible-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 0;
    cursor: pointer;
    border-top: 1px solid var(--outline);
    margin-top: 10px;
  }

  /* 목록 화면 */
  .list-screen { padding-bottom: 32px; }
  .backup-note {
    font-size: 12px;
    opacity: 0.75;
    text-align: center;
    padding: 8px 12px;
    margin: 0;
  }
  .shop-group-title {
    font-size: 13px;
    font-weight: 600;
    padding: 14px 12px 4px;
  }
  .fitting-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
  }
  .fitting-item svg {
    width: 60px;
    height: 105px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .fitting-meta { flex: 1; }
  .fitting-meta .name { font-size: 14px; }
  .fitting-meta .stars { font-size: 12px; color: var(--outline); }
  .delete-menu { display: flex; gap: 8px; }
  .empty-state { text-align: center; padding: 60px 20px; opacity: 0.85; }
  .backup-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    padding: 16px 12px;
    border-top: 1px solid var(--outline);
    margin-top: 12px;
  }
  .top-bar-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .fitting-item.selected-for-compare {
    background: #ffffffaa;
    border-radius: 10px;
    outline: 2px solid var(--outline);
  }
  .compare-badge {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 1.5px solid var(--outline);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  /* 비교 화면 */
  .compare-screen { padding-bottom: 32px; }
  .compare-preview-row {
    display: flex;
    gap: 8px;
    padding: 16px 12px;
    justify-content: center;
  }
  .compare-preview-cell {
    flex: 1 1 0;
    max-width: 33%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .compare-preview-cell svg { width: 100%; height: auto; }
  .compare-dress-label {
    font-size: 12px;
    margin-top: 4px;
    text-align: center;
  }
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .compare-table th, .compare-table td {
    padding: 8px 6px;
    border-bottom: 1px solid var(--outline);
    text-align: center;
  }
  .compare-table th {
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    opacity: 0.85;
    width: 88px;
    padding-left: 12px;
  }
  .compare-table tr.row-same td { opacity: 0.45; }
  .compare-table tr.row-diff td { font-weight: 600; }

  /* 공유 링크 다이얼로그 */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-box {
    background: var(--bg);
    border: 1px solid var(--outline);
    border-radius: 12px;
    padding: 20px;
    width: 100%;
    max-width: 340px;
  }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .modal-checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .modal-note { font-size: 11px; opacity: 0.7; margin: 10px 0; }
  .modal-link-box { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
  .modal-link-box input { flex: 1 1 160px; font-size: 12px; padding: 6px 8px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }

  /* 읽기 전용 공유 뷰 */
  .shared-screen { padding-bottom: 32px; }
  .shared-banner {
    background: var(--outline);
    color: var(--dress-fill);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 600;
  }
  .shared-banner .btn { background: var(--dress-fill); color: var(--text); border-color: var(--dress-fill); }
  .shared-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 12px;
    border-bottom: 1px solid var(--outline);
  }
  .shared-item svg { width: 220px; height: auto; }
  .shared-item-meta { text-align: center; font-size: 13px; margin: 10px 0; }
  .shared-item-meta div { margin: 2px 0; }
</style>
</head>

// 스위트하트 바로 다음에 위치. bardot(바르도넥)은 참고 이미지를 다시 보니 넥라인이 아니라
// 오프숄더 밴드 소매 계열이라 넥라인에서는 뺐다 (사용자 확인)
const NECKLINE_CHIP_ORDER = ['sweetheart', 'sweetheartdeep', 'illusionheart', 'v', 'surplice', 'square', 'straight', 'illusion', 'bateau', 'jewel', 'scoop', 'halter', 'queenanne'];

// 참고 이미지 기반으로 새로 추가한 것 — 재배열 금지 규칙 때문에 other 뒤에 이어 붙인다
const SLEEVE_ORDER = ['none', 'cap', 'short', 'long', 'puff', 'other', 'offshoulder', 'offshoulderplain', 'coldshoulder', 'offshoulderfold'];
const SLEEVE_CHIP_ORDER = SLEEVE_ORDER.filter((id) => id !== 'other');
// 원단(소재)과 오버레이(장식)를 두 축으로 나눈 텍스처 모델 (사용자 요청). 파츠(보디스/
// 스커트/소매)마다 실제로 쓰이는 소재 목록은 다르지만, 오버레이 목록은 세 파츠가 동일하다.
// MATERIAL_ORDER/OVERLAY_ORDER는 인코딩 순서라 재배열 금지, 값 추가는 끝에만 한다. 칩 표시
// 순서는 파츠별 *_MATERIAL_CHIP_ORDER(오버레이는 공용 OVERLAY_CHIP_ORDER)가 따로 담당한다

const OVERLAY_ORDER = ['embroiderylace', 'chemicallace', 'beads', 'pearl', 'glitter', 'flower3d', 'applique', 'none'];
const BODICE_MATERIAL_CHIP_ORDER = ['mikado', 'satin', 'crepe', 'taffeta', 'chiffon', 'organza'];
const SKIRT_MATERIAL_CHIP_ORDER = ['mikado', 'satin', 'crepe', 'taffeta', 'chiffon', 'tulle', 'organza'];
const SLEEVE_MATERIAL_CHIP_ORDER = ['illusiontulle', 'tulle', 'organza', 'chiffon', 'satin', 'mikado'];
const OVERLAY_CHIP_ORDER = OVERLAY_ORDER.slice();
// 칩 호버 시 보이는 짧은 설명 (사용자 제공 표 그대로) — 화면에는 라벨 텍스트만 보이고,
// title 속성으로만 노출되는 보조 정보라 LABEL과는 별도로 둔다
const MATERIAL_DESC = {

  chiffon: '가벼움 · 하늘거림 · 부드러운 움직임',

const OVERLAY_DESC = {

const WAIST_ORDER = ['natural', 'drop', 'empire', 'basque', 'other'];
// corset(코르셋 백)/plain(특징 없음)은 참고 이미지·요청 기반으로 새로 추가한 것 — 재배열
// 금지 규칙 때문에 other 뒤에 이어 붙인다
const BACK_ORDER = ['vback', 'lowback', 'keyhole', 'buttons', 'illusion', 'other', 'corset', 'plain'];
const TRAIN_ORDER = ['none', 'sweep', 'chapel', 'cathedral', 'other'];
const WAIST_CHIP_ORDER = WAIST_ORDER.filter((id) => id !== 'other');
const BACK_CHIP_ORDER = BACK_ORDER.filter((id) => id !== 'other');
const TRAIN_CHIP_ORDER = TRAIN_ORDER.filter((id) => id !== 'other');

// 스커트 안쪽에 그리는 얇은 주름선. 체크포인트(y, leftX, rightX)를 실루엣 path와
// 동일한 앵커로 만들어 넣으면, 핏 되는 구간에서는 주름선도 좁게 붙고 플레어 구간에서만
// 벌어져 외곽선과 어긋나지 않는다. fraction 위치(0~1, 폭 안에서 왼쪽부터)마다 한 줄씩
function buildFoldLine(checkpoints, fraction) {
  return checkpoints
    .map(({ y, leftX, rightX }, i) => {
      const x = leftX + (rightX - leftX) * fraction;
      return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
    })
    .join(' ');
}

function buildFoldLines(checkpoints, fractions = [0.28, 0.5, 0.72]) {
  return fractions.map((f) => buildFoldLine(checkpoints, f));
}

const silhouette = {};

// 골반까지 직선으로 내려가다 완만한 곡선으로 벌어지는 기본 실루엣
silhouette.aline = (A) => {
  const hemHalf = (A.hipR - A.centerX) + 100;
  const hemL = A.centerX - hemHalf, hemR = A.centerX + hemHalf;
  const foldLines = buildFoldLines([
    { y: A.waistY + 6, leftX: A.waistL, rightX: A.waistR },
    { y: A.hipY, leftX: A.hipL, rightX: A.hipR },
    { y: A.hemY - 6, leftX: hemL, rightX: hemR },
  ]);
  return {
    waistY: A.waistY,
    foldLines,
    d: `M ${A.waistL} ${A.waistY}
        L ${A.hipL} ${A.hipY}
        C ${A.hipL - 15} ${A.hipY + (A.hemY - A.hipY) * 0.35} ${hemL - 10} ${A.hemY - (A.hemY - A.hipY) * 0.35} ${hemL} ${A.hemY}
        L ${hemR} ${A.hemY}
        C ${hemR + 10} ${A.hemY - (A.hemY - A.hipY) * 0.35} ${A.hipR + 15} ${A.hipY + (A.hemY - A.hipY) * 0.35} ${A.hipR} ${A.hipY}
        L ${A.waistR} ${A.waistY} Z`,
  };
};

// 허리 바로 아래에서 빠르게 아치를 그리며 최대 폭에 도달한 뒤, 그 아래로는 거의 수직에
// 가깝게 헴까지 곧게 떨어지는 돔 형태 실루엣 (참고 스케치 기준). 이전 버전은 스커트
// 중간에서 최종 헴 폭보다 더 부풀렸다가 되돌아오는 2단 곡선을 썼는데, 그 부풀린 지점이
// viewBox(0~400) 폭을 벗어나 옆이 잘려 보이는 문제가 있었다 — 지금은 최대 폭이 곧 헴 폭이라
// 그런 문제가 없다
silhouette.ballgown = (A) => {
  const hemHalf = (A.hipR - A.centerX) + 140;
  const hemL = A.centerX - hemHalf, hemR = A.centerX + hemHalf;
  const midY = A.waistY + (A.hemY - A.waistY) * 0.42;
  const midHalf = hemHalf - 15;
  const foldLines = buildFoldLines([
    { y: A.waistY + 6, leftX: A.waistL, rightX: A.waistR },
    { y: midY, leftX: A.centerX - midHalf, rightX: A.centerX + midHalf },
    { y: A.hemY - 6, leftX: hemL, rightX: hemR },
  ]);
  // 아치+수직선으로 잇던 이전 버전은 그 이음매에서 살짝 꺾여 보였다. 허리에서 헴까지
  // 하나의 매끄러운 곡선(직선 구간 없음)으로 그려, 참고 이미지처럼 어디서도 꺾이지 않고
  // 전체가 둥글게 이어지는 벨 형태로 표현한다
  return {
    waistY: A.waistY,
    foldLines,
    d: `M ${A.waistL} ${A.waistY}
        C ${A.waistL - 20} ${A.waistY + (A.hemY - A.waistY) * 0.15} ${hemL} ${A.hemY - 145} ${hemL} ${A.hemY}
        L ${hemR} ${A.hemY}
        C ${hemR} ${A.hemY - 145} ${A.waistR + 20} ${A.waistY + (A.hemY - A.waistY) * 0.15} ${A.waistR} ${A.waistY} Z`,
  };
};

// 무릎까지 몸에 붙어 내려가다 무릎 아래에서만 급격히 벌어지는 실루엣
silhouette.mermaid = (A) => {
  const kneeHalf = (A.hipR - A.centerX) - 15;
  const kneeL = A.centerX - kneeHalf, kneeR = A.centerX + kneeHalf;
  const hemHalf = (A.hipR - A.centerX) + 125;
  const hemL = A.centerX - hemHalf, hemR = A.centerX + hemHalf;
  // 힙까지는 좁게, 무릎에서 살짝 더 좁아졌다가 무릎 아래에서만 벌어지는 실제 핏을 그대로 따라간다
  const foldLines = buildFoldLines([
    { y: A.waistY + 6, leftX: A.waistL, rightX: A.waistR },
    { y: A.hipY, leftX: A.hipL, rightX: A.hipR },
    { y: A.kneeY, leftX: kneeL, rightX: kneeR },
    { y: A.hemY - 6, leftX: hemL, rightX: hemR },
  ]);
  return {
    waistY: A.waistY,
    foldLines,
    d: `M ${A.waistL} ${A.waistY}
        C ${A.waistL - 8} ${A.waistY + (A.hipY - A.waistY) * 0.5} ${A.hipL} ${A.hipY - (A.hipY - A.waistY) * 0.1} ${A.hipL} ${A.hipY}
        C ${A.hipL - 2} ${A.hipY + (A.kneeY - A.hipY) * 0.55} ${kneeL + 3} ${A.kneeY - (A.kneeY - A.hipY) * 0.3} ${kneeL} ${A.kneeY}
        C ${kneeL - 10} ${A.kneeY + (A.hemY - A.kneeY) * 0.3} ${hemL - 40} ${A.hemY - (A.hemY - A.kneeY) * 0.4} ${hemL} ${A.hemY}
        L ${hemR} ${A.hemY}
        C ${hemR + 40} ${A.hemY - (A.hemY - A.kneeY) * 0.4} ${kneeR + 10} ${A.kneeY + (A.hemY - A.kneeY) * 0.3} ${kneeR} ${A.kneeY}
        C ${kneeR - 3} ${A.kneeY - (A.kneeY - A.hipY) * 0.3} ${A.hipR} ${A.hipY + (A.kneeY - A.hipY) * 0.55} ${A.hipR} ${A.hipY}
        C ${A.hipR} ${A.hipY - (A.hipY - A.waistY) * 0.1} ${A.waistR + 8} ${A.waistY + (A.hipY - A.waistY) * 0.5} ${A.waistR} ${A.waistY} Z`,
  };
};

// 골반까지는 머메이드처럼 몸에 붙어 내려가다, 무릎 못미쳐부터 직선 콘(원뿔) 모양으로 곧게 벌어지는 실루엣
// 머메이드(무릎까지 좁아졌다가 급격한 곡선 킥)와도, 아라인(엉덩이부터 바로 곡선 플레어)과도 다른
// 형태여야 하므로 플레어 구간을 곡선이 아닌 직선으로 그려 "트럼펫 벨" 특유의 각진 콘 실루엣을 만든다
silhouette.trumpet = (A) => {
  const flareStartY = A.hipY + (A.kneeY - A.hipY) * 0.5;
  const flareHalf = (A.hipR - A.centerX) - 5;
  const flareStartL = A.centerX - flareHalf, flareStartR = A.centerX + flareHalf;
  const hemHalf = (A.hipR - A.centerX) + 115;
  const hemL = A.centerX - hemHalf, hemR = A.centerX + hemHalf;
  const foldLines = buildFoldLines([
    { y: A.waistY + 6, leftX: A.waistL, rightX: A.waistR },
    { y: A.hipY, leftX: A.hipL, rightX: A.hipR },
    { y: flareStartY, leftX: flareStartL, rightX: flareStartR },
    { y: A.hemY - 6, leftX: hemL, rightX: hemR },
  ]);
  return {
    waistY: A.waistY,
    foldLines,
    d: `M ${A.waistL} ${A.waistY}
        C ${A.waistL - 8} ${A.waistY + (A.hipY - A.waistY) * 0.5} ${A.hipL} ${A.hipY - (A.hipY - A.waistY) * 0.1} ${A.hipL} ${A.hipY}
        C ${A.hipL} ${A.hipY + (flareStartY - A.hipY) * 0.6} ${flareStartL + 2} ${flareStartY - (flareStartY - A.hipY) * 0.25} ${flareStartL} ${flareStartY}
        L ${hemL} ${A.hemY}
        L ${hemR} ${A.hemY}
        L ${flareStartR} ${flareStartY}
        C ${flareStartR - 2} ${flareStartY - (flareStartY - A.hipY) * 0.25} ${A.hipR} ${A.hipY + (flareStartY - A.hipY) * 0.6} ${A.hipR} ${A.hipY}
        C ${A.hipR} ${A.hipY - (A.hipY - A.waistY) * 0.1} ${A.waistR + 8} ${A.waistY + (A.hipY - A.waistY) * 0.5} ${A.waistR} ${A.waistY} Z`,
  };
};

// 곡선 없이 직선으로만 이어지는, 가장 좁고 몸에 붙는 실루엣
silhouette.sheath = (A) => {
  const hemHalf = (A.hipR - A.centerX) + 8;
  const hemL = A.centerX - hemHalf, hemR = A.centerX + hemHalf;
  const foldLines = buildFoldLines([
    { y: A.waistY + 6, leftX: A.waistL, rightX: A.waistR },
    { y: A.hipY, leftX: A.hipL, rightX: A.hipR },
    { y: A.hemY - 6, leftX: hemL, rightX: hemR },
  ]);
  return {
    waistY: A.waistY,
    foldLines,
    d: `M ${A.waistL} ${A.waistY}
        L ${A.hipL} ${A.hipY}
        L ${hemL} ${A.hemY}
        L ${hemR} ${A.hemY}
        L ${A.hipR} ${A.hipY}
        L ${A.waistR} ${A.waistY} Z`,
  };
};

// 유일하게 waistY 자체를 가슴 바로 아래로 올리는 실루엣 — 봉제선 위치가 다르다
silhouette.empire = (A) => {
  const waistY = A.bustY + (A.waistY - A.bustY) * 0.3;
  const bustHalf = A.bustR - A.centerX;
  const waistHalf = A.waistR - A.centerX;
  const empireHalf = bustHalf - (bustHalf - waistHalf) * 0.3;
  const waistL = A.centerX - empireHalf, waistR = A.centerX + empireHalf;
  const hemHalf = (A.hipR - A.centerX) + 90;
  const hemL = A.centerX - hemHalf, hemR = A.centerX + hemHalf;
  const foldLines = buildFoldLines([
    { y: waistY + 6, leftX: waistL, rightX: waistR },
    { y: A.hemY - 6, leftX: hemL, rightX: hemR },
  ]);
  return {
    waistY,
    foldLines,
    d: `M ${waistL} ${waistY}
        C ${waistL - 5} ${waistY + (A.hemY - waistY) * 0.3} ${hemL - 20} ${A.hemY - (A.hemY - waistY) * 0.3} ${hemL} ${A.hemY}
        L ${hemR} ${A.hemY}
        C ${hemR + 20} ${A.hemY - (A.hemY - waistY) * 0.3} ${waistR + 5} ${waistY + (A.hemY - waistY) * 0.3} ${waistR} ${waistY} Z`,
  };
};

// 벨라인(ballgown)과 짝을 이루는 실루엣 — 벨라인은 허리(waistY)에서 바로 풍성하게
// 퍼지지만, 프린세스는 골반(hipY)까지는 시스처럼 몸에 붙어 내려가다가 골반부터 한 번의
// 긴 곡선으로 풍성하게 퍼진다(가슴~헴까지 이어지는 프린세스 심 절개 특유의 라인).
// 벨라인보다 플레어 구간이 짧아(hip~hem) 같은 헴 폭이어도 더 급격하고 드라마틱하게 보인다
// A라인보다 헴 폭이 좁다 — 골반까지 몸에 붙어 있다가 아래로 "툭" 떨어지듯 비교적
// 얌전하게 흐르는 라인이라, 허리부터 넉넉하게 퍼지는 A라인보다 전체적으로 덜 풍성하다
silhouette.princess = (A) => {
  const hemHalf = (A.hipR - A.centerX) + 70;
  const hemL = A.centerX - hemHalf, hemR = A.centerX + hemHalf;
  const midY = A.hipY + (A.hemY - A.hipY) * 0.5;
  const hipHalf = A.hipR - A.centerX;
  const midHalf = hipHalf + (hemHalf - hipHalf) * 0.5;
  const foldLines = buildFoldLines([
    { y: A.waistY + 6, leftX: A.waistL, rightX: A.waistR },
    { y: A.hipY, leftX: A.hipL, rightX: A.hipR },
    { y: midY, leftX: A.centerX - midHalf, rightX: A.centerX + midHalf },
    { y: A.hemY - 6, leftX: hemL, rightX: hemR },
  ]);
  return {
    waistY: A.waistY,
    foldLines,
    d: `M ${A.waistL} ${A.waistY}
        L ${A.hipL} ${A.hipY}
        C ${A.hipL - 6} ${A.hipY + (A.hemY - A.hipY) * 0.5} ${hemL - 15} ${A.hemY - 60} ${hemL} ${A.hemY}
        L ${hemR} ${A.hemY}
        C ${hemR + 15} ${A.hemY - 60} ${A.hipR + 6} ${A.hipY + (A.hemY - A.hipY) * 0.5} ${A.hipR} ${A.hipY}
        L ${A.waistR} ${A.waistY} Z`,
  };
};

// 새 도형을 그리지 않고 기본값(aline)을 재사용한다. 점선 처리는 렌더러가 담당 (SPEC.md §3.4)
silhouette.other = silhouette.aline;

// 넥라인: 보디스 윗변만 그리는 열린 path (좌측 시작점 → 우측 끝점). strapless면 가슴선에서,
// 아니면 어깨점에서 시작/종료한다 — 이 시작/끝점이 곧 좌우 옆선이 이어붙는 지점이다 (SPEC.md §3.2)
const neckline = {};

// 볼록한 두 봉우리 사이 정중앙이 가장 깊게 파이는, 스트랩 없는 하트형 넥라인 (기본값)
neckline.sweetheart = (A) => {
  // 하트 봉우리를 겨드랑이(bustL/R) 가까이 넓게 벌려서, 뾰족한 하트가 아니라 참고 이미지처럼
  // 옆으로 퍼진 통통한 하트가 겨드랑이에 바로 붙어 보이게 한다
  const peakY = A.bustY - 20;
  const dipY = A.bustY + 10;
  const peakHalf = 12;
  const peakL = A.bustL + peakHalf;
  const peakR = A.bustR - peakHalf;
  return {
    strapless: true,
    d: `M ${A.bustL} ${A.bustY}
        Q ${A.bustL - 3} ${peakY - 6} ${peakL} ${peakY}
        C ${peakL + 20} ${peakY + 8} ${A.centerX - 16} ${dipY - 12} ${A.centerX} ${dipY}
        C ${A.centerX + 16} ${dipY - 12} ${peakR - 20} ${peakY + 8} ${peakR} ${peakY}
        Q ${A.bustR + 3} ${peakY - 6} ${A.bustR} ${A.bustY}`,
  };
};

// 스위트하트와 봉우리 위치는 같지만, 중앙 다이가 훨씬 아래로 더 좁고 깊게 파여 가슴골이
// 드러나는 버전 (사용자 요청 — "좀 더 가슴골이 깊게 파인 하트넥")
neckline.sweetheartdeep = (A) => {
  const peakY = A.bustY - 20;
  const dipY = A.bustY + 45;
  const peakHalf = 12;
  const peakL = A.bustL + peakHalf;
  const peakR = A.bustR - peakHalf;
  return {
    strapless: true,
    d: `M ${A.bustL} ${A.bustY}
        Q ${A.bustL - 3} ${peakY - 6} ${peakL} ${peakY}
        C ${peakL + 14} ${peakY + 10} ${A.centerX - 10} ${dipY - 24} ${A.centerX} ${dipY}
        C ${A.centerX + 10} ${dipY - 24} ${peakR - 14} ${peakY + 10} ${peakR} ${peakY}
        Q ${A.bustR + 3} ${peakY - 6} ${A.bustR} ${A.bustY}`,
  };
};

// 어깨점에서 시작해 정중앙에서 뾰족하게 파이는 V자 넥라인
neckline.v = (A) => {
  const vDepth = A.bustY + 20;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        L ${A.centerX} ${vDepth}
        L ${A.shoulderR} ${A.shoulderY}`,
  };
};

// 어깨점에서 시작해 각진 사각형 모양으로 파이는 넥라인
neckline.square = (A) => {
  const notchL = A.centerX - 45, notchR = A.centerX + 45;
  const notchY = A.bustY - 10;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        L ${notchL} ${A.shoulderY}
        L ${notchL} ${notchY}
        L ${notchR} ${notchY}
        L ${notchR} ${A.shoulderY}
        L ${A.shoulderR} ${A.shoulderY}`,
  };
};

// 가슴선에서 시작해(어깨는 드러남) 목 앞에서 좁아져 둥근 앞고리로 마감된다. 목 뒤로
// 넘어가 접히는 부분은 이 앞고리와 겹치는 별도의 둥근 조각(overlay)으로 정면에 그대로
// 노출해 표현한다 — 실제로는 안 보이는 부분이지만, 실루엣을 명확히 남기기 위해 정면에
// 펼쳐 보여주기로 함 (사용자 확인)
neckline.halter = (A) => {
  const neckHalf = 9;
  const frontTopY = A.neckY + 15;
  const overlayBottomY = frontTopY + 8;
  const overlayTopY = A.neckY - 18;
  return {
    strapless: true,
    d: `M ${A.bustL} ${A.bustY}
        Q ${A.centerX - 34} ${A.bustY - 30} ${A.centerX - neckHalf} ${frontTopY}
        Q ${A.centerX} ${frontTopY - 8} ${A.centerX + neckHalf} ${frontTopY}
        Q ${A.centerX + 34} ${A.bustY - 30} ${A.bustR} ${A.bustY}`,
    overlay: `M ${A.centerX - 16} ${overlayBottomY}
        C ${A.centerX - 16} ${overlayTopY} ${A.centerX + 16} ${overlayTopY} ${A.centerX + 16} ${overlayBottomY}
        C ${A.centerX + 16} ${overlayBottomY + 14} ${A.centerX - 16} ${overlayBottomY + 14} ${A.centerX - 16} ${overlayBottomY} Z`,
  };
};

// 어깨점을 넓고 얕게 잇는, 쇄골선을 따라가는 보트넥
neckline.bateau = (A) => {
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.centerX} ${A.shoulderY + 12} ${A.shoulderR} ${A.shoulderY}`,
  };
};

// 어깨점에서 목 가까이까지 높게 차오르는, 비침 소재 패널을 암시하는 넥라인
// 일자 일루전 넥 — 어깨~목 사이 비침 메시(mesh)를 별도 영역으로 표시해, 실제 안감이
// 가슴선을 일자로 가로지르는 라인 위에 비침 소재가 덧대어진 걸 구분해서 보여준다
neckline.illusion = (A) => {
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.centerX} ${A.neckY} ${A.shoulderR} ${A.shoulderY}`,
    mesh: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.centerX} ${A.neckY} ${A.shoulderR} ${A.shoulderY}
        L ${A.bustR} ${A.bustY}
        L ${A.bustL} ${A.bustY} Z`,
  };
};

// 곡선 없이 가슴선을 그대로 가로지르는, 가장 단순한 일자 넥라인
neckline.straight = (A) => {
  return {
    strapless: true,
    d: `M ${A.bustL} ${A.bustY} L ${A.bustR} ${A.bustY}`,
  };
};

// 어깨점에서 시작해 목선을 따라 완만하게 둥근 U자로 파이는 라운드 넥라인.
// 보트넥(아주 얕음)보다는 깊고 스쿱넥(가슴선 가까이 깊음)보다는 얕다
neckline.jewel = (A) => {
  const dipY = A.shoulderY + 40;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.centerX} ${dipY} ${A.shoulderR} ${A.shoulderY}`,
  };
};

// 어깨점에서 시작해 가슴선 가까이까지 넓고 둥글게 깊이 파이는 U자형 넥라인
neckline.scoop = (A) => {
  const dipY = A.shoulderY + 75;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.centerX} ${dipY} ${A.shoulderR} ${A.shoulderY}`,
  };
};

// 트위스트홀터넥(크로스 홀터넥)은 사용자 요청으로 칩 목록/인코딩 배열에서 제거했다. 기존
// 저장 기록 호환을 위해 함수 자체는 남겨둔다 (offshoulder/keyhole/highneck과 같은 이유)
neckline.twisthalter = (A) => {
  const neckHalf = 9;
  const frontTopY = A.neckY + 15;
  const pinchHalf = 15;
  const pinchY = A.bustY - 32;
  const overlayBottomY = frontTopY + 8;
  const overlayTopY = A.neckY - 8;

  // 채워진 도형만으로는 꼬임이 잘 안 보여서, 실제 교차점 위치를 계산해 짧은 강조선을
  // 얹는다(실루엣의 주름선과 같은 개념 — 판단에 영향 없는 순수 장식용). 교차점은
  // bustL→(centerX+pinchHalf, pinchY) 직선이 x=centerX를 지나는 지점
  const t = (A.centerX - A.bustL) / (A.centerX + pinchHalf - A.bustL);
  const crossY = A.bustY + t * (pinchY - A.bustY);

  return {
    strapless: true,
    d: `M ${A.bustL} ${A.bustY}
        L ${A.centerX + pinchHalf} ${pinchY}
        L ${A.centerX + neckHalf} ${frontTopY}
        L ${A.centerX - neckHalf} ${frontTopY}
        L ${A.centerX - pinchHalf} ${pinchY}
        L ${A.bustR} ${A.bustY}`,
    overlay: `M ${A.centerX - neckHalf - 3} ${overlayBottomY}
        Q ${A.centerX - neckHalf - 6} ${overlayTopY + 6} ${A.centerX - neckHalf + 1} ${overlayTopY}
        Q ${A.centerX} ${overlayTopY - 6} ${A.centerX + neckHalf - 1} ${overlayTopY}
        Q ${A.centerX + neckHalf + 6} ${overlayTopY + 6} ${A.centerX + neckHalf + 3} ${overlayBottomY}
        Q ${A.centerX} ${overlayBottomY + 9} ${A.centerX - neckHalf - 3} ${overlayBottomY} Z`,
    detailLines: [
      `M ${A.centerX - 16} ${crossY - 12} L ${A.centerX + 16} ${crossY + 12}`,
      `M ${A.centerX + 16} ${crossY - 12} L ${A.centerX - 16} ${crossY + 12}`,
    ],
  };
};

// 새 도형을 그리지 않고 기본값(sweetheart)을 재사용한다 (SPEC.md §3.4, §4 기본값)
neckline.other = neckline.sweetheart;

// bardot(바르도넥)은 카테고리를 잘못 짚어서(넥라인이 아니라 소매 계열) 잠깐 넣었다가
// 뺐다 — 그 짧은 사이에 이미 골라서 저장한 기록이 있을 수 있어 함수는 남겨둔다
neckline.bardot = (A) => {
  const dipY = A.bustY + 18;
  return {
    strapless: true,
    d: `M ${A.bustL} ${A.bustY} Q ${A.centerX} ${dipY} ${A.bustR} ${A.bustY}`,
  };
};

// offshoulder/keyhole/highneck은 칩 목록/인코딩 배열에서는 뺐지만(사용자 요청), 이 세 값을
// 이미 저장한 기존 기록이 있으면 렌더링 시 neckline[id]가 함수를 못 찾아 앱 전체가
// 하얗게 죽는 치명적 버그가 있었다 — 기존 기록 호환을 위해 함수 자체는 남겨둔다
neckline.offshoulder = (A) => {
  const offY = A.bustY - 15;
  return {
    strapless: true,
    d: `M ${A.bustL} ${offY}
        Q ${A.centerX} ${offY - 6} ${A.bustR} ${offY}`,
  };
};

neckline.keyhole = (A) => {
  const dipY = A.shoulderY + 55;
  const holeTopY = dipY + 10;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.centerX} ${dipY} ${A.shoulderR} ${A.shoulderY}`,
    detailLines: [
      `M ${A.centerX} ${holeTopY}
       Q ${A.centerX - 8} ${holeTopY + 8} ${A.centerX - 6} ${holeTopY + 16}
       Q ${A.centerX - 4} ${holeTopY + 24} ${A.centerX} ${holeTopY + 24}
       Q ${A.centerX + 4} ${holeTopY + 24} ${A.centerX + 6} ${holeTopY + 16}
       Q ${A.centerX + 8} ${holeTopY + 8} ${A.centerX} ${holeTopY} Z`,
    ],
  };
};

neckline.highneck = (A) => {
  const collarTopY = A.neckY - 25;
  const neckHalf = 20;
  const holeTopY = collarTopY + 18;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.shoulderL + 5} ${A.neckY + 5} ${A.centerX - neckHalf} ${collarTopY + 15}
        Q ${A.centerX - neckHalf + 3} ${collarTopY} ${A.centerX} ${collarTopY - 4}
        Q ${A.centerX + neckHalf - 3} ${collarTopY} ${A.centerX + neckHalf} ${collarTopY + 15}
        Q ${A.shoulderR - 5} ${A.neckY + 5} ${A.shoulderR} ${A.shoulderY}`,
    detailLines: [
      `M ${A.centerX} ${holeTopY}
       Q ${A.centerX - 6} ${holeTopY + 6} ${A.centerX - 4} ${holeTopY + 12}
       Q ${A.centerX - 3} ${holeTopY + 18} ${A.centerX} ${holeTopY + 18}
       Q ${A.centerX + 3} ${holeTopY + 18} ${A.centerX + 4} ${holeTopY + 12}
       Q ${A.centerX + 6} ${holeTopY + 6} ${A.centerX} ${holeTopY} Z`,
    ],
  };
};

// 참고 사진 기준 퀸앤넥: 양쪽 어깨점에서 시작한 스트랩이 쇄골 높이에서 서로 반대편으로
// 넘어가며 교차해(X자) 목 아래 한 점으로 모인다. 좌우 스트랩의 끝점을 반대쪽으로 바꿔치기해
// 교차를 실제로 만드는 것은 트위스트홀터넥과 같은 기법 — 여기서는 어깨에 붙는 넥라인이라
// 교차 위치가 더 높고(쇄골) 모이는 지점은 목 아래로 더 낮다
neckline.queenanne = (A) => {
  const pinchHalf = 18;
  const crossY = A.shoulderY + 25;
  const pointY = A.bustY - 15;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        L ${A.centerX + pinchHalf} ${crossY}
        L ${A.centerX} ${pointY}
        L ${A.centerX - pinchHalf} ${crossY}
        L ${A.shoulderR} ${A.shoulderY}`,
  };
};

// 어깨점에서 정중앙으로 깊게 파이는 V 위에, 양쪽 어깨에서 반대쪽 가슴으로 교차해
// 내려가는 랩(wrap) 자락 선을 강조선으로 얹어 서플리스 특유의 겹침을 표현한다
neckline.surplice = (A) => {
  const vDepth = A.bustY + 35;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        L ${A.centerX} ${vDepth}
        L ${A.shoulderR} ${A.shoulderY}`,
    detailLines: [
      `M ${A.shoulderL} ${A.shoulderY} L ${A.waistR - 15} ${A.waistY - 10}`,
      `M ${A.shoulderR} ${A.shoulderY} L ${A.waistL + 15} ${A.waistY - 10}`,
    ],
  };
};

// 하트 일루전 넥 — 어깨~목 사이 비침 메시 아래로 하트(스위트하트)형 안감이 비치는 넥라인.
// 일자 일루전 넥과 바깥쪽 어깨~목 곡선은 같고, 메시 안쪽 경계(안감 모양)만 하트로 다르다
neckline.illusionheart = (A) => {
  const peakY = A.bustY - 20;
  const dipY = A.bustY + 10;
  const peakHalf = 12;
  const peakL = A.bustL + peakHalf;
  const peakR = A.bustR - peakHalf;
  // 메시 영역의 안쪽 경계로 하트 곡선을 반대 방향(bustR → bustL)으로 그대로 되짚어가야
  // 도형이 닫힌다 — 각 구간의 컨트롤 포인트 순서도 함께 뒤집는다
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.centerX} ${A.neckY} ${A.shoulderR} ${A.shoulderY}`,
    mesh: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.centerX} ${A.neckY} ${A.shoulderR} ${A.shoulderY}
        L ${A.bustR} ${A.bustY}
        Q ${A.bustR + 3} ${peakY - 6} ${peakR} ${peakY}
        C ${peakR - 20} ${peakY + 8} ${A.centerX + 16} ${dipY - 12} ${A.centerX} ${dipY}
        C ${A.centerX - 16} ${dipY - 12} ${peakL + 20} ${peakY + 8} ${peakL} ${peakY}
        Q ${A.bustL - 3} ${peakY - 6} ${A.bustL} ${A.bustY} Z`,
  };
};

// 실루엣이 쓰는 waistY가 기본 허리선(A.waistY)이 아닐 때(엠파이어처럼 가슴 아래로 올라간 경우)
// 가슴선~기본 허리선 사이를 보간해 그 높이에서의 좌우 폭을 구한다. waistY가 A.waistY면 그대로 A.waistL/R
function waistPointsAt(A, waistY) {
  const t = (waistY - A.bustY) / (A.waistY - A.bustY);
  const bustHalf = A.bustR - A.centerX;
  const waistHalf = A.waistR - A.centerX;
  const half = bustHalf - (bustHalf - waistHalf) * t;
  return { waistL: A.centerX - half, waistR: A.centerX + half };
}

// 넥라인 path의 앞머리 "M x y" 명령만 제거해, 옆선이 그 좌표에 도착한 다음 이어그릴 수 있게 한다
function stripMove(d) {
  return d.replace(/^\s*M\s*[-\d.]+\s+[-\d.]+/, '');
}

// 보디스 = 넥라인이 정하는 윗변 + 좌우 옆선 + (실루엣이 쓰는) 허리선.
// 넥라인이 detailLines(예: 트위스트홀터의 교차 강조선)를 갖고 있으면 그대로 반환해
// buildFullDressSvg가 보디스 위에 얹을 수 있게 한다
function buildBodice(A, necklineId, waistY, sleeveId) {
  const { waistL, waistR } = waistPointsAt(A, waistY);
  const { d: necklineD, strapless, detailLines, overlay, mesh } = neckline[necklineId](A);
  const necklineRest = stripMove(necklineD);
  const hasSleeve = sleeveId !== 'none';

  // 스트랩리스는 옆선이 가슴선(bustY)에서 뚝 끊긴다. 소매가 있으면 어깨점에 붙는 소매와
  // 사이에 빈 틈이 크게 보이는 문제가 있어서 옆선을 어깨점까지 올려 이어주지만, 소매가
  // 없을 때(민소매)까지 옆선을 올리면 아무 데도 안 이어지는 스트랩처럼 어색하게 남는다 —
  // 그래서 소매가 있을 때만 옆선을 올린다. 홀터 계열(홀터/트위스트홀터)은 목으로 올라가는
  // 자기 스트랩이 이미 있어서, 옆선까지 어깨로 올리면 이중 스트랩처럼 보여 이 둘은 소매
  // 유무와 무관하게 항상 가슴선에서 끊는다. 오프숄더 밴드 계열(리본/민무늬/폴드칼라)은
  // 어깨점이 아니라 어깨 아래 팔뚝을 가로질러 붙는 소매라 옆선을 어깨까지 올리면 오프숄더
  // 특유의 맨 어깨가 끈으로 가려져 버린다. 콜드숄더도 어깨점에 붙지 않고 팔 중간에 떠 있는
  // 개더 퍼프라 마찬가지로 제외한다 — 그래서 이 계열은 항상 가슴선에서 끊는다
  const useWing = strapless && hasSleeve && necklineId !== 'halter' && necklineId !== 'twisthalter'
    && sleeveId !== 'offshoulder' && sleeveId !== 'offshoulderplain' && sleeveId !== 'offshoulderfold'
    && sleeveId !== 'coldshoulder';
  const sideTopY = useWing ? A.shoulderY : A.bustY;
  const sideTopL = useWing ? A.shoulderL : A.bustL;
  const sideTopR = useWing ? A.shoulderR : A.bustR;
  const d = strapless
    ? `M ${waistL} ${waistY}
        Q ${A.bustL - 4} ${A.bustY + (waistY - A.bustY) * 0.5} ${sideTopL} ${sideTopY}
        L ${A.bustL} ${A.bustY}
        ${necklineRest}
        L ${sideTopR} ${sideTopY}
        Q ${A.bustR + 4} ${A.bustY + (waistY - A.bustY) * 0.5} ${waistR} ${waistY} Z`
    : `M ${waistL} ${waistY}
      C ${waistL} ${A.bustY} ${A.shoulderL + (A.bustL - A.shoulderL) * 0.3} ${A.shoulderY + (A.bustY - A.shoulderY) * 0.75} ${A.shoulderL} ${A.shoulderY}
      ${necklineRest}
      C ${A.shoulderR - (A.shoulderR - A.bustR) * 0.3} ${A.shoulderY + (A.bustY - A.shoulderY) * 0.75} ${waistR} ${A.bustY} ${waistR} ${waistY} Z`;

  return { d, detailLines: detailLines || [], overlay: overlay || null, mesh: mesh || null };
}

// 소매 한쪽(기준점 topY, 기본은 어깨점)을 그리는 헬퍼. side: 왼쪽=-1(shoulderL), 오른쪽=1(shoulderR)
// reachX/reachY = 기준점에서 소매 끝까지의 가로/세로 거리, bulge = 바깥쪽으로 부푸는 정도,
// cuffHalf = 소매 끝(손목 쪽) 폭의 절반. 위쪽도 topHalf만큼 폭을 둬서, 한 점으로
// 뾰족하게 모이는 리본이 아니라 원통형 팔처럼 두께가 있게 만든다. topY를 어깨점보다
// 아래로 주면(콜드숄더처럼) 팔 중간부터 시작하는 소매 조각도 그릴 수 있다
function sleevePetal(A, side, reachX, reachY, bulge, cuffHalf, topY = A.shoulderY) {
  const shoulderX = side === -1 ? A.shoulderL : A.shoulderR;
  const topHalf = 6;
  const outX = shoulderX + side * reachX;
  const outY = topY + reachY;
  const topInner = shoulderX - side * topHalf * 0.4;
  const topOuter = shoulderX + side * topHalf * 0.6;
  const botOuter = outX + side * cuffHalf;
  const botInner = outX - side * cuffHalf;
  return `M ${topInner} ${topY}
      L ${topOuter} ${topY}
      C ${topOuter + side * bulge} ${topY + reachY * 0.3} ${botOuter + side * bulge * 0.3} ${outY - reachY * 0.25} ${botOuter} ${outY}
      L ${botInner} ${outY}
      C ${topInner - side * bulge * 0.25} ${topY + reachY * 0.35} ${topInner - side * bulge * 0.1} ${topY + reachY * 0.1} ${topInner} ${topY} Z`;
}

// 소매: 어깨점 기준 좌우 대칭 path (SPEC.md §3.2). 두 소매를 하나의 d에 서브패스로 담는다
const sleeve = {};
sleeve.none = () => ({ d: '' });
sleeve.cap = (A) => ({ d: `${sleevePetal(A, -1, 15, 30, 18, 15)} ${sleevePetal(A, 1, 15, 30, 18, 15)}` });
sleeve.short = (A) => ({ d: `${sleevePetal(A, -1, 8, 75, 20, 11)} ${sleevePetal(A, 1, 8, 75, 20, 11)}` });
sleeve.long = (A) => ({ d: `${sleevePetal(A, -1, 4, 180, 13, 7)} ${sleevePetal(A, 1, 4, 180, 13, 7)}` });
sleeve.puff = (A) => ({ d: `${sleevePetal(A, -1, 24, 42, 36, 10)} ${sleevePetal(A, 1, 24, 42, 36, 10)}` });
// 새 도형을 그리지 않고 기본값(none, 즉 민소매)을 재사용한다 (SPEC.md §3.4, §4 기본값)
sleeve.other = sleeve.none;
// detachable(탈부착소매)은 칩 목록/인코딩 배열에서는 뺐지만, 이미 저장한 기존 기록이
// sleeve:'detachable'을 참조하면 sleeve[id]가 함수를 못 찾아 앱이 하얗게 죽는다 —
// 기존 기록 호환을 위해 긴소매 모양으로라도 안전하게 렌더링되게 남겨둔다
sleeve.detachable = sleeve.long;

// 콜드숄더 소매 — 처음엔 "어깨 아래 컷아웃 + 팔뚝까지 이어지는 긴소매"로 만들었는데,
// 참고 사진을 다시 보니 반대였다: 어깨 위에만 개더(주름)진 퍼프가 뭉쳐 있고 그 아래
// 위팔·팔뚝은 전부 맨살로 남는 형태. 퍼프소매(sleeve.puff)처럼 하나의 큰 풍선이 아니라,
// 작은 퍼프 3개가 어깨선을 따라 겹쳐서 개더진 질감을 낸다 (사용자 확인)
sleeve.coldshoulder = (A) => {
  // 겹치는 타원 3개를 각자 닫힌 subpath로 그렸더니, 채우기는 하나로 합쳐져도 테두리
  // 선(stroke)은 타원마다 따로 그려져서 도넛/링 여러 개가 겹친 것처럼 보였다 — 하나의
  // 연속된 경로(개더 파도 모양)로 다시 그려서 외곽선이 한 번만 매끄럽게 그려지게 했다
  // 어깨 관절 바로 위가 아니라 위팔 쪽으로 좀 더 내려와 있어야 한다는 피드백 — 팔이
  // 팔꿈치 쪽으로 갈수록 살짝 좁아지는 정도만큼 안쪽으로도 소폭 당겨준다
  const dropY = 45;
  const puffCluster = (shoulderX) => {
    const width = 36;
    const bumpW = width / 3;
    const inward = shoulderX < A.centerX ? 2 : -2;
    const x0 = shoulderX - width / 2 + inward;
    const topY = A.shoulderY - 6 + dropY;
    const midY = A.shoulderY + 6 + dropY;
    const botY = A.shoulderY + 18 + dropY;
    return `M ${x0} ${midY}
        Q ${x0 + bumpW * 0.5} ${topY} ${x0 + bumpW} ${midY}
        Q ${x0 + bumpW * 1.5} ${topY} ${x0 + bumpW * 2} ${midY}
        Q ${x0 + bumpW * 2.5} ${topY} ${x0 + bumpW * 3} ${midY}
        Q ${x0 + bumpW * 2.5} ${botY} ${x0 + bumpW * 1.5} ${botY + 4}
        Q ${x0 + bumpW * 0.5} ${botY} ${x0} ${midY} Z`;
  };
  return { d: `${puffCluster(A.shoulderL)} ${puffCluster(A.shoulderR)}` };
};

// 오프숄더 밴드 소매 — 팔 위를 가로지르는 넓은 밴드가 어깨 바깥까지 뻗는 모양(참고 이미지
// 기준). 다른 소매처럼 어깨점에서 아래로 늘어지는 게 아니라, 어깨점을 가로질러 좌우로
// 뻗는 구조라 별도로 만든다. 밴드 도형 자체는 매듭 있는/없는 버전이 공유한다
function offshoulderBand(A) {
  const topY = A.bustY - 28;
  const dipTopY = A.bustY - 8;
  const bandBottomY = A.bustY + 8;
  const dipBottomY = A.bustY + 20;
  const outReach = 26;
  const outL = A.shoulderL - outReach;
  const outR = A.shoulderR + outReach;

  return {
    d: `M ${outL} ${topY + 10}
        Q ${A.shoulderL - 6} ${topY} ${A.centerX - 14} ${dipTopY}
        Q ${A.centerX} ${dipTopY + 10} ${A.centerX + 14} ${dipTopY}
        Q ${A.shoulderR + 6} ${topY} ${outR} ${topY + 10}
        L ${outR - 6} ${bandBottomY + 6}
        Q ${A.shoulderR} ${bandBottomY + 10} ${A.centerX + 12} ${dipBottomY}
        Q ${A.centerX} ${dipBottomY + 12} ${A.centerX - 12} ${dipBottomY}
        Q ${A.shoulderL} ${bandBottomY + 10} ${outL - 6} ${bandBottomY + 6} Z`,
    dipTopY,
    dipBottomY,
  };
}

// 매듭(리본) 있는 버전 — 참고 이미지 중 중앙 앞에서 천이 모여 매듭지는 스타일
sleeve.offshoulder = (A) => {
  const { d: band, dipTopY, dipBottomY } = offshoulderBand(A);
  const knotHalf = 10;
  const knotCy = (dipTopY + dipBottomY) / 2 + 5;
  const knotRy = 9;
  const knot = `M ${A.centerX - knotHalf} ${knotCy}
      C ${A.centerX - knotHalf} ${knotCy - knotRy} ${A.centerX + knotHalf} ${knotCy - knotRy} ${A.centerX + knotHalf} ${knotCy}
      C ${A.centerX + knotHalf} ${knotCy + knotRy} ${A.centerX - knotHalf} ${knotCy + knotRy} ${A.centerX - knotHalf} ${knotCy} Z`;

  return { d: `${band} ${knot}` };
};

// 매듭 없는 버전 — 참고 이미지 중 밴드만 두르고 중앙에 별다른 장식이 없는 스타일 (사용자 요청)
sleeve.offshoulderplain = (A) => ({ d: offshoulderBand(A).d });

// 폴드칼라 버전 — 원래 "바르도넥"으로 잘못 분류했던 참고 이미지(세일러 칼라처럼 넓은 밴드가
// 뒤집혀 접힌 채 가운데서 V자로 만나는 형태, 배색 트림 포함). 매듭 대신 밴드 바로 안쪽에
// 접힘선을 한 겹 더 그려서 "칼라가 뒤집혀 접혀 있다"는 걸 표현한다 (사용자 확인)
sleeve.offshoulderfold = (A) => {
  const { d: band, dipTopY } = offshoulderBand(A);
  const topY = A.bustY - 28;
  const outReach = 26;
  const outL = A.shoulderL - outReach;
  const outR = A.shoulderR + outReach;
  const foldLine = `M ${outL + 5} ${topY + 15}
      Q ${A.shoulderL - 4} ${topY + 10} ${A.centerX - 13} ${dipTopY + 9}
      Q ${A.centerX} ${dipTopY + 16} ${A.centerX + 13} ${dipTopY + 9}
      Q ${A.shoulderR + 4} ${topY + 10} ${outR - 5} ${topY + 15}`;
  return { d: band, detailLines: [foldLine] };
};

// 텍스처: <pattern> 타일로 정의해 fill="url(#...)"로 참조한다 (SPEC.md §3.3). 미묘하게 —
// 특히 레이스는 튤(균일한 그물망)과 달리 불규칙하게 흩뿌린 작은 점으로 그려 net 무늬로 안 보이게 한다
// 배경색은 var(--dress-fill)이 아니라 실제 값을 그대로 쓴다 — 이미지 내보내기(§5.1)에서
// SVG를 독립 리소스로 직렬화하면 원본 문서의 CSS 변수를 못 읽어 검게 나오는 문제가 있었다
// 원단(소재) 패턴 — 파츠 도형 전체를 덮는 불투명 배경(#FBF8F4)을 깐다
const MATERIAL_TILE = {
  satin:   { size: 40, html: '<rect width="40" height="40" fill="#FBF8F4"/><line x1="0" y1="40" x2="40" y2="0" stroke="#00000012" stroke-width="8"/>' },
  mikado:  { size: 20, html: '<rect width="20" height="20" fill="#FBF8F4"/><line x1="0" y1="0" x2="20" y2="20" stroke="#00000010" stroke-width="1"/><line x1="20" y1="0" x2="0" y2="20" stroke="#00000010" stroke-width="1"/>' },
  tulle:   { size: 14, html: '<rect width="14" height="14" fill="#FBF8F4"/><path d="M0 0 L14 14 M14 0 L0 14" stroke="#00000018" stroke-width="0.6"/>' },
  organza: { size: 10, html: '<rect width="10" height="10" fill="#FBF8F4"/><line x1="0" y1="0" x2="0" y2="10" stroke="#00000014" stroke-width="0.5"/><line x1="0" y1="0" x2="10" y2="0" stroke="#00000014" stroke-width="0.5"/>' },
  crepe:   { size: 16, html: '<rect width="16" height="16" fill="#FBF8F4"/><circle cx="4" cy="4" r="0.6" fill="#00000010"/><circle cx="12" cy="9" r="0.6" fill="#0000000c"/><circle cx="7" cy="13" r="0.6" fill="#00000010"/>' },
  taffeta: { size: 16, html: '<rect width="16" height="16" fill="#FBF8F4"/><line x1="0" y1="8" x2="16" y2="8" stroke="#00000018" stroke-width="1"/><line x1="8" y1="0" x2="8" y2="16" stroke="#00000018" stroke-width="1"/>' },
  chiffon: { size: 24, html: '<rect width="24" height="24" fill="#FBF8F4"/><path d="M0 6 Q6 2 12 6 T24 6" stroke="#00000012" stroke-width="0.6" fill="none"/><path d="M0 18 Q6 14 12 18 T24 18" stroke="#00000010" stroke-width="0.6" fill="none"/>' },
  illusiontulle: { size: 8, html: '<rect width="8" height="8" fill="#FBF8F4"/><path d="M0 0 L8 8 M8 0 L0 8" stroke="#00000010" stroke-width="0.4"/>' },
};
MATERIAL_TILE.other = MATERIAL_TILE.satin; // 새 도형 없이 기본값(satin) 재사용 (SPEC.md §4 기본값)
// 예전 texture(레이스/비즈) 기록이 혹시 마이그레이션 없이 넘어와도 죽지 않도록 하는 안전망
MATERIAL_TILE.lace = MATERIAL_TILE.satin;
MATERIAL_TILE.beaded = MATERIAL_TILE.satin;

// 오버레이(장식) 패턴 — 배경 rect 없이 장식 무늬만 그려서, 밑에 깐 원단 패턴이 무늬 사이로
// 비쳐 보이게 한다 (오버레이는 원단 위에 겹쳐 얹는 개념이라 자체 배경이 있으면 안 된다)
const OVERLAY_TILE = {
  embroiderylace: { size: 22, html: '<circle cx="4" cy="5" r="1.2" fill="#00000022"/><circle cx="15" cy="3" r="0.8" fill="#0000001a"/><circle cx="9" cy="13" r="1.4" fill="#00000022"/><circle cx="18" cy="17" r="1" fill="#0000001a"/><circle cx="3" cy="18" r="0.9" fill="#00000018"/>' },
  chemicallace: { size: 30, html: '<circle cx="15" cy="15" r="4" fill="none" stroke="#00000038" stroke-width="1.2"/><circle cx="15" cy="15" r="1.4" fill="#00000030"/><circle cx="2" cy="2" r="1.6" fill="#00000024"/><circle cx="28" cy="28" r="1.6" fill="#00000024"/>' },
  beads: { size: 26, html: '<circle cx="13" cy="13" r="1.8" fill="#00000028"/><circle cx="12.3" cy="12.3" r="0.6" fill="#ffffff90"/>' },
  pearl: { size: 32, html: '<circle cx="16" cy="16" r="2.4" fill="#00000018"/><circle cx="15" cy="15" r="0.9" fill="#ffffffb0"/>' },
  glitter: { size: 16, html: '<circle cx="3" cy="4" r="0.5" fill="#00000030"/><circle cx="11" cy="2" r="0.4" fill="#00000024"/><circle cx="7" cy="9" r="0.5" fill="#00000030"/><circle cx="13" cy="12" r="0.4" fill="#00000020"/><circle cx="2" cy="13" r="0.4" fill="#00000024"/>' },
  flower3d: { size: 40, html: '<g transform="translate(20,20)" fill="none" stroke="#00000030" stroke-width="1"><circle r="3" cx="0" cy="-5"/><circle r="3" cx="4.8" cy="-1.5"/><circle r="3" cx="3" cy="4"/><circle r="3" cx="-3" cy="4"/><circle r="3" cx="-4.8" cy="-1.5"/></g><circle cx="20" cy="20" r="1.2" fill="#00000030"/>' },
  applique: { size: 46, html: '<path d="M23 10 C30 14 30 26 23 32 C16 26 16 14 23 10 Z" fill="none" stroke="#00000030" stroke-width="1.2"/><circle cx="23" cy="21" r="1.4" fill="#00000024"/>' },
};

let texturePatternCounter = 0;
// svg 자신의 <defs>에 유일한 id로 패턴을 등록하고, fill 속성에 쓸 url(#...) 문자열을 반환한다
// (문서 전체에서 <svg>가 여러 개이므로 id 충돌을 피하려면 매번 새 id를 만들어야 한다)
function registerPatternFromTile(svgNS, defs, tileDict, id, prefix) {
  texturePatternCounter += 1;
  const patId = `${prefix}-${id}-${texturePatternCounter}`;
  const tile = tileDict[id];
  const pattern = document.createElementNS(svgNS, 'pattern');
  pattern.setAttribute('id', patId);
  pattern.setAttribute('patternUnits', 'userSpaceOnUse');
  pattern.setAttribute('width', tile.size);
  pattern.setAttribute('height', tile.size);
  pattern.innerHTML = tile.html;
  defs.appendChild(pattern);
  return `url(#${patId})`;
}
function registerMaterialPattern(svgNS, defs, materialId) {
  return registerPatternFromTile(svgNS, defs, MATERIAL_TILE, materialId, 'mat');
}
function registerOverlayPattern(svgNS, defs, overlayId) {
  return registerPatternFromTile(svgNS, defs, OVERLAY_TILE, overlayId, 'ovl');
}

// 모든 넥라인 밑에 깔리는 기본 마네킹(목~어깨~가슴 상단) 윤곽선. 넥라인 도형이 단독으로는
// 허공에 뜬 것처럼 어색해 보이는 문제를, 각 넥라인을 손질하는 대신 공통 배경 실루엣을 깔아
// 해결한다 — 보디스가 그 위를 덮으므로 네크라인이 파인 부분에서만 드러난다
function torsoBase(A) {
  const neckHalf = 10;
  const neckTopY = A.neckY - 22;
  const tuckY = A.shoulderY - 10;
  const waistInY = A.bustY + 10;
  // 어깨 아래에서 가슴 폭보다도 더 좁게 들어가는 지점 — 어깨선(shoulderL/R)은 그대로 두되
  // 그 아래를 확 좁혀서, 넓적한 사각 몸통이 아니라 잘록한 실루엣으로 보이게 한다
  const waistInHalf = (A.bustR - A.bustL) / 2 - 10;
  return `M ${A.centerX - neckHalf} ${neckTopY}
      L ${A.centerX - neckHalf} ${tuckY}
      Q ${A.centerX - neckHalf - 6} ${A.shoulderY - 4} ${A.shoulderL} ${A.shoulderY}
      Q ${A.shoulderL + 6} ${A.bustY - 5} ${A.centerX - waistInHalf} ${waistInY}
      L ${A.centerX + waistInHalf} ${waistInY}
      Q ${A.shoulderR - 6} ${A.bustY - 5} ${A.shoulderR} ${A.shoulderY}
      Q ${A.centerX + neckHalf + 6} ${A.shoulderY - 4} ${A.centerX + neckHalf} ${tuckY}
      L ${A.centerX + neckHalf} ${neckTopY}
      Q ${A.centerX} ${neckTopY - 6} ${A.centerX - neckHalf} ${neckTopY} Z`;
}

// 마네킹 팔 — torsoBase만으로는 어깨 아래가 허전해 보이고, 특히 소매가 두께 없이 평면적으로
// 보인다는 피드백에 따라 팔 범위까지 마네킹을 늘린다. 어깨점(A.shoulderL/R)에서 시작해
// 팔꿈치 근처에서 살짝 안쪽으로, 손목(대략 엉덩이 높이)에서 다시 살짝 바깥으로 나가는
// 자연스러운 팔 자세를 원통형 두께로 표현한다
function armBase(A, side) {
  const shoulderX = side === -1 ? A.shoulderL : A.shoulderR;
  const cuffHalf = 5;
  const elbowY = A.shoulderY + 110;
  const wristY = A.shoulderY + 190;
  const elbowX = shoulderX + side * 4;
  const wristX = shoulderX + side * 7;
  const botOuter = wristX + side * cuffHalf;
  const botInner = wristX - side * cuffHalf;
  // 어깨점에서 폭 없이 한 점으로 시작해(topHalf 없음) 곧바로 팔뚝으로 부풀린다 — 폭을 두면
  // 스퀘어넥/브이넥처럼 스트랩이 좁은 넥라인에서 스트랩과 팔 사이에 삼각형 틈이 보였다.
  // 옷에 비해 마네킹이 두꺼워 보인다는 피드백에 따라 팔 두께 자체를 전체적으로 가늘게 줄임
  return `M ${shoulderX} ${A.shoulderY}
      C ${shoulderX + side * 8} ${A.shoulderY + 25} ${elbowX + side * (cuffHalf + 3)} ${elbowY - 20} ${elbowX + side * cuffHalf} ${elbowY}
      C ${elbowX + side * (cuffHalf - 1)} ${elbowY + 25} ${botOuter} ${wristY - 25} ${botOuter} ${wristY}
      L ${botInner} ${wristY}
      C ${elbowX - side * (cuffHalf - 1)} ${wristY - 25} ${elbowX - side * cuffHalf} ${elbowY + 25} ${elbowX - side * cuffHalf} ${elbowY}
      C ${elbowX - side * (cuffHalf + 3)} ${elbowY - 20} ${shoulderX - side * 6} ${A.shoulderY + 25} ${shoulderX} ${A.shoulderY} Z`;
}

// 트레인(허리 라인/뒷모습과 함께 §10에서 "그림에 반영 안 함"이었다가, 눌러도 차이가
// 안 보인다는 피드백을 받아 실제 스케치에 반영하기로 바꾼 항목 중 하나) — 헴 라인
// 뒤에서 자락이 흘러나오는 모양. 스커트보다 먼저 그려 밑단 옆/아래로만 살짝 비치게 한다.
// topHalf는 어떤 실루엣의 헴 폭보다도 살짝 좁게 잡아, 폭이 넓은 볼가운 등에서는 자락이
// 헴 라인 바로 아래에서만 드러나고 위쪽은 스커트에 가려지게 한다
const TRAIN_SHAPE = {
  sweep:     { extend: 15, flare: 12 },
  chapel:    { extend: 35, flare: 25 },
  cathedral: { extend: 55, flare: 40 },
};
function buildTrainPath(A, trainId) {
  const cfg = TRAIN_SHAPE[trainId];
  if (!cfg) return null;
  const topHalf = 175;
  const botHalf = topHalf + cfg.flare;
  const trainY = A.hemY + cfg.extend;
  return `M ${A.centerX - topHalf} ${A.hemY}
      Q ${A.centerX - botHalf} ${A.hemY + cfg.extend * 0.55} ${A.centerX - botHalf * 0.92} ${trainY}
      Q ${A.centerX} ${trainY + 8} ${A.centerX + botHalf * 0.92} ${trainY}
      Q ${A.centerX + botHalf} ${A.hemY + cfg.extend * 0.55} ${A.centerX + topHalf} ${A.hemY} Z`;
}

// 허리 라인 속성 — 보디스/스커트가 실제로 갈리는 위치(waistY, 실루엣마다 다름)와는 별개로,
// "이 지점에 허리 장식/시접이 있다"는 새시 느낌의 강조선을 얹어 종류별로 눈에 띄게 한다
const WAIST_SEAM_Y = {
  natural: (A) => A.waistY,
  drop: (A) => A.waistY + 35,
  empire: (A) => A.bustY + (A.waistY - A.bustY) * 0.3,
};
function buildWaistSeamPath(A, waistId) {
  const half = A.waistR - A.centerX + 8;
  if (waistId === 'basque') {
    const sideY = A.waistY - 8;
    const dipY = A.waistY + 24;
    return `M ${A.centerX - half} ${sideY}
        Q ${A.centerX - half * 0.4} ${sideY + 6} ${A.centerX} ${dipY}
        Q ${A.centerX + half * 0.4} ${sideY + 6} ${A.centerX + half} ${sideY}`;
  }
  const getY = WAIST_SEAM_Y[waistId] || WAIST_SEAM_Y.natural;
  const y = getY(A);
  return `M ${A.centerX - half} ${y} L ${A.centerX + half} ${y}`;
}

// 뒷모습 — 정면 스케치로는 절대 표현이 안 되는 항목이라, 넥라인 칩과 같은 방식으로
// 뒷모습 전용 작은 미리보기를 따로 만든다(메인 스케치/내보내기에는 관여하지 않는다)
const BACK_SHAPE = {
  vback: (A) => ({
    d: `M ${A.shoulderL} ${A.shoulderY} L ${A.centerX} ${A.waistY - 40} L ${A.shoulderR} ${A.shoulderY}`,
  }),
  lowback: (A) => ({
    d: `M ${A.shoulderL} ${A.shoulderY} Q ${A.centerX} ${A.waistY - 15} ${A.shoulderR} ${A.shoulderY}`,
  }),
  keyhole: (A) => {
    const dipY = A.shoulderY + 45;
    const holeTopY = dipY + 12;
    return {
      d: `M ${A.shoulderL} ${A.shoulderY} Q ${A.centerX} ${dipY} ${A.shoulderR} ${A.shoulderY}`,
      detailLines: [
        `M ${A.centerX} ${holeTopY}
         Q ${A.centerX - 8} ${holeTopY + 8} ${A.centerX - 6} ${holeTopY + 16}
         Q ${A.centerX - 4} ${holeTopY + 24} ${A.centerX} ${holeTopY + 24}
         Q ${A.centerX + 4} ${holeTopY + 24} ${A.centerX + 6} ${holeTopY + 16}
         Q ${A.centerX + 8} ${holeTopY + 8} ${A.centerX} ${holeTopY} Z`,
      ],
    };
  },
  buttons: (A) => ({
    d: `M ${A.shoulderL} ${A.shoulderY} L ${A.shoulderR} ${A.shoulderY}`,
  }),
  illusion: (A) => ({
    d: `M ${A.shoulderL} ${A.shoulderY} Q ${A.centerX} ${A.neckY} ${A.shoulderR} ${A.shoulderY}`,
  }),
};
BACK_SHAPE.other = BACK_SHAPE.vback;

// 코르셋 백 — 참고 사진 기준. 목선은 얕게(끈이 주인공이라 깊게 파지 않는다) 두고, 그 아래
// 허리까지 X자로 교차하는 끈을 여러 단 쌓아 코르셋 레이스업 특유의 사다리꼴 교차를 표현한다.
// 교차 기법 자체는 퀸앤넥/트위스트홀터와 같다 — 좌우 끝점을 반대쪽으로 바꿔치기하면 교차선이 된다
BACK_SHAPE.corset = (A) => {
  const dipY = A.shoulderY + 15;
  const topY = dipY + 10;
  const bottomY = A.waistY - 10;
  const laceHalf = 13;
  const rungs = 6;
  const detailLines = [];
  for (let i = 0; i < rungs; i++) {
    const y0 = topY + (i / rungs) * (bottomY - topY);
    const y1 = topY + ((i + 1) / rungs) * (bottomY - topY);
    detailLines.push(`M ${A.centerX - laceHalf} ${y0} L ${A.centerX + laceHalf} ${y1}`);
    detailLines.push(`M ${A.centerX + laceHalf} ${y0} L ${A.centerX - laceHalf} ${y1}`);
  }
  return {
    d: `M ${A.shoulderL} ${A.shoulderY} Q ${A.centerX} ${dipY} ${A.shoulderR} ${A.shoulderY}`,
    detailLines,
  };
};

// 특징 없음 — 컷아웃도 장식도 없는 평범하게 닫힌 뒷모습(사용자 요청). 어깨점 사이를
// 곧게 잇기만 해서, buttons(단추 장식)의 기본 도형에서 단추만 뺀 형태와 같다
BACK_SHAPE.plain = (A) => ({
  d: `M ${A.shoulderL} ${A.shoulderY} L ${A.shoulderR} ${A.shoulderY}`,
});

// 파츠 하나의 도형(d)에 원단(소재) 패턴을 채우고, 오버레이(장식)를 골랐으면(=='none'이 아니면)
// 같은 도형 위에 오버레이 패턴을 한 겹 더 덮어 그린다 — 오버레이 패턴은 배경이 투명해서
// 밑에 깐 원단이 무늬 사이로 비쳐 보인다. 반환하는 material fill url은 다른 곳(예: 홀터
// 계열의 목 뒤 접힘 조각)에서 같은 원단으로 재사용할 때 쓴다
function appendMaterialOverlayPath(svgNS, defs, svg, d, materialId, overlayId, extraClass) {
  const materialFillUrl = registerMaterialPattern(svgNS, defs, materialId);
  const p = document.createElementNS(svgNS, 'path');
  p.setAttribute('d', d);
  p.setAttribute('fill', materialFillUrl);
  p.setAttribute('class', 'dress-outline' + (extraClass ? ' ' + extraClass : ''));
  svg.appendChild(p);
  if (overlayId && overlayId !== 'none') {
    const overlayFillUrl = registerOverlayPattern(svgNS, defs, overlayId);
    const op = document.createElementNS(svgNS, 'path');
    op.setAttribute('d', d);
    op.setAttribute('fill', overlayFillUrl);
    op.setAttribute('class', 'dress-outline');
    svg.appendChild(op);
  }
  return materialFillUrl;
}

function buildBackViewSvg(backId, bodiceMaterialId, bodiceOverlayId) {
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '110 90 180 220');
  const defs = document.createElementNS(svgNS, 'defs');
  svg.appendChild(defs);

  const torso = document.createElementNS(svgNS, 'path');
  torso.setAttribute('d', torsoBase(A));
  torso.setAttribute('class', 'torso-outline');
  svg.appendChild(torso);

  const shapeFn = BACK_SHAPE[backId] || BACK_SHAPE.vback;
  const { d: topD, detailLines } = shapeFn(A);
  const { waistL, waistR } = waistPointsAt(A, A.waistY);
  const topRest = stripMove(topD);
  const bodiceD = `M ${waistL} ${A.waistY}
      C ${waistL} ${A.bustY} ${A.shoulderL + (A.bustL - A.shoulderL) * 0.3} ${A.shoulderY + (A.bustY - A.shoulderY) * 0.75} ${A.shoulderL} ${A.shoulderY}
      ${topRest}
      C ${A.shoulderR - (A.shoulderR - A.bustR) * 0.3} ${A.shoulderY + (A.bustY - A.shoulderY) * 0.75} ${waistR} ${A.bustY} ${waistR} ${A.waistY} Z`;

  appendMaterialOverlayPath(svgNS, defs, svg, bodiceD, bodiceMaterialId || 'satin', bodiceOverlayId || 'none');

  (detailLines || []).forEach((d) => {
    const dp = document.createElementNS(svgNS, 'path');
    dp.setAttribute('d', d);
    dp.setAttribute('class', 'fold-line');
    svg.appendChild(dp);
  });

  if (backId === 'buttons') {
    for (let i = 0; i < 5; i++) {
      const y = A.shoulderY + 20 + i * ((A.waistY - A.shoulderY - 30) / 4);
      const c = document.createElementNS(svgNS, 'circle');
      c.setAttribute('cx', A.centerX);
      c.setAttribute('cy', y);
      c.setAttribute('r', 6.5);
      c.setAttribute('fill', '#8A7A6D');
      svg.appendChild(c);
    }
  }

  return svg;
}

// 스커트+보디스+소매까지 합성한 드레스 <svg>를 반환. 스커트/보디스/소매는 각각 독립된
// 원단+오버레이 쌍을 받는다 (SPEC.md §3.3, §4) — 파츠마다 다른 원단을 고르면 허리선에
// 경계가 보이는 게 정상이다 (좌표는 허리선에서 정확히 겹친다). textures는
// { skirtMaterial, skirtOverlay, bodiceMaterial, bodiceOverlay, sleeveMaterial, sleeveOverlay }
function buildFullDressSvg(silhouetteId, necklineId, sleeveId, textures, waistId, trainId) {
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 400 700');

  const defs = document.createElementNS(svgNS, 'defs');
  svg.appendChild(defs);

  const { d: skirtD, waistY, foldLines } = silhouette[silhouetteId](A);
  const { d: bodiceD, detailLines: bodiceDetailLines, overlay: bodiceFoldOverlay, mesh: bodiceMesh } = buildBodice(A, necklineId, waistY, sleeveId);

  // 0. 마네킹 베이스 — 넥라인/보디스보다 먼저 그려서 항상 맨 뒤에 깔린다 (팔까지 포함)
  const torsoPath = document.createElementNS(svgNS, 'path');
  torsoPath.setAttribute('d', torsoBase(A));
  torsoPath.setAttribute('class', 'torso-outline');
  svg.appendChild(torsoPath);
  [-1, 1].forEach((side) => {
    const armPath = document.createElementNS(svgNS, 'path');
    armPath.setAttribute('d', armBase(A, side));
    armPath.setAttribute('class', 'torso-outline');
    svg.appendChild(armPath);
  });

  // 트레인 — 스커트보다 먼저 그려서 헴 라인 옆/아래로만 살짝 드러나게 한다. 스커트 원단을 그대로 쓴다
  const trainD = buildTrainPath(A, trainId);
  if (trainD) {
    appendMaterialOverlayPath(svgNS, defs, svg, trainD, textures.skirtMaterial, textures.skirtOverlay);
  }

  // 1. 스커트, 2. 보디스 (렌더 순서 SPEC.md §3.3)
  appendMaterialOverlayPath(svgNS, defs, svg, skirtD, textures.skirtMaterial, textures.skirtOverlay, silhouetteId === 'other' ? 'other' : '');
  const bodiceFillUrl = appendMaterialOverlayPath(svgNS, defs, svg, bodiceD, textures.bodiceMaterial, textures.bodiceOverlay, necklineId === 'other' ? 'other' : '');

  // 스커트/보디스 위에 얇은 강조선을 얹는다 — 실루엣이 통짜 도형처럼 안 보이게 하거나
  // (스커트 주름선) 트위스트홀터처럼 채운 도형만으로는 안 보이는 디테일을 보여주기 위한
  // 순수 장식용 선이라, 좌표/형태 판단에는 영향이 없다 (fill 없이 stroke만)
  [...(foldLines || []), ...bodiceDetailLines].forEach((d) => {
    const p = document.createElementNS(svgNS, 'path');
    p.setAttribute('d', d);
    p.setAttribute('class', 'fold-line');
    svg.appendChild(p);
  });

  // 허리 라인 속성 — 실제 보디스/스커트 경계와 별개로 종류별 새시 강조선을 얹는다
  const waistSeamD = buildWaistSeamPath(A, waistId);
  if (waistSeamD) {
    const w = document.createElementNS(svgNS, 'path');
    w.setAttribute('d', waistSeamD);
    w.setAttribute('class', 'waist-seam');
    svg.appendChild(w);
  }

  // 홀터 계열처럼 목 뒤로 넘어가 접히는 조각은 앞고리/교차 위에 겹치는 별도 조각으로
  // 그린다 — 같은 보디스 원단을 쓰고 자기 외곽선을 가져서 "겹쳐진 조각"처럼 보인다
  // (장식 오버레이는 재현하지 않는다 — 정면에 드러나는 실제 조각이 아닌, 실루엣만 남기기 위한 장치라서)
  if (bodiceFoldOverlay) {
    const p = document.createElementNS(svgNS, 'path');
    p.setAttribute('d', bodiceFoldOverlay);
    p.setAttribute('fill', bodiceFillUrl);
    p.setAttribute('class', 'dress-outline');
    svg.appendChild(p);
  }

  // 일루전 넥라인의 비침 메시 영역 — 고른 보디스 원단과 무관하게 항상 튤 패턴으로 덮어
  // "이 부분만 비쳐 보인다"는 걸 표시한다. 실제 안감(하트/일자) 경계 위에 겹쳐 그린다
  if (bodiceMesh) {
    const p = document.createElementNS(svgNS, 'path');
    p.setAttribute('d', bodiceMesh);
    p.setAttribute('fill', registerMaterialPattern(svgNS, defs, 'tulle'));
    p.setAttribute('class', 'dress-outline mesh-overlay');
    svg.appendChild(p);
  }

  // 3. 소매
  const { d: sleeveD, detailLines: sleeveDetailLines } = sleeve[sleeveId](A);
  if (sleeveD) {
    appendMaterialOverlayPath(svgNS, defs, svg, sleeveD, textures.sleeveMaterial, textures.sleeveOverlay, sleeveId === 'other' ? 'other' : '');
  }
  // 오프숄더 폴드칼라처럼, 채운 도형만으로는 안 보이는 접힘선 등의 순수 장식용 강조선
  (sleeveDetailLines || []).forEach((d) => {
    const p = document.createElementNS(svgNS, 'path');
    p.setAttribute('d', d);
    p.setAttribute('class', 'fold-line');
    svg.appendChild(p);
  });

  return svg;
}

// 텍스처 칩용 작은 스와치(패턴 자체만) — 드레스 형태와 무관
function buildMaterialSwatch(materialId) {
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 40 40');
  const defs = document.createElementNS(svgNS, 'defs');
  svg.appendChild(defs);
  const fillUrl = registerMaterialPattern(svgNS, defs, materialId);
  const rect = document.createElementNS(svgNS, 'rect');
  rect.setAttribute('width', '40');
  rect.setAttribute('height', '40');
  rect.setAttribute('fill', fillUrl);
  rect.setAttribute('class', 'dress-outline');
  svg.appendChild(rect);
  return svg;
}

// 오버레이는 배경이 투명한 패턴이라, 밑에 원단 스와치와 같은 중립 배경(satin)을 먼저 깔고
// 그 위에 오버레이 무늬를 얹어야 칩에서도 실제로 겹쳐 보이는 느낌을 준다. '없음'은 장식
// 무늬 없이 중립 배경만 보여준다
function buildOverlaySwatch(overlayId) {
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 40 40');
  const defs = document.createElementNS(svgNS, 'defs');
  svg.appendChild(defs);
  const baseFillUrl = registerMaterialPattern(svgNS, defs, 'satin');
  const rect = document.createElementNS(svgNS, 'rect');
  rect.setAttribute('width', '40');
  rect.setAttribute('height', '40');
  rect.setAttribute('fill', baseFillUrl);
  rect.setAttribute('class', 'dress-outline');
  svg.appendChild(rect);
  if (overlayId !== 'none') {
    const overlayFillUrl = registerOverlayPattern(svgNS, defs, overlayId);
    const overlayRect = document.createElementNS(svgNS, 'rect');
    overlayRect.setAttribute('width', '40');
    overlayRect.setAttribute('height', '40');
    overlayRect.setAttribute('fill', overlayFillUrl);
    svg.appendChild(overlayRect);
  }
  return svg;
}

// ── 저장소 (SPEC.md §4, §9) ───────────────────────────────────────────────
const STORAGE_KEY = 'dressTourData';

function defaultStore() {
  return { version: 2, fittings: [], onboarded: false };
}

// Store.version 불일치 시 이 함수를 거친다. 지금은 버전 2 하나뿐이라 실제 변환 대상이
// 없지만, 실패해도 기존 localStorage 값을 지우지 않고 빈 스토어로만 대체한다
function migrateStore() {
  return null;
}

// textureRef는 이 필드가 생기기 전에 저장된 기록에는 없을 수 있다. Store.version은
// 그대로 2라서 migrateStore를 안 거치므로, 불러올 때마다 없는 칸만 기본값으로 채워준다
function ensureTextureRef(sketch) {
  if (!sketch.textureRef) sketch.textureRef = {};
  ['skirt', 'bodice', 'sleeve', 'back'].forEach((partKey) => {
    if (!sketch.textureRef[partKey]) sketch.textureRef[partKey] = { note: '', image: null };
  });
}

// 예전 skirtTexture/bodiceTexture/sleeveTexture(파츠당 값 하나)를 새 소재+오버레이 두 축
// (skirtMaterial/skirtOverlay 등)으로 나누기 전에 저장된 기록을 위한 마이그레이션. lace/beaded는
// 새 모델에서는 원단이 아니라 오버레이 개념이라 satin 원단 + 해당 오버레이로 옮겨준다
const LEGACY_TEXTURE_TO_MATERIAL_OVERLAY = {
  satin: { material: 'satin', overlay: 'none' },
  mikado: { material: 'mikado', overlay: 'none' },
  tulle: { material: 'tulle', overlay: 'none' },
  organza: { material: 'organza', overlay: 'none' },
  lace: { material: 'satin', overlay: 'embroiderylace' },
  beaded: { material: 'satin', overlay: 'beads' },
  other: { material: 'other', overlay: 'none' },
};
function ensureMaterialOverlay(sketch) {
  ['skirt', 'bodice', 'sleeve'].forEach((part) => {
    const materialKey = `${part}Material`;
    const overlayKey = `${part}Overlay`;
    if (sketch[materialKey] && sketch[overlayKey]) return;
    const mapped = LEGACY_TEXTURE_TO_MATERIAL_OVERLAY[sketch[`${part}Texture`]] || { material: 'satin', overlay: 'none' };
    if (!sketch[materialKey]) sketch[materialKey] = mapped.material;
    if (!sketch[overlayKey]) sketch[overlayKey] = mapped.overlay;
  });
}

function loadStore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultStore();
    const parsed = JSON.parse(raw);
    const store = parsed && parsed.version === 2 && Array.isArray(parsed.fittings)
      ? parsed
      : migrateStore(parsed) || defaultStore();
    store.fittings.forEach((f) => {
      ensureTextureRef(f.sketch);
      ensureMaterialOverlay(f.sketch);
    });
    return store;
  } catch (e) {
    return defaultStore();
  }
}

function persistStore() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.store));
}

let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persistStore, 300);
}

// ── 전역 상태 (SPEC.md §9: 전역 상태는 객체 하나) ─────────────────────────
let state = {
  store: loadStore(),
  view: 'list', // 'record' | 'list' | 'compare' | 'shared'
  current: null, // 기록 화면에서 편집 중인 Fitting
  lastShopName: '',
  lastVisitedAt: '',
  deleteMenuId: null,
  uiCollapsed: { memo: true },
  compareMode: false, // 목록 화면의 "비교하기" 선택 모드 여부
  compareSelection: [], // 비교 선택된 fitting id, 최대 3개
  shared: null, // URL 해시로 들어온 읽기 전용 공유 데이터 { items: [...] }

  return new Date().toISOString().slice(0, 10);
}

    skirtMaterial: 'satin', skirtOverlay: 'none',

    sleeveMaterial: 'satin', sleeveOverlay: 'none',
    textureRef: {
      skirt: { note: '', image: null },
      bodice: { note: '', image: null },
      sleeve: { note: '', image: null },
      back: { note: '', image: null },

    custom: {},
  };

function createFitting() {
  return {
    id: crypto.randomUUID(),
    shopName: state.lastShopName,
    visitedAt: state.lastVisitedAt || todayStr(),
    dressName: '', priceKrw: null, rating: null, memo: '',
    sketch: defaultSketch(),
  };
}

// ── 화면 전환 ──────────────────────────────────────────────────────────────
function startNewFitting() {
  const fitting = createFitting();
  state.store.fittings.push(fitting);
  state.current = fitting;
  state.view = 'record';
  persistStore();
  render();
}

function openFitting(id) {
  state.current = state.store.fittings.find((f) => f.id === id) || null;
  state.view = 'record';
  render();
}

// 매장명/방문일은 다음 기록에 자동 승계된다 (같은 매장에서 연속으로 여러 벌을 보므로, SPEC.md §6.2)
function backToList() {
  if (state.current) {
    state.lastShopName = state.current.shopName;
    state.lastVisitedAt = state.current.visitedAt;
  }
  state.current = null;
  state.view = 'list';
  persistStore();
  render();
}

function deleteFitting(id) {
  state.store.fittings = state.store.fittings.filter((f) => f.id !== id);
  state.deleteMenuId = null;
  persistStore();
  render();
}

// 텍스트/숫자 입력은 render()를 부르지 않는다 — innerHTML로 다시 그리면 입력 중이던
// 포커스/커서 위치가 날아가버리기 때문. 칩 선택처럼 눈에 보이는 구조가 바뀌는
// 변경만 render()를 호출한다
function updateCurrentField(key, value) {
  state.current[key] = value;
  scheduleSave();
}

function updateSketchField(key, value) {
  state.current.sketch[key] = value;
  scheduleSave();
  render();
}

function updateCustomText(category, value) {
  state.current.sketch.custom[category] = value;
  scheduleSave();
}

// ── 렌더 ────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  // render()는 매번 innerHTML을 통째로 비우고 다시 그리므로, 칩을 클릭하거나 참고
  // 이미지를 추가할 때마다 .scroll-pane 자체가 새 엘리먼트로 교체되어 스크롤이 맨 위로
  // 리셋된다. 다시 그리기 전 스크롤 위치를 기억해뒀다가 그대로 복원한다
  const prevScrollPane = app.querySelector('.scroll-pane');
  const prevScrollTop = prevScrollPane ? prevScrollPane.scrollTop : 0;

  app.innerHTML = '';
  if (state.view === 'record' && state.current) {
    app.appendChild(buildRecordScreen());
  } else if (state.view === 'compare' && state.compareSelection.length >= 2) {
    app.appendChild(buildCompareScreen());
  } else if (state.view === 'shared' && state.shared) {
    app.appendChild(buildSharedScreen());
  } else {
    app.appendChild(buildListScreen());
  }
  if (state.shareDialog) {
    app.appendChild(buildShareDialog());
  }

  const newScrollPane = app.querySelector('.scroll-pane');
  if (newScrollPane) {
    newScrollPane.scrollTop = prevScrollTop;
  }
}

// 업로드한 이미지를 캔버스로 리사이즈해 data URL로 반환한다 — 원본 그대로 저장하면
// localStorage 용량을 금방 잡아먹으므로 긴 변 기준 maxDim으로 줄인다 (SPEC.md §4 textureRef)
function resizeImageToDataUrl(file, maxDim, callback) {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        const scale = maxDim / Math.max(width, height);
        width = Math.round(width * scale);
        height = Math.round(height * scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      callback(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function updateTextureRefNote(refKey, value) {

// 스커트/보디스/소매 텍스처 칩 아래에 붙는 참고 메모+이미지 한 칸. 스케치 렌더링에는
// 전혀 반영되지 않는 순수 참고용이다 (SPEC.md §4) — 웹에서 찾은 원단 사진을 개인 메모로만 남긴다
function buildTextureRefBlock(refKey) {
  const ref = state.current.sketch.textureRef[refKey];
  const wrap = document.createElement('div');
  wrap.className = 'texture-ref';

  const noteInput = document.createElement('input');
  noteInput.type = 'text';
  noteInput.placeholder = '참고 메모(선택) — 예: 이 느낌의 레이스';
  noteInput.value = ref.note || '';
  noteInput.addEventListener('input', (e) => updateTextureRefNote(refKey, e.target.value));
  // 이미지를 복사해둔 채로 이 칸에 포커스하고 Ctrl+V(붙여넣기)하면 파일 선택 없이 바로
  // 추가된다 (사용자 요청 — 폴더에서 고르는 것 말고 클립보드로도 추가하고 싶다는 요청)
  noteInput.addEventListener('paste', (e) => handleTextureRefPaste(e, refKey));
  wrap.appendChild(noteInput);

  const imageRow = document.createElement('div');
  imageRow.className = 'texture-ref-image-row';

  if (ref.image) {
    const img = document.createElement('img');
    img.src = ref.image;
    img.className = 'texture-ref-thumb';
    img.alt = '참고 이미지';
    imageRow.appendChild(img);

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'btn';
    removeBtn.textContent = '이미지 삭제';
    removeBtn.addEventListener('click', () => updateTextureRefImage(refKey, null));
    imageRow.appendChild(removeBtn);
  } else {
    const label = document.createElement('label');
    label.className = 'btn';
    label.textContent = '파일에서 추가';
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.style.display = 'none';
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) resizeImageToDataUrl(file, 400, (dataUrl) => updateTextureRefImage(refKey, dataUrl));
    });
    label.appendChild(fileInput);
    imageRow.appendChild(label);

    // Async Clipboard API로 클립보드 이미지를 명시적으로 읽어온다. 미지원/권한 거부 브라우저는
    // 버튼 결과 텍스트로 안내하고, 메모 칸에 Ctrl+V하는 방법으로 대체할 수 있다
    const pasteBtn = document.createElement('button');
    pasteBtn.type = 'button';
    pasteBtn.className = 'btn';
    pasteBtn.textContent = '클립보드에서 붙여넣기';
    pasteBtn.addEventListener('click', () => handleClipboardPasteClick(refKey, pasteBtn));
    imageRow.appendChild(pasteBtn);
  }

  wrap.appendChild(imageRow);
  return wrap;
}

function handleTextureRefPaste(e, refKey) {
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  const imageItem = Array.from(items).find((item) => item.type.startsWith('image/'));
  if (!imageItem) return;
  e.preventDefault();
  const file = imageItem.getAsFile();
  if (file) resizeImageToDataUrl(file, 400, (dataUrl) => updateTextureRefImage(refKey, dataUrl));
}

async function handleClipboardPasteClick(refKey, btnEl) {
  if (!navigator.clipboard || !navigator.clipboard.read) {
    flashButtonResult(btnEl, false, '미지원 브라우저 — 메모 칸에 Ctrl+V 해보세요');
    return;
  }
  try {
    const items = await navigator.clipboard.read();
    const imageItem = items.find((item) => item.types.some((t) => t.startsWith('image/')));
    if (!imageItem) {
      flashButtonResult(btnEl, false, '클립보드에 이미지가 없어요');
      return;
    }
    const type = imageItem.types.find((t) => t.startsWith('image/'));
    const blob = await imageItem.getType(type);
    // 성공하면 이 버튼 자체가 썸네일+삭제 버튼으로 즉시 바뀌므로(리렌더), 버튼에 성공
    // 텍스트를 남길 필요가 없다 — 실패했을 때만 버튼에 안내 문구를 남긴다
    resizeImageToDataUrl(blob, 400, (dataUrl) => updateTextureRefImage(refKey, dataUrl));
  } catch (e) {
    flashButtonResult(btnEl, false, '클립보드 읽기 실패');
  }
}

// 칩 한 분류(실루엣/넥라인/소매/텍스처/허리라인/뒷모습/트레인) 공용 렌더러.
// thumbFn이 없으면 텍스트만 있는 칩(허리라인/뒷모습/트레인)으로 그린다
function buildChipSection(title, order, currentValue, labelMap, onSelect, thumbFn, customValue, onCustomInput, descMap) {
  const wrap = document.createElement('div');
  const heading = document.createElement('div');
  heading.className = 'section-title';
  heading.textContent = title;
  wrap.appendChild(heading);

  // 소재/오버레이 칩은 설명이 보이면 좋겠다는 요청 — title 속성(PC 호버)은 남겨두되, 모바일은
  // 호버가 없어서 title만으로는 안 보인다. 그래서 선택된 칩의 설명을 제목 바로 아래 눈에 띄는
  // 박스로 항상 보여준다 — 칩 목록보다 위(스크롤/줄바꿈과 무관하게 항상 같은 자리)에 둬서
  // 놓치기 어렵게 하고, 탭해서 다른 칩을 고르면 내용만 바뀐다
  let descBox = null;
  if (descMap) {
    descBox = document.createElement('div');
    descBox.className = 'chip-desc';
    descBox.textContent = descMap[currentValue] || '';
    wrap.appendChild(descBox);
  }

  const row = document.createElement('div');
  row.className = 'chip-row';
  order.forEach((id) => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'chip' + (thumbFn ? '' : ' text-only') + (id === currentValue ? ' selected' : '');
    chip.setAttribute('aria-label', labelMap[id]);
    if (descMap && descMap[id]) chip.title = descMap[id];
    if (thumbFn) chip.appendChild(thumbFn(id));
    const label = document.createElement('span');
    label.className = 'chip-label';
    label.textContent = labelMap[id];
    chip.appendChild(label);
    chip.addEventListener('click', () => onSelect(id));
    row.appendChild(chip);
  });
  wrap.appendChild(row);

  if (currentValue === 'other') {
    const inputWrap = document.createElement('div');
    inputWrap.className = 'other-input-wrap';
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = '직접 입력';
    input.value = customValue || '';
    input.addEventListener('input', (e) => onCustomInput(e.target.value));
    inputWrap.appendChild(input);
    wrap.appendChild(inputWrap);
  }

  return wrap;
}
