<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웨딩드레스 투어 기록</title>
<style>
  :root {
    --bg: #EDE7E0;
    --dress-fill: #FBF8F4;
    --outline: #8A7A6D;
    --text: #4A3F36;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Malgun Gothic", sans-serif;
  }
  button, input, textarea { font-family: inherit; }
  .dress-outline {
    stroke: var(--outline);
    stroke-width: 1;
  }
  .dress-outline.other {
    stroke-dasharray: 4 3;
  }
  .detach-mark {
    stroke: var(--outline);
    stroke-width: 1;
    stroke-dasharray: 3 2;
  }
  .fold-line {
    fill: none;
    stroke: var(--outline);
    stroke-width: 0.6;
    opacity: 0.45;
  }
  .torso-outline {
    fill: none;
    stroke: var(--outline);
    stroke-width: 0.8;
    opacity: 0.35;
  }
  .waist-seam {
    fill: none;
    stroke: var(--outline);
    stroke-width: 1.3;
  }

  /* 공용 */
  .btn {
    font-size: 14px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--outline);
    background: transparent;
    color: var(--text);
    cursor: pointer;
  }
  .btn.primary {
    background: var(--outline);
    color: var(--dress-fill);
  }
  .btn:focus-visible, .chip:focus-visible {
    outline: 2px solid var(--outline);
    outline-offset: 2px;
  }
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--outline);
  }
  .top-bar .title {
    font-size: 15px;
    font-weight: 600;
  }

  /* 기록 화면 */
  .record-screen {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .preview-pane {
    flex: 0 0 35vh;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--outline);
  }
  .preview-pane svg {
    /* 부모(.preview-pane)의 %height를 쓰면 flex 컬럼 레이아웃과 순환 의존이 생겨
       미리보기가 부풀어 오르는 버그가 생긴다. 뷰포트 단위로 직접 고정해 우회한다 */
    height: 35vh;
    width: auto;
  }
  .scroll-pane {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px 12px 32px;
  }
  .field-group { margin-bottom: 14px; }
  .field-group label {
    display: block;
    font-size: 12px;
    opacity: 0.75;
    margin-bottom: 4px;
  }
  .field-row { display: flex; gap: 8px; }
  .field-row > .field-group { flex: 1; }
  input[type="text"], input[type="date"], input[type="number"], textarea {
    width: 100%;
    font-size: 14px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--outline);
    background: #ffffff88;
    color: var(--text);
  }
  textarea { resize: vertical; min-height: 60px; }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    margin: 18px 0 6px;
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    min-height: 44px;
    padding: 4px 8px;
    border: 1.5px solid transparent;
    border-radius: 10px;
    background: #ffffff55;
    color: var(--text);
    cursor: pointer;
  }
  .chip.selected {
    border-color: var(--outline);
    border-width: 2px;
    background: #ffffffcc;
  }
  .chip svg { width: 40px; height: auto; }
  .chip .chip-label { font-size: 11px; margin-top: 2px; text-align: center; }
  .chip.text-only { min-width: auto; padding: 8px 12px; }
  .other-input-wrap { margin-top: 6px; }
  .texture-ref {
    margin: 6px 0 4px;
    padding: 8px;
    border: 1px dashed var(--outline);
    border-radius: 8px;
  }
  .texture-ref input[type="text"] { margin-bottom: 6px; }
  .texture-ref-image-row { display: flex; align-items: center; gap: 8px; }
  .texture-ref-thumb {
    width: 44px;
    height: 44px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--outline);
  }
  .collapsible-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 0;
    cursor: pointer;
    border-top: 1px solid var(--outline);
    margin-top: 10px;
  }

  /* 목록 화면 */
  .list-screen { padding-bottom: 32px; }
  .backup-note {
    font-size: 12px;
    opacity: 0.75;
    text-align: center;
    padding: 8px 12px;
    margin: 0;
  }
  .shop-group-title {
    font-size: 13px;
    font-weight: 600;
    padding: 14px 12px 4px;
  }
  .fitting-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
  }
  .fitting-item svg {
    width: 60px;
    height: 105px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .fitting-meta { flex: 1; }
  .fitting-meta .name { font-size: 14px; }
  .fitting-meta .stars { font-size: 12px; color: var(--outline); }
  .delete-menu { display: flex; gap: 8px; }
  .empty-state { text-align: center; padding: 60px 20px; opacity: 0.85; }
  .backup-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    padding: 16px 12px;
    border-top: 1px solid var(--outline);
    margin-top: 12px;
  }
  .top-bar-actions { display: flex; gap: 8px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .fitting-item.selected-for-compare {
    background: #ffffffaa;
    border-radius: 10px;
    outline: 2px solid var(--outline);
  }
  .compare-badge {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 1.5px solid var(--outline);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  /* 비교 화면 */
  .compare-screen { padding-bottom: 32px; }
  .compare-preview-row {
    display: flex;
    gap: 8px;
    padding: 16px 12px;
    justify-content: center;
  }
  .compare-preview-cell {
    flex: 1 1 0;
    max-width: 33%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .compare-preview-cell svg { width: 100%; height: auto; }
  .compare-dress-label {
    font-size: 12px;
    margin-top: 4px;
    text-align: center;
  }
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .compare-table th, .compare-table td {
    padding: 8px 6px;
    border-bottom: 1px solid var(--outline);
    text-align: center;
  }
  .compare-table th {
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    opacity: 0.85;
    width: 88px;
    padding-left: 12px;
  }
  .compare-table tr.row-same td { opacity: 0.45; }
  .compare-table tr.row-diff td { font-weight: 600; }

  /* 공유 링크 다이얼로그 */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-box {
    background: var(--bg);
    border: 1px solid var(--outline);
    border-radius: 12px;
    padding: 20px;
    width: 100%;
    max-width: 340px;
  }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .modal-checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .modal-note { font-size: 11px; opacity: 0.7; margin: 10px 0; }
  .modal-link-box { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
  .modal-link-box input { flex: 1 1 160px; font-size: 12px; padding: 6px 8px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }

  /* 읽기 전용 공유 뷰 */
  .shared-screen { padding-bottom: 32px; }
  .shared-banner {
    background: var(--outline);
    color: var(--dress-fill);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 600;
  }
  .shared-banner .btn { background: var(--dress-fill); color: var(--text); border-color: var(--dress-fill); }
  .shared-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 12px;
    border-bottom: 1px solid var(--outline);
  }
  .shared-item svg { width: 220px; height: auto; }
  .shared-item-meta { text-align: center; font-size: 13px; margin: 10px 0; }
  .shared-item-meta div { margin: 2px 0; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// SVG 좌표계 앵커 상수 (SPEC.md §3) — 값/이름 재배열 금지
const A = {
  centerX: 200,
  neckY:      105,
  shoulderY:  120,
  shoulderL:  140,
  shoulderR:  260,
  bustY:      180,
  bustL:      158,
  bustR:      242,
  waistY:     250,
  waistL:     168,
  waistR:     232,
  hipY:       310,
  hipL:       155,
  hipR:       245,
  kneeY:      470,
  hemY:       610,
};

// 한글 라벨. texture 라벨은 skirtTexture/bodiceTexture/sleeveTexture가 공유한다 (SPEC.md §4)
const LABEL = {
  ko: {
    silhouette: {
      aline: 'A라인', ballgown: '볼가운', mermaid: '머메이드',
      trumpet: '트럼펫', sheath: '시스', empire: '엠파이어', other: '기타',
    },
    neckline: {
      sweetheart: '스위트하트', v: 'V넥', square: '스퀘어넥', halter: '홀터넥',
      offshoulder: '오프숄더', bateau: '보트넥', illusion: '일루전', straight: '스트레이트',
      jewel: '주얼넥', scoop: '스쿱넥', twisthalter: '트위스트홀터넥', other: '기타',
      queenanne: '퀸앤넥', keyhole: '키홀넥', highneck: '하이넥', surplice: '서플리스넥',
    },
    sleeve: {
      none: '민소매', cap: '캡소매', short: '반팔', long: '긴소매',
      puff: '퍼프소매', detachable: '탈부착소매', other: '기타',
    },
    texture: {
      satin: '새틴', mikado: '미카도', tulle: '튤', lace: '레이스',
      organza: '오간자', beaded: '비즈', other: '기타',
    },
    waist: {
      natural: '내추럴 웨이스트', drop: '드롭 웨이스트', empire: '엠파이어 웨이스트',
      basque: '바스크 웨이스트', other: '기타',
    },
    back: {
      vback: '브이백', lowback: '로우백', keyhole: '키홀백', buttons: '단추 장식',
      illusion: '일루전백', other: '기타',
    },
    train: {
      none: '없음', sweep: '스윕 트레인', chapel: '채플 트레인', cathedral: '캐시드럴 트레인', other: '기타',
    },
  },
};

// enum 순서는 URL 인코딩에 쓰이므로 재배열 금지 (SPEC.md §4). "기타" 칩은 목록에서
// 뺐지만(아래 *_CHIP_ORDER), 과거에 저장된 기록과의 인코딩 호환을 위해 값 자체는 남겨둔다
const SILHOUETTE_ORDER = ['aline', 'ballgown', 'mermaid', 'trumpet', 'sheath', 'empire', 'other'];
const SILHOUETTE_CHIP_ORDER = SILHOUETTE_ORDER.filter((id) => id !== 'other');
// jewel/scoop/queenanne/keyhole/highneck/surplice는 사용자가 보내준 넥라인 레퍼런스
// 시트에서 기존 종류와 겹치지 않는 것만 골라 배열 끝에 추가한 것 — 재배열 금지 규칙 때문에
// other 뒤에도 새 항목을 이어 붙인다. 칩 표시 순서는 NECKLINE_CHIP_ORDER가 따로 담당한다
const NECKLINE_ORDER = ['sweetheart', 'v', 'square', 'halter', 'offshoulder', 'bateau', 'illusion', 'straight', 'jewel', 'scoop', 'twisthalter', 'other', 'queenanne', 'keyhole', 'highneck', 'surplice'];
const NECKLINE_CHIP_ORDER = NECKLINE_ORDER.filter((id) => id !== 'other');
const SLEEVE_ORDER = ['none', 'cap', 'short', 'long', 'puff', 'detachable', 'other'];
const SLEEVE_CHIP_ORDER = SLEEVE_ORDER.filter((id) => id !== 'other');
const TEXTURE_ORDER = ['satin', 'mikado', 'tulle', 'lace', 'organza', 'beaded', 'other'];
const WAIST_ORDER = ['natural', 'drop', 'empire', 'basque', 'other'];
const BACK_ORDER = ['vback', 'lowback', 'keyhole', 'buttons', 'illusion', 'other'];
const TRAIN_ORDER = ['none', 'sweep', 'chapel', 'cathedral', 'other'];
const WAIST_CHIP_ORDER = WAIST_ORDER.filter((id) => id !== 'other');
const BACK_CHIP_ORDER = BACK_ORDER.filter((id) => id !== 'other');
const TRAIN_CHIP_ORDER = TRAIN_ORDER.filter((id) => id !== 'other');

// 스커트 안쪽에 그리는 얇은 주름선. 체크포인트(y, leftX, rightX)를 실루엣 path와
// 동일한 앵커로 만들어 넣으면, 핏 되는 구간에서는 주름선도 좁게 붙고 플레어 구간에서만
// 벌어져 외곽선과 어긋나지 않는다. fraction 위치(0~1, 폭 안에서 왼쪽부터)마다 한 줄씩
function buildFoldLine(checkpoints, fraction) {
  return checkpoints
    .map(({ y, leftX, rightX }, i) => {
      const x = leftX + (rightX - leftX) * fraction;
      return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
    })
    .join(' ');
}

function buildFoldLines(checkpoints, fractions = [0.28, 0.5, 0.72]) {
  return fractions.map((f) => buildFoldLine(checkpoints, f));
}

const silhouette = {};

// 골반까지 직선으로 내려가다 완만한 곡선으로 벌어지는 기본 실루엣
silhouette.aline = (A) => {
  const hemHalf = (A.hipR - A.centerX) + 100;
  const hemL = A.centerX - hemHalf, hemR = A.centerX + hemHalf;
  const foldLines = buildFoldLines([
    { y: A.waistY + 6, leftX: A.waistL, rightX: A.waistR },
    { y: A.hipY, leftX: A.hipL, rightX: A.hipR },
    { y: A.hemY - 6, leftX: hemL, rightX: hemR },
  ]);
  return {
    waistY: A.waistY,
    foldLines,
    d: `M ${A.waistL} ${A.waistY}
        L ${A.hipL} ${A.hipY}
        C ${A.hipL - 15} ${A.hipY + (A.hemY - A.hipY) * 0.35} ${hemL - 10} ${A.hemY - (A.hemY - A.hipY) * 0.35} ${hemL} ${A.hemY}
        L ${hemR} ${A.hemY}
        C ${hemR + 10} ${A.hemY - (A.hemY - A.hipY) * 0.35} ${A.hipR + 15} ${A.hipY + (A.hemY - A.hipY) * 0.35} ${A.hipR} ${A.hipY}
        L ${A.waistR} ${A.waistY} Z`,
  };
};

// 허리에서 밑단까지 하나의 긴 곡선으로 볼록하게 부풀리는, 6종 중 가장 넓은 실루엣
silhouette.ballgown = (A) => {
  const hemHalf = (A.hipR - A.centerX) + 145;
  const hemL = A.centerX - hemHalf, hemR = A.centerX + hemHalf;
  // 볼록한 곡선을 대략 따라가도록 중간 체크포인트를 바깥으로 살짝 밀어둔다
  const midY = A.waistY + (A.hemY - A.waistY) * 0.55;
  const waistHalf = A.waistR - A.centerX;
  const midHalf = waistHalf + (hemHalf - waistHalf) * 0.65;
  const foldLines = buildFoldLines([
    { y: A.waistY + 6, leftX: A.waistL, rightX: A.waistR },
    { y: midY, leftX: A.centerX - midHalf, rightX: A.centerX + midHalf },
    { y: A.hemY - 6, leftX: hemL, rightX: hemR },
  ]);
  return {
    waistY: A.waistY,
    foldLines,
    d: `M ${A.waistL} ${A.waistY}
        C ${A.waistL - 5} ${A.waistY + (A.hemY - A.waistY) * 0.25} ${hemL - 60} ${A.hemY - (A.hemY - A.waistY) * 0.15} ${hemL} ${A.hemY}
        L ${hemR} ${A.hemY}
        C ${hemR + 60} ${A.hemY - (A.hemY - A.waistY) * 0.15} ${A.waistR + 5} ${A.waistY + (A.hemY - A.waistY) * 0.25} ${A.waistR} ${A.waistY} Z`,
  };
};

// 무릎까지 몸에 붙어 내려가다 무릎 아래에서만 급격히 벌어지는 실루엣
silhouette.mermaid = (A) => {
  const kneeHalf = (A.hipR - A.centerX) - 15;
  const kneeL = A.centerX - kneeHalf, kneeR = A.centerX + kneeHalf;
  const hemHalf = (A.hipR - A.centerX) + 125;
  const hemL = A.centerX - hemHalf, hemR = A.centerX + hemHalf;
  // 힙까지는 좁게, 무릎에서 살짝 더 좁아졌다가 무릎 아래에서만 벌어지는 실제 핏을 그대로 따라간다
  const foldLines = buildFoldLines([
    { y: A.waistY + 6, leftX: A.waistL, rightX: A.waistR },
    { y: A.hipY, leftX: A.hipL, rightX: A.hipR },
    { y: A.kneeY, leftX: kneeL, rightX: kneeR },
    { y: A.hemY - 6, leftX: hemL, rightX: hemR },
  ]);
  return {
    waistY: A.waistY,
    foldLines,
    d: `M ${A.waistL} ${A.waistY}
        C ${A.waistL - 8} ${A.waistY + (A.hipY - A.waistY) * 0.5} ${A.hipL} ${A.hipY - (A.hipY - A.waistY) * 0.1} ${A.hipL} ${A.hipY}
        L ${kneeL} ${A.kneeY}
        C ${kneeL - 10} ${A.kneeY + (A.hemY - A.kneeY) * 0.3} ${hemL - 40} ${A.hemY - (A.hemY - A.kneeY) * 0.4} ${hemL} ${A.hemY}
        L ${hemR} ${A.hemY}
        C ${hemR + 40} ${A.hemY - (A.hemY - A.kneeY) * 0.4} ${kneeR + 10} ${A.kneeY + (A.hemY - A.kneeY) * 0.3} ${kneeR} ${A.kneeY}
        L ${A.hipR} ${A.hipY}
        C ${A.hipR} ${A.hipY - (A.hipY - A.waistY) * 0.1} ${A.waistR + 8} ${A.waistY + (A.hipY - A.waistY) * 0.5} ${A.waistR} ${A.waistY} Z`,
  };
};

// 골반까지는 머메이드처럼 몸에 붙어 내려가다, 무릎 못미쳐부터 직선 콘(원뿔) 모양으로 곧게 벌어지는 실루엣
// 머메이드(무릎까지 좁아졌다가 급격한 곡선 킥)와도, 아라인(엉덩이부터 바로 곡선 플레어)과도 다른
// 형태여야 하므로 플레어 구간을 곡선이 아닌 직선으로 그려 "트럼펫 벨" 특유의 각진 콘 실루엣을 만든다
silhouette.trumpet = (A) => {
  const flareStartY = A.hipY + (A.kneeY - A.hipY) * 0.5;
  const flareHalf = (A.hipR - A.centerX) - 5;
  const flareStartL = A.centerX - flareHalf, flareStartR = A.centerX + flareHalf;
  const hemHalf = (A.hipR - A.centerX) + 115;
  const hemL = A.centerX - hemHalf, hemR = A.centerX + hemHalf;
  const foldLines = buildFoldLines([
    { y: A.waistY + 6, leftX: A.waistL, rightX: A.waistR },
    { y: A.hipY, leftX: A.hipL, rightX: A.hipR },
    { y: flareStartY, leftX: flareStartL, rightX: flareStartR },
    { y: A.hemY - 6, leftX: hemL, rightX: hemR },
  ]);
  return {
    waistY: A.waistY,
    foldLines,
    d: `M ${A.waistL} ${A.waistY}
        C ${A.waistL - 8} ${A.waistY + (A.hipY - A.waistY) * 0.5} ${A.hipL} ${A.hipY - (A.hipY - A.waistY) * 0.1} ${A.hipL} ${A.hipY}
        L ${flareStartL} ${flareStartY}
        L ${hemL} ${A.hemY}
        L ${hemR} ${A.hemY}
        L ${flareStartR} ${flareStartY}
        L ${A.hipR} ${A.hipY}
        C ${A.hipR} ${A.hipY - (A.hipY - A.waistY) * 0.1} ${A.waistR + 8} ${A.waistY + (A.hipY - A.waistY) * 0.5} ${A.waistR} ${A.waistY} Z`,
  };
};

// 곡선 없이 직선으로만 이어지는, 가장 좁고 몸에 붙는 실루엣
silhouette.sheath = (A) => {
  const hemHalf = (A.hipR - A.centerX) + 8;
  const hemL = A.centerX - hemHalf, hemR = A.centerX + hemHalf;
  const foldLines = buildFoldLines([
    { y: A.waistY + 6, leftX: A.waistL, rightX: A.waistR },
    { y: A.hipY, leftX: A.hipL, rightX: A.hipR },
    { y: A.hemY - 6, leftX: hemL, rightX: hemR },
  ]);
  return {
    waistY: A.waistY,
    foldLines,
    d: `M ${A.waistL} ${A.waistY}
        L ${A.hipL} ${A.hipY}
        L ${hemL} ${A.hemY}
        L ${hemR} ${A.hemY}
        L ${A.hipR} ${A.hipY}
        L ${A.waistR} ${A.waistY} Z`,
  };
};

// 유일하게 waistY 자체를 가슴 바로 아래로 올리는 실루엣 — 봉제선 위치가 다르다
silhouette.empire = (A) => {
  const waistY = A.bustY + (A.waistY - A.bustY) * 0.3;
  const bustHalf = A.bustR - A.centerX;
  const waistHalf = A.waistR - A.centerX;
  const empireHalf = bustHalf - (bustHalf - waistHalf) * 0.3;
  const waistL = A.centerX - empireHalf, waistR = A.centerX + empireHalf;
  const hemHalf = (A.hipR - A.centerX) + 90;
  const hemL = A.centerX - hemHalf, hemR = A.centerX + hemHalf;
  const foldLines = buildFoldLines([
    { y: waistY + 6, leftX: waistL, rightX: waistR },
    { y: A.hemY - 6, leftX: hemL, rightX: hemR },
  ]);
  return {
    waistY,
    foldLines,
    d: `M ${waistL} ${waistY}
        C ${waistL - 5} ${waistY + (A.hemY - waistY) * 0.3} ${hemL - 20} ${A.hemY - (A.hemY - waistY) * 0.3} ${hemL} ${A.hemY}
        L ${hemR} ${A.hemY}
        C ${hemR + 20} ${A.hemY - (A.hemY - waistY) * 0.3} ${waistR + 5} ${waistY + (A.hemY - waistY) * 0.3} ${waistR} ${waistY} Z`,
  };
};

// 새 도형을 그리지 않고 기본값(aline)을 재사용한다. 점선 처리는 렌더러가 담당 (SPEC.md §3.4)
silhouette.other = silhouette.aline;

// 넥라인: 보디스 윗변만 그리는 열린 path (좌측 시작점 → 우측 끝점). strapless면 가슴선에서,
// 아니면 어깨점에서 시작/종료한다 — 이 시작/끝점이 곧 좌우 옆선이 이어붙는 지점이다 (SPEC.md §3.2)
const neckline = {};

// 볼록한 두 봉우리 사이 정중앙이 가장 깊게 파이는, 스트랩 없는 하트형 넥라인 (기본값)
neckline.sweetheart = (A) => {
  const peakY = A.bustY - 30;
  const dipY = A.bustY + 12;
  return {
    strapless: true,
    d: `M ${A.bustL} ${A.bustY}
        C ${A.bustL} ${peakY} ${A.centerX - 30} ${peakY} ${A.centerX} ${dipY}
        C ${A.centerX + 30} ${peakY} ${A.bustR} ${peakY} ${A.bustR} ${A.bustY}`,
  };
};

// 어깨점에서 시작해 정중앙에서 뾰족하게 파이는 V자 넥라인
neckline.v = (A) => {
  const vDepth = A.bustY + 20;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        L ${A.centerX} ${vDepth}
        L ${A.shoulderR} ${A.shoulderY}`,
  };
};

// 어깨점에서 시작해 각진 사각형 모양으로 파이는 넥라인
neckline.square = (A) => {
  const notchL = A.centerX - 45, notchR = A.centerX + 45;
  const notchY = A.bustY - 10;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        L ${notchL} ${A.shoulderY}
        L ${notchL} ${notchY}
        L ${notchR} ${notchY}
        L ${notchR} ${A.shoulderY}
        L ${A.shoulderR} ${A.shoulderY}`,
  };
};

// 가슴선에서 시작해(어깨는 드러남) 목 앞에서 좁아져 둥근 앞고리로 마감된다. 목 뒤로
// 넘어가 접히는 부분은 이 앞고리와 겹치는 별도의 둥근 조각(overlay)으로 정면에 그대로
// 노출해 표현한다 — 실제로는 안 보이는 부분이지만, 실루엣을 명확히 남기기 위해 정면에
// 펼쳐 보여주기로 함 (사용자 확인)
neckline.halter = (A) => {
  const neckHalf = 9;
  const frontTopY = A.neckY + 15;
  const overlayBottomY = frontTopY + 8;
  const overlayTopY = A.neckY - 18;
  return {
    strapless: true,
    d: `M ${A.bustL} ${A.bustY}
        Q ${A.centerX - 34} ${A.bustY - 30} ${A.centerX - neckHalf} ${frontTopY}
        Q ${A.centerX} ${frontTopY - 8} ${A.centerX + neckHalf} ${frontTopY}
        Q ${A.centerX + 34} ${A.bustY - 30} ${A.bustR} ${A.bustY}`,
    overlay: `M ${A.centerX - 16} ${overlayBottomY}
        C ${A.centerX - 16} ${overlayTopY} ${A.centerX + 16} ${overlayTopY} ${A.centerX + 16} ${overlayBottomY}
        C ${A.centerX + 16} ${overlayBottomY + 14} ${A.centerX - 16} ${overlayBottomY + 14} ${A.centerX - 16} ${overlayBottomY} Z`,
  };
};

// 가슴선 위쪽에서 완만하게 휘는, 어깨가 드러나는 수평에 가까운 넥라인
neckline.offshoulder = (A) => {
  const offY = A.bustY - 15;
  return {
    strapless: true,
    d: `M ${A.bustL} ${offY}
        Q ${A.centerX} ${offY - 6} ${A.bustR} ${offY}`,
  };
};

// 어깨점을 넓고 얕게 잇는, 쇄골선을 따라가는 보트넥
neckline.bateau = (A) => {
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.centerX} ${A.shoulderY + 12} ${A.shoulderR} ${A.shoulderY}`,
  };
};

// 어깨점에서 목 가까이까지 높게 차오르는, 비침 소재 패널을 암시하는 넥라인
neckline.illusion = (A) => {
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.centerX} ${A.neckY} ${A.shoulderR} ${A.shoulderY}`,
  };
};

// 곡선 없이 가슴선을 그대로 가로지르는, 가장 단순한 일자 넥라인
neckline.straight = (A) => {
  return {
    strapless: true,
    d: `M ${A.bustL} ${A.bustY} L ${A.bustR} ${A.bustY}`,
  };
};

// 어깨점에서 시작해 목선을 따라 완만하게 둥근 U자로 파이는 라운드 넥라인.
// 보트넥(아주 얕음)보다는 깊고 스쿱넥(가슴선 가까이 깊음)보다는 얕다
neckline.jewel = (A) => {
  const dipY = A.shoulderY + 40;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.centerX} ${dipY} ${A.shoulderR} ${A.shoulderY}`,
  };
};

// 어깨점에서 시작해 가슴선 가까이까지 넓고 둥글게 깊이 파이는 U자형 넥라인
neckline.scoop = (A) => {
  const dipY = A.shoulderY + 75;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.centerX} ${dipY} ${A.shoulderR} ${A.shoulderY}`,
  };
};

// 가슴선 양끝에서 대각선으로 올라가 서로 교차하는 두꺼운 스트랩을 만든다 — 왼쪽 가슴은
// 교차 뒤 오른쪽으로, 오른쪽 가슴은 교차 뒤 왼쪽으로 이어진다. 목 뒤로 넘어가 접히는
// 부분은 이 교차 지점과 겹치는 별도의 사각 조각(overlay)으로 정면에 그대로 노출해
// 표현한다 — 실제로는 안 보이는 부분이지만 실루엣을 명확히 남기기 위해 정면에 펼쳐 보임
neckline.twisthalter = (A) => {
  const neckHalf = 9;
  const frontTopY = A.neckY + 15;
  const pinchHalf = 15;
  const pinchY = A.bustY - 32;
  const overlayBottomY = frontTopY + 8;
  const overlayTopY = A.neckY - 8;

  // 채워진 도형만으로는 꼬임이 잘 안 보여서, 실제 교차점 위치를 계산해 짧은 강조선을
  // 얹는다(실루엣의 주름선과 같은 개념 — 판단에 영향 없는 순수 장식용). 교차점은
  // bustL→(centerX+pinchHalf, pinchY) 직선이 x=centerX를 지나는 지점
  const t = (A.centerX - A.bustL) / (A.centerX + pinchHalf - A.bustL);
  const crossY = A.bustY + t * (pinchY - A.bustY);

  return {
    strapless: true,
    d: `M ${A.bustL} ${A.bustY}
        L ${A.centerX + pinchHalf} ${pinchY}
        L ${A.centerX + neckHalf} ${frontTopY}
        L ${A.centerX - neckHalf} ${frontTopY}
        L ${A.centerX - pinchHalf} ${pinchY}
        L ${A.bustR} ${A.bustY}`,
    overlay: `M ${A.centerX - neckHalf - 3} ${overlayBottomY}
        Q ${A.centerX - neckHalf - 6} ${overlayTopY + 6} ${A.centerX - neckHalf + 1} ${overlayTopY}
        Q ${A.centerX} ${overlayTopY - 6} ${A.centerX + neckHalf - 1} ${overlayTopY}
        Q ${A.centerX + neckHalf + 6} ${overlayTopY + 6} ${A.centerX + neckHalf + 3} ${overlayBottomY}
        Q ${A.centerX} ${overlayBottomY + 9} ${A.centerX - neckHalf - 3} ${overlayBottomY} Z`,
    detailLines: [
      `M ${A.centerX - 16} ${crossY - 12} L ${A.centerX + 16} ${crossY + 12}`,
      `M ${A.centerX + 16} ${crossY - 12} L ${A.centerX - 16} ${crossY + 12}`,
    ],
  };
};

// 새 도형을 그리지 않고 기본값(sweetheart)을 재사용한다 (SPEC.md §3.4, §4 기본값)
neckline.other = neckline.sweetheart;

// 어깨점에서 목 가까이까지 높게 올라간 뒤(하이넥에 가까운 컬러 라인), 다시 정중앙에서
// 완만하게 파여 내려오는 넥라인 (퀸앤). 옆쪽은 비침 소재를 암시하는 높은 라인, 중앙은
// 얕은 하트형 다이로 표현한다
neckline.queenanne = (A) => {
  const wingHalf = 20;
  const wingY = A.shoulderY - 25;
  const peakY = A.bustY - 35;
  const dipY = A.bustY - 5;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.shoulderL - 2} ${A.shoulderY - 12} ${A.centerX - wingHalf} ${wingY}
        C ${A.centerX - wingHalf} ${peakY} ${A.centerX - 26} ${peakY} ${A.centerX} ${dipY}
        C ${A.centerX + 26} ${peakY} ${A.centerX + wingHalf} ${peakY} ${A.centerX + wingHalf} ${wingY}
        Q ${A.shoulderR + 2} ${A.shoulderY - 12} ${A.shoulderR} ${A.shoulderY}`,
  };
};

// 어깨점에서 시작해 목선을 따라 둥글게 파이는 라운드 넥라인 위에, 앞가슴 중앙에 작은
// 물방울형 컷아웃(키홀)을 별도 강조선으로 얹는다 — 실제로 뚫린 구멍이 아니라 채워진
// 도형 위에 겹치는 윤곽선으로만 표현한다 (트위스트홀터의 교차선과 같은 개념)
neckline.keyhole = (A) => {
  const dipY = A.shoulderY + 55;
  const holeTopY = dipY + 10;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.centerX} ${dipY} ${A.shoulderR} ${A.shoulderY}`,
    detailLines: [
      `M ${A.centerX} ${holeTopY}
       Q ${A.centerX - 8} ${holeTopY + 8} ${A.centerX - 6} ${holeTopY + 16}
       Q ${A.centerX - 4} ${holeTopY + 24} ${A.centerX} ${holeTopY + 24}
       Q ${A.centerX + 4} ${holeTopY + 24} ${A.centerX + 6} ${holeTopY + 16}
       Q ${A.centerX + 8} ${holeTopY + 8} ${A.centerX} ${holeTopY} Z`,
    ],
  };
};

// 목을 감싸듯 목선 가까이까지 높이 올라오는 스탠드칼라형 넥라인. 목 앞쪽에 작은
// 물방울형 컷아웃을 강조선으로 얹어 참고 이미지의 하이넥 슬릿을 표현한다
neckline.highneck = (A) => {
  const collarTopY = A.neckY - 25;
  const neckHalf = 20;
  const holeTopY = collarTopY + 18;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        Q ${A.shoulderL + 5} ${A.neckY + 5} ${A.centerX - neckHalf} ${collarTopY + 15}
        Q ${A.centerX - neckHalf + 3} ${collarTopY} ${A.centerX} ${collarTopY - 4}
        Q ${A.centerX + neckHalf - 3} ${collarTopY} ${A.centerX + neckHalf} ${collarTopY + 15}
        Q ${A.shoulderR - 5} ${A.neckY + 5} ${A.shoulderR} ${A.shoulderY}`,
    detailLines: [
      `M ${A.centerX} ${holeTopY}
       Q ${A.centerX - 6} ${holeTopY + 6} ${A.centerX - 4} ${holeTopY + 12}
       Q ${A.centerX - 3} ${holeTopY + 18} ${A.centerX} ${holeTopY + 18}
       Q ${A.centerX + 3} ${holeTopY + 18} ${A.centerX + 4} ${holeTopY + 12}
       Q ${A.centerX + 6} ${holeTopY + 6} ${A.centerX} ${holeTopY} Z`,
    ],
  };
};

// 어깨점에서 정중앙으로 깊게 파이는 V 위에, 양쪽 어깨에서 반대쪽 가슴으로 교차해
// 내려가는 랩(wrap) 자락 선을 강조선으로 얹어 서플리스 특유의 겹침을 표현한다
neckline.surplice = (A) => {
  const vDepth = A.bustY + 35;
  return {
    strapless: false,
    d: `M ${A.shoulderL} ${A.shoulderY}
        L ${A.centerX} ${vDepth}
        L ${A.shoulderR} ${A.shoulderY}`,
    detailLines: [
      `M ${A.shoulderL} ${A.shoulderY} L ${A.waistR - 15} ${A.waistY - 10}`,
      `M ${A.shoulderR} ${A.shoulderY} L ${A.waistL + 15} ${A.waistY - 10}`,
    ],
  };
};

// 실루엣이 쓰는 waistY가 기본 허리선(A.waistY)이 아닐 때(엠파이어처럼 가슴 아래로 올라간 경우)
// 가슴선~기본 허리선 사이를 보간해 그 높이에서의 좌우 폭을 구한다. waistY가 A.waistY면 그대로 A.waistL/R
function waistPointsAt(A, waistY) {
  const t = (waistY - A.bustY) / (A.waistY - A.bustY);
  const bustHalf = A.bustR - A.centerX;
  const waistHalf = A.waistR - A.centerX;
  const half = bustHalf - (bustHalf - waistHalf) * t;
  return { waistL: A.centerX - half, waistR: A.centerX + half };
}

// 넥라인 path의 앞머리 "M x y" 명령만 제거해, 옆선이 그 좌표에 도착한 다음 이어그릴 수 있게 한다
function stripMove(d) {
  return d.replace(/^\s*M\s*[-\d.]+\s+[-\d.]+/, '');
}

// 보디스 = 넥라인이 정하는 윗변 + 좌우 옆선 + (실루엣이 쓰는) 허리선.
// 넥라인이 detailLines(예: 트위스트홀터의 교차 강조선)를 갖고 있으면 그대로 반환해
// buildFullDressSvg가 보디스 위에 얹을 수 있게 한다
function buildBodice(A, necklineId, waistY) {
  const { waistL, waistR } = waistPointsAt(A, waistY);
  const { d: necklineD, strapless, detailLines, overlay } = neckline[necklineId](A);
  const necklineRest = stripMove(necklineD);

  // 스트랩리스는 옆선이 가슴선(bustY)에서 뚝 끊겨서, 어깨점에 붙는 소매와 사이에
  // 빈 틈이 크게 보이는 문제가 있었다. 앞쪽 네크라인 모양은 그대로 두고 옆선만 겨드랑이
  // 높이(sideTopY)까지 살짝 더 올려, 소매가 있을 때 몸판과 이어지는 느낌이 나게 한다
  const sideTopY = A.shoulderY + 22;
  const sideTopL = A.bustL - 8;
  const sideTopR = A.bustR + 8;
  const d = strapless
    ? `M ${waistL} ${waistY}
        Q ${A.bustL - 4} ${A.bustY + (waistY - A.bustY) * 0.5} ${sideTopL} ${sideTopY}
        L ${A.bustL} ${A.bustY}
        ${necklineRest}
        L ${sideTopR} ${sideTopY}
        Q ${A.bustR + 4} ${A.bustY + (waistY - A.bustY) * 0.5} ${waistR} ${waistY} Z`
    : `M ${waistL} ${waistY}
      C ${waistL} ${A.bustY} ${A.bustL} ${A.shoulderY + (A.bustY - A.shoulderY) * 0.5} ${A.shoulderL} ${A.shoulderY}
      ${necklineRest}
      C ${A.bustR} ${A.shoulderY + (A.bustY - A.shoulderY) * 0.5} ${waistR} ${A.bustY} ${waistR} ${waistY} Z`;

  return { d, detailLines: detailLines || [], overlay: overlay || null };
}

// 소매 한쪽(어깨점 기준)을 그리는 헬퍼. side: 왼쪽=-1(shoulderL), 오른쪽=1(shoulderR)
// reachX/reachY = 어깨점에서 소매 끝까지의 가로/세로 거리, bulge = 바깥쪽으로 부푸는 정도,
// cuffHalf = 소매 끝(손목 쪽) 폭의 절반. 어깨 쪽도 topHalf만큼 폭을 둬서, 한 점으로
// 뾰족하게 모이는 리본이 아니라 원통형 팔처럼 두께가 있게 만든다
function sleevePetal(A, side, reachX, reachY, bulge, cuffHalf) {
  const shoulderX = side === -1 ? A.shoulderL : A.shoulderR;
  const topHalf = 6;
  const outX = shoulderX + side * reachX;
  const outY = A.shoulderY + reachY;
  const topInner = shoulderX - side * topHalf * 0.4;
  const topOuter = shoulderX + side * topHalf * 0.6;
  const botOuter = outX + side * cuffHalf;
  const botInner = outX - side * cuffHalf;
  return `M ${topInner} ${A.shoulderY}
      L ${topOuter} ${A.shoulderY}
      C ${topOuter + side * bulge} ${A.shoulderY + reachY * 0.3} ${botOuter + side * bulge * 0.3} ${outY - reachY * 0.25} ${botOuter} ${outY}
      L ${botInner} ${outY}
      C ${topInner - side * bulge * 0.25} ${A.shoulderY + reachY * 0.35} ${topInner - side * bulge * 0.1} ${A.shoulderY + reachY * 0.1} ${topInner} ${A.shoulderY} Z`;
}

// 소매: 어깨점 기준 좌우 대칭 path (SPEC.md §3.2). 두 소매를 하나의 d에 서브패스로 담는다
const sleeve = {};
sleeve.none = () => ({ d: '' });
sleeve.cap = (A) => ({ d: `${sleevePetal(A, -1, 15, 30, 18, 15)} ${sleevePetal(A, 1, 15, 30, 18, 15)}` });
sleeve.short = (A) => ({ d: `${sleevePetal(A, -1, 8, 75, 20, 11)} ${sleevePetal(A, 1, 8, 75, 20, 11)}` });
sleeve.long = (A) => ({ d: `${sleevePetal(A, -1, 4, 180, 13, 7)} ${sleevePetal(A, 1, 4, 180, 13, 7)}` });
sleeve.puff = (A) => ({ d: `${sleevePetal(A, -1, 24, 42, 36, 10)} ${sleevePetal(A, 1, 24, 42, 36, 10)}` });
// 긴소매와 같은 모양이되, 렌더러가 팔뚝 중간에 점선 탈부착 표시선을 추가로 그린다
sleeve.detachable = (A) => ({ d: sleeve.long(A).d, detachMarkY: A.shoulderY + 180 * 0.5 });
// 새 도형을 그리지 않고 기본값(none, 즉 민소매)을 재사용한다 (SPEC.md §3.4, §4 기본값)
sleeve.other = sleeve.none;

// 텍스처: <pattern> 타일로 정의해 fill="url(#...)"로 참조한다 (SPEC.md §3.3). 미묘하게 —
// 특히 레이스는 튤(균일한 그물망)과 달리 불규칙하게 흩뿌린 작은 점으로 그려 net 무늬로 안 보이게 한다
// 배경색은 var(--dress-fill)이 아니라 실제 값을 그대로 쓴다 — 이미지 내보내기(§5.1)에서
// SVG를 독립 리소스로 직렬화하면 원본 문서의 CSS 변수를 못 읽어 검게 나오는 문제가 있었다
const TEXTURE_TILE = {
  satin:   { size: 40, html: '<rect width="40" height="40" fill="#FBF8F4"/><line x1="0" y1="40" x2="40" y2="0" stroke="#00000012" stroke-width="8"/>' },
  mikado:  { size: 20, html: '<rect width="20" height="20" fill="#FBF8F4"/><line x1="0" y1="0" x2="20" y2="20" stroke="#00000010" stroke-width="1"/><line x1="20" y1="0" x2="0" y2="20" stroke="#00000010" stroke-width="1"/>' },
  tulle:   { size: 14, html: '<rect width="14" height="14" fill="#FBF8F4"/><path d="M0 0 L14 14 M14 0 L0 14" stroke="#00000018" stroke-width="0.6"/>' },
  lace:    { size: 22, html: '<rect width="22" height="22" fill="#FBF8F4"/><circle cx="4" cy="5" r="1.2" fill="#00000022"/><circle cx="15" cy="3" r="0.8" fill="#0000001a"/><circle cx="9" cy="13" r="1.4" fill="#00000022"/><circle cx="18" cy="17" r="1" fill="#0000001a"/><circle cx="3" cy="18" r="0.9" fill="#00000018"/>' },
  organza: { size: 10, html: '<rect width="10" height="10" fill="#FBF8F4"/><line x1="0" y1="0" x2="0" y2="10" stroke="#00000014" stroke-width="0.5"/><line x1="0" y1="0" x2="10" y2="0" stroke="#00000014" stroke-width="0.5"/>' },
  beaded:  { size: 26, html: '<rect width="26" height="26" fill="#FBF8F4"/><circle cx="13" cy="13" r="1.8" fill="#00000028"/><circle cx="12.3" cy="12.3" r="0.6" fill="#ffffff90"/>' },
};
TEXTURE_TILE.other = TEXTURE_TILE.satin; // 새 도형 없이 기본값(satin) 재사용 (SPEC.md §4 기본값)

let texturePatternCounter = 0;
// svg 자신의 <defs>에 유일한 id로 패턴을 등록하고, fill 속성에 쓸 url(#...) 문자열을 반환한다
// (문서 전체에서 <svg>가 여러 개이므로 id 충돌을 피하려면 매번 새 id를 만들어야 한다)
function registerTexturePattern(svgNS, defs, textureId) {
  texturePatternCounter += 1;
  const id = `tex-${textureId}-${texturePatternCounter}`;
  const tile = TEXTURE_TILE[textureId];
  const pattern = document.createElementNS(svgNS, 'pattern');
  pattern.setAttribute('id', id);
  pattern.setAttribute('patternUnits', 'userSpaceOnUse');
  pattern.setAttribute('width', tile.size);
  pattern.setAttribute('height', tile.size);
  pattern.innerHTML = tile.html;
  defs.appendChild(pattern);
  return `url(#${id})`;
}

// 모든 넥라인 밑에 깔리는 기본 마네킹(목~어깨~가슴 상단) 윤곽선. 넥라인 도형이 단독으로는
// 허공에 뜬 것처럼 어색해 보이는 문제를, 각 넥라인을 손질하는 대신 공통 배경 실루엣을 깔아
// 해결한다 — 보디스가 그 위를 덮으므로 네크라인이 파인 부분에서만 드러난다
function torsoBase(A) {
  const neckHalf = 12;
  const neckTopY = A.neckY - 43;
  const tuckY = A.shoulderY - 12;
  const bustBottomY = A.bustY + 18;
  return `M ${A.centerX - neckHalf} ${neckTopY}
      L ${A.centerX - neckHalf} ${tuckY}
      Q ${A.centerX - neckHalf - 8} ${A.shoulderY - 2} ${A.shoulderL} ${A.shoulderY}
      Q ${A.shoulderL + 12} ${A.bustY - 15} ${A.bustL} ${bustBottomY}
      L ${A.bustR} ${bustBottomY}
      Q ${A.shoulderR - 12} ${A.bustY - 15} ${A.shoulderR} ${A.shoulderY}
      Q ${A.centerX + neckHalf + 8} ${A.shoulderY - 2} ${A.centerX + neckHalf} ${tuckY}
      L ${A.centerX + neckHalf} ${neckTopY}
      Q ${A.centerX} ${neckTopY - 8} ${A.centerX - neckHalf} ${neckTopY} Z`;
}

// 마네킹 팔 — torsoBase만으로는 어깨 아래가 허전해 보이고, 특히 소매가 두께 없이 평면적으로
// 보인다는 피드백에 따라 팔 범위까지 마네킹을 늘린다. 어깨점(A.shoulderL/R)에서 시작해
// 팔꿈치 근처에서 살짝 안쪽으로, 손목(대략 엉덩이 높이)에서 다시 살짝 바깥으로 나가는
// 자연스러운 팔 자세를 원통형 두께로 표현한다
function armBase(A, side) {
  const shoulderX = side === -1 ? A.shoulderL : A.shoulderR;
  const topHalf = 15;
  const cuffHalf = 8;
  const elbowY = A.shoulderY + 110;
  const wristY = A.shoulderY + 190;
  const elbowX = shoulderX + side * 6;
  const wristX = shoulderX + side * 10;
  const topOuter = shoulderX + side * topHalf * 0.7;
  const topInner = shoulderX - side * topHalf * 0.3;
  const botOuter = wristX + side * cuffHalf;
  const botInner = wristX - side * cuffHalf;
  return `M ${topInner} ${A.shoulderY}
      L ${topOuter} ${A.shoulderY}
      C ${topOuter + side * 10} ${A.shoulderY + 35} ${elbowX + side * (cuffHalf + 4)} ${elbowY - 20} ${elbowX + side * cuffHalf} ${elbowY}
      C ${elbowX + side * (cuffHalf - 1)} ${elbowY + 25} ${botOuter} ${wristY - 25} ${botOuter} ${wristY}
      L ${botInner} ${wristY}
      C ${elbowX - side * (cuffHalf - 1)} ${wristY - 25} ${elbowX - side * cuffHalf} ${elbowY + 25} ${elbowX - side * cuffHalf} ${elbowY}
      C ${topInner - side * 6} ${elbowY - 20} ${topInner - side * 8} ${A.shoulderY + 35} ${topInner} ${A.shoulderY} Z`;
}

// 트레인(허리 라인/뒷모습과 함께 §10에서 "그림에 반영 안 함"이었다가, 눌러도 차이가
// 안 보인다는 피드백을 받아 실제 스케치에 반영하기로 바꾼 항목 중 하나) — 헴 라인
// 뒤에서 자락이 흘러나오는 모양. 스커트보다 먼저 그려 밑단 옆/아래로만 살짝 비치게 한다.
// topHalf는 어떤 실루엣의 헴 폭보다도 살짝 좁게 잡아, 폭이 넓은 볼가운 등에서는 자락이
// 헴 라인 바로 아래에서만 드러나고 위쪽은 스커트에 가려지게 한다
const TRAIN_SHAPE = {
  sweep:     { extend: 15, flare: 12 },
  chapel:    { extend: 35, flare: 25 },
  cathedral: { extend: 55, flare: 40 },
};
function buildTrainPath(A, trainId) {
  const cfg = TRAIN_SHAPE[trainId];
  if (!cfg) return null;
  const topHalf = 175;
  const botHalf = topHalf + cfg.flare;
  const trainY = A.hemY + cfg.extend;
  return `M ${A.centerX - topHalf} ${A.hemY}
      Q ${A.centerX - botHalf} ${A.hemY + cfg.extend * 0.55} ${A.centerX - botHalf * 0.92} ${trainY}
      Q ${A.centerX} ${trainY + 8} ${A.centerX + botHalf * 0.92} ${trainY}
      Q ${A.centerX + botHalf} ${A.hemY + cfg.extend * 0.55} ${A.centerX + topHalf} ${A.hemY} Z`;
}

// 허리 라인 속성 — 보디스/스커트가 실제로 갈리는 위치(waistY, 실루엣마다 다름)와는 별개로,
// "이 지점에 허리 장식/시접이 있다"는 새시 느낌의 강조선을 얹어 종류별로 눈에 띄게 한다
const WAIST_SEAM_Y = {
  natural: (A) => A.waistY,
  drop: (A) => A.waistY + 35,
  empire: (A) => A.bustY + (A.waistY - A.bustY) * 0.3,
};
function buildWaistSeamPath(A, waistId) {
  const half = A.waistR - A.centerX + 8;
  if (waistId === 'basque') {
    const sideY = A.waistY - 8;
    const dipY = A.waistY + 24;
    return `M ${A.centerX - half} ${sideY}
        Q ${A.centerX - half * 0.4} ${sideY + 6} ${A.centerX} ${dipY}
        Q ${A.centerX + half * 0.4} ${sideY + 6} ${A.centerX + half} ${sideY}`;
  }
  const getY = WAIST_SEAM_Y[waistId] || WAIST_SEAM_Y.natural;
  const y = getY(A);
  return `M ${A.centerX - half} ${y} L ${A.centerX + half} ${y}`;
}

// 뒷모습 — 정면 스케치로는 절대 표현이 안 되는 항목이라, 넥라인 칩과 같은 방식으로
// 뒷모습 전용 작은 미리보기를 따로 만든다(메인 스케치/내보내기에는 관여하지 않는다)
const BACK_SHAPE = {
  vback: (A) => ({
    d: `M ${A.shoulderL} ${A.shoulderY} L ${A.centerX} ${A.waistY - 40} L ${A.shoulderR} ${A.shoulderY}`,
  }),
  lowback: (A) => ({
    d: `M ${A.shoulderL} ${A.shoulderY} Q ${A.centerX} ${A.waistY - 15} ${A.shoulderR} ${A.shoulderY}`,
  }),
  keyhole: (A) => {
    const dipY = A.shoulderY + 45;
    const holeTopY = dipY + 12;
    return {
      d: `M ${A.shoulderL} ${A.shoulderY} Q ${A.centerX} ${dipY} ${A.shoulderR} ${A.shoulderY}`,
      detailLines: [
        `M ${A.centerX} ${holeTopY}
         Q ${A.centerX - 8} ${holeTopY + 8} ${A.centerX - 6} ${holeTopY + 16}
         Q ${A.centerX - 4} ${holeTopY + 24} ${A.centerX} ${holeTopY + 24}
         Q ${A.centerX + 4} ${holeTopY + 24} ${A.centerX + 6} ${holeTopY + 16}
         Q ${A.centerX + 8} ${holeTopY + 8} ${A.centerX} ${holeTopY} Z`,
      ],
    };
  },
  buttons: (A) => ({
    d: `M ${A.shoulderL} ${A.shoulderY} L ${A.shoulderR} ${A.shoulderY}`,
  }),
  illusion: (A) => ({
    d: `M ${A.shoulderL} ${A.shoulderY} Q ${A.centerX} ${A.neckY} ${A.shoulderR} ${A.shoulderY}`,
  }),
};
BACK_SHAPE.other = BACK_SHAPE.vback;

function buildBackViewSvg(backId, bodiceTextureId) {
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '110 90 180 220');
  const defs = document.createElementNS(svgNS, 'defs');
  svg.appendChild(defs);

  const torso = document.createElementNS(svgNS, 'path');
  torso.setAttribute('d', torsoBase(A));
  torso.setAttribute('class', 'torso-outline');
  svg.appendChild(torso);

  const shapeFn = BACK_SHAPE[backId] || BACK_SHAPE.vback;
  const { d: topD, detailLines } = shapeFn(A);
  const { waistL, waistR } = waistPointsAt(A, A.waistY);
  const topRest = stripMove(topD);
  const bodiceD = `M ${waistL} ${A.waistY}
      C ${waistL} ${A.bustY} ${A.bustL} ${A.shoulderY + (A.bustY - A.shoulderY) * 0.5} ${A.shoulderL} ${A.shoulderY}
      ${topRest}
      C ${A.bustR} ${A.shoulderY + (A.bustY - A.shoulderY) * 0.5} ${waistR} ${A.bustY} ${waistR} ${A.waistY} Z`;

  const fillUrl = registerTexturePattern(svgNS, defs, bodiceTextureId || 'satin');
  const p = document.createElementNS(svgNS, 'path');
  p.setAttribute('d', bodiceD);
  p.setAttribute('fill', fillUrl);
  p.setAttribute('class', 'dress-outline');
  svg.appendChild(p);

  (detailLines || []).forEach((d) => {
    const dp = document.createElementNS(svgNS, 'path');
    dp.setAttribute('d', d);
    dp.setAttribute('class', 'fold-line');
    svg.appendChild(dp);
  });

  if (backId === 'buttons') {
    for (let i = 0; i < 5; i++) {
      const y = A.shoulderY + 20 + i * ((A.waistY - A.shoulderY - 30) / 4);
      const c = document.createElementNS(svgNS, 'circle');
      c.setAttribute('cx', A.centerX);
      c.setAttribute('cy', y);
      c.setAttribute('r', 6.5);
      c.setAttribute('fill', '#8A7A6D');
      svg.appendChild(c);
    }
  }

  return svg;
}

// 스커트+보디스+소매까지 합성한 드레스 <svg>를 반환. 스커트/보디스/소매는 각각 독립된
// 텍스처를 받는다 (SPEC.md §3.3, §4) — 파츠마다 다른 텍스처를 고르면 허리선에 경계가
// 보이는 게 정상이다 (좌표는 허리선에서 정확히 겹친다)
function buildFullDressSvg(silhouetteId, necklineId, sleeveId, skirtTextureId, bodiceTextureId, sleeveTextureId, waistId, trainId) {
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 400 700');

  const defs = document.createElementNS(svgNS, 'defs');
  svg.appendChild(defs);

  const { d: skirtD, waistY, foldLines } = silhouette[silhouetteId](A);
  const { d: bodiceD, detailLines: bodiceDetailLines, overlay: bodiceOverlay } = buildBodice(A, necklineId, waistY);

  // 0. 마네킹 베이스 — 넥라인/보디스보다 먼저 그려서 항상 맨 뒤에 깔린다 (팔까지 포함)
  const torsoPath = document.createElementNS(svgNS, 'path');
  torsoPath.setAttribute('d', torsoBase(A));
  torsoPath.setAttribute('class', 'torso-outline');
  svg.appendChild(torsoPath);
  [-1, 1].forEach((side) => {
    const armPath = document.createElementNS(svgNS, 'path');
    armPath.setAttribute('d', armBase(A, side));
    armPath.setAttribute('class', 'torso-outline');
    svg.appendChild(armPath);
  });

  // 트레인 — 스커트보다 먼저 그려서 헴 라인 옆/아래로만 살짝 드러나게 한다
  const trainD = buildTrainPath(A, trainId);
  if (trainD) {
    const t = document.createElementNS(svgNS, 'path');
    t.setAttribute('d', trainD);
    t.setAttribute('fill', registerTexturePattern(svgNS, defs, skirtTextureId));
    t.setAttribute('class', 'dress-outline');
    svg.appendChild(t);
  }

  // 1. 스커트, 2. 보디스 (렌더 순서 SPEC.md §3.3)
  const bodiceFillUrl = registerTexturePattern(svgNS, defs, bodiceTextureId);
  [
    [skirtD, silhouetteId === 'other', registerTexturePattern(svgNS, defs, skirtTextureId)],
    [bodiceD, necklineId === 'other', bodiceFillUrl],
  ].forEach(([d, isOther, fillUrl]) => {
    const p = document.createElementNS(svgNS, 'path');
    p.setAttribute('d', d);
    p.setAttribute('fill', fillUrl);
    p.setAttribute('class', 'dress-outline' + (isOther ? ' other' : ''));
    svg.appendChild(p);
  });

  // 스커트/보디스 위에 얇은 강조선을 얹는다 — 실루엣이 통짜 도형처럼 안 보이게 하거나
  // (스커트 주름선) 트위스트홀터처럼 채운 도형만으로는 안 보이는 디테일을 보여주기 위한
  // 순수 장식용 선이라, 좌표/형태 판단에는 영향이 없다 (fill 없이 stroke만)
  [...(foldLines || []), ...bodiceDetailLines].forEach((d) => {
    const p = document.createElementNS(svgNS, 'path');
    p.setAttribute('d', d);
    p.setAttribute('class', 'fold-line');
    svg.appendChild(p);
  });

  // 허리 라인 속성 — 실제 보디스/스커트 경계와 별개로 종류별 새시 강조선을 얹는다
  const waistSeamD = buildWaistSeamPath(A, waistId);
  if (waistSeamD) {
    const w = document.createElementNS(svgNS, 'path');
    w.setAttribute('d', waistSeamD);
    w.setAttribute('class', 'waist-seam');
    svg.appendChild(w);
  }

  // 홀터 계열처럼 목 뒤로 넘어가 접히는 조각은 앞고리/교차 위에 겹치는 별도 조각으로
  // 그린다 — 같은 보디스 텍스처를 쓰고 자기 외곽선을 가져서 "겹쳐진 조각"처럼 보인다
  if (bodiceOverlay) {
    const p = document.createElementNS(svgNS, 'path');
    p.setAttribute('d', bodiceOverlay);
    p.setAttribute('fill', bodiceFillUrl);
    p.setAttribute('class', 'dress-outline');
    svg.appendChild(p);
  }

  // 3. 소매
  const { d: sleeveD } = sleeve[sleeveId](A);
  if (sleeveD) {
    const p = document.createElementNS(svgNS, 'path');
    p.setAttribute('d', sleeveD);
    p.setAttribute('fill', registerTexturePattern(svgNS, defs, sleeveTextureId));
    p.setAttribute('class', 'dress-outline' + (sleeveId === 'other' ? ' other' : ''));
    svg.appendChild(p);

    if (sleeveId === 'detachable') {
      [A.shoulderL, A.shoulderR].forEach((shoulderX) => {
        const mark = document.createElementNS(svgNS, 'line');
        const markY = A.shoulderY + 90;
        mark.setAttribute('x1', shoulderX - 10);
        mark.setAttribute('x2', shoulderX + 10);
        mark.setAttribute('y1', markY);
        mark.setAttribute('y2', markY);
        mark.setAttribute('class', 'detach-mark');
        svg.appendChild(mark);
      });
    }
  }

  return svg;
}

// 텍스처 칩용 작은 스와치(패턴 자체만) — 드레스 형태와 무관
function buildTextureSwatch(textureId) {
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 40 40');
  const defs = document.createElementNS(svgNS, 'defs');
  svg.appendChild(defs);
  const fillUrl = registerTexturePattern(svgNS, defs, textureId);
  const rect = document.createElementNS(svgNS, 'rect');
  rect.setAttribute('width', '40');
  rect.setAttribute('height', '40');
  rect.setAttribute('fill', fillUrl);
  rect.setAttribute('class', 'dress-outline');
  svg.appendChild(rect);
  return svg;
}

// ── 저장소 (SPEC.md §4, §9) ───────────────────────────────────────────────
const STORAGE_KEY = 'dressTourData';

function defaultStore() {
  return { version: 2, fittings: [], onboarded: false };
}

// Store.version 불일치 시 이 함수를 거친다. 지금은 버전 2 하나뿐이라 실제 변환 대상이
// 없지만, 실패해도 기존 localStorage 값을 지우지 않고 빈 스토어로만 대체한다
function migrateStore() {
  return null;
}

// textureRef는 이 필드가 생기기 전에 저장된 기록에는 없을 수 있다. Store.version은
// 그대로 2라서 migrateStore를 안 거치므로, 불러올 때마다 없는 칸만 기본값으로 채워준다
function ensureTextureRef(sketch) {
  if (!sketch.textureRef) sketch.textureRef = {};
  ['skirt', 'bodice', 'sleeve'].forEach((partKey) => {
    if (!sketch.textureRef[partKey]) sketch.textureRef[partKey] = { note: '', image: null };
  });
}

function loadStore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultStore();
    const parsed = JSON.parse(raw);
    const store = parsed && parsed.version === 2 && Array.isArray(parsed.fittings)
      ? parsed
      : migrateStore(parsed) || defaultStore();
    store.fittings.forEach((f) => ensureTextureRef(f.sketch));
    return store;
  } catch (e) {
    return defaultStore();
  }
}

function persistStore() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.store));
}

let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persistStore, 300);
}

// ── 전역 상태 (SPEC.md §9: 전역 상태는 객체 하나) ─────────────────────────
let state = {
  store: loadStore(),
  view: 'list', // 'record' | 'list' | 'compare' | 'shared'
  current: null, // 기록 화면에서 편집 중인 Fitting
  lastShopName: '',
  lastVisitedAt: '',
  deleteMenuId: null,
  uiCollapsed: { memo: true },
  compareMode: false, // 목록 화면의 "비교하기" 선택 모드 여부
  compareSelection: [], // 비교 선택된 fitting id, 최대 3개
  shared: null, // URL 해시로 들어온 읽기 전용 공유 데이터 { items: [...] }
  shareDialog: null, // 공유 링크 다이얼로그 열림 상태 { mode, fittingIds, includeShopName, ... }
};

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

// 새 기록의 기본값 — 아무것도 안 골라도 저장 가능해야 한다 (SPEC.md §4)
function defaultSketch() {
  return {
    silhouette: 'aline', neckline: 'sweetheart', sleeve: 'none',
    waist: 'natural', back: 'vback', train: 'sweep',
    skirtTexture: 'satin', bodiceTexture: 'satin', sleeveTexture: 'satin',
    textureRef: {
      skirt: { note: '', image: null },
      bodice: { note: '', image: null },
      sleeve: { note: '', image: null },
    },
    custom: {},
  };
}

function createFitting() {
  return {
    id: crypto.randomUUID(),
    shopName: state.lastShopName,
    visitedAt: state.lastVisitedAt || todayStr(),
    dressName: '', priceKrw: null, rating: null, memo: '',
    sketch: defaultSketch(),
  };
}

// ── 화면 전환 ──────────────────────────────────────────────────────────────
function startNewFitting() {
  const fitting = createFitting();
  state.store.fittings.push(fitting);
  state.current = fitting;
  state.view = 'record';
  persistStore();
  render();
}

function openFitting(id) {
  state.current = state.store.fittings.find((f) => f.id === id) || null;
  state.view = 'record';
  render();
}

// 매장명/방문일은 다음 기록에 자동 승계된다 (같은 매장에서 연속으로 여러 벌을 보므로, SPEC.md §6.2)
function backToList() {
  if (state.current) {
    state.lastShopName = state.current.shopName;
    state.lastVisitedAt = state.current.visitedAt;
  }
  state.current = null;
  state.view = 'list';
  persistStore();
  render();
}

function deleteFitting(id) {
  state.store.fittings = state.store.fittings.filter((f) => f.id !== id);
  state.deleteMenuId = null;
  persistStore();
  render();
}

// 텍스트/숫자 입력은 render()를 부르지 않는다 — innerHTML로 다시 그리면 입력 중이던
// 포커스/커서 위치가 날아가버리기 때문. 칩 선택처럼 눈에 보이는 구조가 바뀌는
// 변경만 render()를 호출한다
function updateCurrentField(key, value) {
  state.current[key] = value;
  scheduleSave();
}

function updateSketchField(key, value) {
  state.current.sketch[key] = value;
  scheduleSave();
  render();
}

function updateCustomText(category, value) {
  state.current.sketch.custom[category] = value;
  scheduleSave();
}

// ── 렌더 ────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  // render()는 매번 innerHTML을 통째로 비우고 다시 그리므로, 칩을 클릭하거나 참고
  // 이미지를 추가할 때마다 .scroll-pane 자체가 새 엘리먼트로 교체되어 스크롤이 맨 위로
  // 리셋된다. 다시 그리기 전 스크롤 위치를 기억해뒀다가 그대로 복원한다
  const prevScrollPane = app.querySelector('.scroll-pane');
  const prevScrollTop = prevScrollPane ? prevScrollPane.scrollTop : 0;

  app.innerHTML = '';
  if (state.view === 'record' && state.current) {
    app.appendChild(buildRecordScreen());
  } else if (state.view === 'compare' && state.compareSelection.length >= 2) {
    app.appendChild(buildCompareScreen());
  } else if (state.view === 'shared' && state.shared) {
    app.appendChild(buildSharedScreen());
  } else {
    app.appendChild(buildListScreen());
  }
  if (state.shareDialog) {
    app.appendChild(buildShareDialog());
  }

  const newScrollPane = app.querySelector('.scroll-pane');
  if (newScrollPane) {
    newScrollPane.scrollTop = prevScrollTop;
  }
}

// 업로드한 이미지를 캔버스로 리사이즈해 data URL로 반환한다 — 원본 그대로 저장하면
// localStorage 용량을 금방 잡아먹으므로 긴 변 기준 maxDim으로 줄인다 (SPEC.md §4 textureRef)
function resizeImageToDataUrl(file, maxDim, callback) {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        const scale = maxDim / Math.max(width, height);
        width = Math.round(width * scale);
        height = Math.round(height * scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      callback(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function updateTextureRefNote(refKey, value) {
  state.current.sketch.textureRef[refKey].note = value;
  scheduleSave();
}

function updateTextureRefImage(refKey, dataUrl) {
  state.current.sketch.textureRef[refKey].image = dataUrl;
  scheduleSave();
  render();
}

// 스커트/보디스/소매 텍스처 칩 아래에 붙는 참고 메모+이미지 한 칸. 스케치 렌더링에는
// 전혀 반영되지 않는 순수 참고용이다 (SPEC.md §4) — 웹에서 찾은 원단 사진을 개인 메모로만 남긴다
function buildTextureRefBlock(refKey) {
  const ref = state.current.sketch.textureRef[refKey];
  const wrap = document.createElement('div');
  wrap.className = 'texture-ref';

  const noteInput = document.createElement('input');
  noteInput.type = 'text';
  noteInput.placeholder = '참고 메모(선택) — 예: 이 느낌의 레이스';
  noteInput.value = ref.note || '';
  noteInput.addEventListener('input', (e) => updateTextureRefNote(refKey, e.target.value));
  wrap.appendChild(noteInput);

  const imageRow = document.createElement('div');
  imageRow.className = 'texture-ref-image-row';

  if (ref.image) {
    const img = document.createElement('img');
    img.src = ref.image;
    img.className = 'texture-ref-thumb';
    img.alt = '참고 이미지';
    imageRow.appendChild(img);

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'btn';
    removeBtn.textContent = '이미지 삭제';
    removeBtn.addEventListener('click', () => updateTextureRefImage(refKey, null));
    imageRow.appendChild(removeBtn);
  } else {
    const label = document.createElement('label');
    label.className = 'btn';
    label.textContent = '참고 이미지 추가';
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.style.display = 'none';
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) resizeImageToDataUrl(file, 400, (dataUrl) => updateTextureRefImage(refKey, dataUrl));
    });
    label.appendChild(fileInput);
    imageRow.appendChild(label);
  }

  wrap.appendChild(imageRow);
  return wrap;
}

// 칩 한 분류(실루엣/넥라인/소매/텍스처/허리라인/뒷모습/트레인) 공용 렌더러.
// thumbFn이 없으면 텍스트만 있는 칩(허리라인/뒷모습/트레인)으로 그린다
function buildChipSection(title, order, currentValue, labelMap, onSelect, thumbFn, customValue, onCustomInput) {
  const wrap = document.createElement('div');
  const heading = document.createElement('div');
  heading.className = 'section-title';
  heading.textContent = title;
  wrap.appendChild(heading);

  const row = document.createElement('div');
  row.className = 'chip-row';
  order.forEach((id) => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'chip' + (thumbFn ? '' : ' text-only') + (id === currentValue ? ' selected' : '');
    chip.setAttribute('aria-label', labelMap[id]);
    if (thumbFn) chip.appendChild(thumbFn(id));
    const label = document.createElement('span');
    label.className = 'chip-label';
    label.textContent = labelMap[id];
    chip.appendChild(label);
    chip.addEventListener('click', () => onSelect(id));
    row.appendChild(chip);
  });
  wrap.appendChild(row);

  if (currentValue === 'other') {
    const inputWrap = document.createElement('div');
    inputWrap.className = 'other-input-wrap';
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = '직접 입력';
    input.value = customValue || '';
    input.addEventListener('input', (e) => onCustomInput(e.target.value));
    inputWrap.appendChild(input);
    wrap.appendChild(inputWrap);
  }

  return wrap;
}

// 시각 파츠(실루엣/넥라인/소매)는 §3.5 크롭 규칙을 그대로 쓴다. 다른 카테고리의
// 현재 선택과 무관하게 고정된 기준값(sweetheart/aline/v, waist:natural, train:none)으로
// 그려서 그 칩 자체의 형태 차이만 보이게 한다
const VISUAL_CATEGORIES = [
  {
    key: 'silhouette', order: SILHOUETTE_CHIP_ORDER, title: '실루엣',
    thumb: (id) => buildFullDressSvg(id, 'sweetheart', 'none', 'satin', 'satin', 'satin', 'natural', 'none'),
  },
  {
    key: 'neckline', order: NECKLINE_CHIP_ORDER, title: '넥라인',
    thumb: (id) => {
      const svg = buildFullDressSvg('aline', id, 'none', 'satin', 'satin', 'satin', 'natural', 'none');
      svg.setAttribute('viewBox', '120 80 160 130');
      return svg;
    },
  },
  {
    key: 'sleeve', order: SLEEVE_CHIP_ORDER, title: '소매',
    thumb: (id) => {
      const svg = buildFullDressSvg('aline', 'v', id, 'satin', 'satin', 'satin', 'natural', 'none');
      svg.setAttribute('viewBox', '100 100 200 200');
      return svg;
    },
  },
];
const TEXTURE_CATEGORIES = [
  { key: 'skirtTexture', refKey: 'skirt', title: '스커트 텍스처' },
  { key: 'bodiceTexture', refKey: 'bodice', title: '보디스 텍스처' },
  { key: 'sleeveTexture', refKey: 'sleeve', title: '소매 텍스처' },
];
// 허리 라인/트레인은 실제 스케치에 강조선/자락으로 반영되고, 뒷모습은 정면 스케치로는
// 표현이 안 되는 항목이라 전용 미리보기를 따로 그린다 (셋 다 눌렀을 때 차이가 보이도록)
const ATTR_CATEGORIES = [
  {
    key: 'waist', order: WAIST_CHIP_ORDER, title: '허리 라인',
    thumb: (id) => {
      const svg = buildFullDressSvg('aline', 'sweetheart', 'none', 'satin', 'satin', 'satin', id, 'none');
      svg.setAttribute('viewBox', '60 150 280 200');
      return svg;
    },
  },
  {
    key: 'back', order: BACK_CHIP_ORDER, title: '뒷모습',
    thumb: (id) => buildBackViewSvg(id, 'satin'),
  },
  {
    key: 'train', order: TRAIN_CHIP_ORDER, title: '트레인',
    thumb: (id) => {
      const svg = buildFullDressSvg('aline', 'sweetheart', 'none', 'satin', 'satin', 'satin', 'natural', id);
      svg.setAttribute('viewBox', '10 480 380 220');
      return svg;
    },
  },
];

function buildSketchSections() {
  const wrap = document.createElement('div');
  const sketch = state.current.sketch;

  VISUAL_CATEGORIES.forEach(({ key, order, title, thumb }) => {
    wrap.appendChild(buildChipSection(
      title, order, sketch[key], LABEL.ko[key],
      (id) => updateSketchField(key, id), thumb,
      sketch.custom[key], (v) => updateCustomText(key, v),
    ));
  });

  // 텍스처 3종은 이미 참고 메모+이미지(textureRef)로 목록에 없는 원단을 자유롭게
  // 남길 수 있어서, "기타" 칩은 굳이 안 두기로 함(사용자 요청) — TEXTURE_ORDER 자체는
  // 인코딩 호환성 때문에 그대로 두고 칩 렌더링에서만 제외한다
  const TEXTURE_CHIP_ORDER = TEXTURE_ORDER.filter((id) => id !== 'other');
  TEXTURE_CATEGORIES.forEach(({ key, refKey, title }) => {
    wrap.appendChild(buildChipSection(
      title, TEXTURE_CHIP_ORDER, sketch[key], LABEL.ko.texture,
      (id) => updateSketchField(key, id), buildTextureSwatch,
      sketch.custom[key], (v) => updateCustomText(key, v),
    ));
    wrap.appendChild(buildTextureRefBlock(refKey));
  });

  ATTR_CATEGORIES.forEach(({ key, order, title, thumb }) => {
    wrap.appendChild(buildChipSection(
      title, order, sketch[key], LABEL.ko[key],
      (id) => updateSketchField(key, id), thumb,
      sketch.custom[key], (v) => updateCustomText(key, v),
    ));
  });

  return wrap;
}

// 매장에서는 대개 건너뛰는 항목이라 접어둔다 (SPEC.md §6.2)
function buildCollapsibleField(key, title, value, onInput) {
  const wrap = document.createElement('div');
  const header = document.createElement('div');
  header.className = 'collapsible-header';
  const arrow = state.uiCollapsed[key] ? '▸' : '▾';
  header.textContent = `${title} ${arrow}`;
  header.addEventListener('click', () => {
    state.uiCollapsed[key] = !state.uiCollapsed[key];
    render();
  });
  wrap.appendChild(header);

  if (!state.uiCollapsed[key]) {
    const textarea = document.createElement('textarea');
    textarea.value = value || '';
    textarea.addEventListener('input', (e) => onInput(e.target.value));
    wrap.appendChild(textarea);
  }
  return wrap;
}

function buildNotesSections() {
  const wrap = document.createElement('div');
  wrap.appendChild(buildCollapsibleField('memo', '메모', state.current.memo, (v) => updateCurrentField('memo', v)));
  return wrap;
}

// ── 목록 화면 ──────────────────────────────────────────────────────────────
function buildListScreen() {
  const wrap = document.createElement('div');
  wrap.className = 'list-screen';
  wrap.appendChild(buildListTopBar());

  if (state.store.fittings.length === 0) {
    wrap.appendChild(buildEmptyState());
    return wrap;
  }

  const note = document.createElement('p');
  note.className = 'backup-note';
  note.textContent = '투어 다녀온 날엔 아래 JSON 내보내기로 백업해두세요.';
  wrap.appendChild(note);

  wrap.appendChild(buildGroupedList());

}

// ── 비교하기 선택 모드 (SPEC.md §6.3) ──────────────────────────────────────
function enterCompareMode() {
  state.compareMode = true;
  state.compareSelection = [];
  render();
}

function exitCompareMode() {
  state.compareMode = false;
  state.compareSelection = [];
  render();
}

function toggleCompareSelect(id) {
  const idx = state.compareSelection.indexOf(id);
  if (idx >= 0) {
    state.compareSelection.splice(idx, 1);
  } else if (state.compareSelection.length < 3) {
    state.compareSelection.push(id);
  }
  render();
}

function openCompareScreen() {
  if (state.compareSelection.length < 2) return;
  state.view = 'compare';
  render();
}

function backToListFromCompare() {
  state.view = 'list';
  state.compareMode = false;
  state.compareSelection = [];
  render();
}

function buildEmptyState() {
  const wrap = document.createElement('div');
  wrap.className = 'empty-state';
  const p1 = document.createElement('p');
  p1.textContent = '아직 기록한 드레스가 없어요.';
  const p2 = document.createElement('p');
  p2.textContent = '위의 "+ 새 기록"으로 첫 드레스를 기록해보세요.';
  wrap.appendChild(p1);
  wrap.appendChild(p2);
  return wrap;
}

function groupByShop(fittings) {
  const groups = [];
  const index = {};
  fittings.forEach((f) => {
    const key = f.shopName || '(매장명 없음)';
    if (!(key in index)) {
      index[key] = groups.length;
      groups.push({ shopName: key, items: [] });
    }
    groups[index[key]].items.push(f);
  });
  return groups;
}

function buildGroupedList() {
  const wrap = document.createElement('div');
  groupByShop(state.store.fittings).forEach((group) => {
    const title = document.createElement('div');
    title.className = 'shop-group-title';
    title.textContent = group.shopName;
    wrap.appendChild(title);
    group.items.forEach((fitting) => wrap.appendChild(buildFittingItem(fitting)));
  });
  return wrap;
}

function buildFittingItem(fitting) {
  const item = document.createElement('div');
  const isSelected = state.compareSelection.includes(fitting.id);
  item.className = 'fitting-item' + (isSelected ? ' selected-for-compare' : '');
  item.appendChild(buildPreviewSvg(fitting.sketch));

  const meta = document.createElement('div');
  meta.className = 'fitting-meta';
  const name = document.createElement('div');
  name.className = 'name';
  name.textContent = fitting.dressName || '(이름 없음)';
  meta.appendChild(name);
  const stars = document.createElement('div');
  stars.className = 'stars';
  stars.textContent = fitting.rating ? '★'.repeat(fitting.rating) : '';
  meta.appendChild(stars);
  item.appendChild(meta);

  if (state.compareMode) {
    const badge = document.createElement('div');
    badge.className = 'compare-badge';
    badge.textContent = isSelected ? '✓' : '';
    item.appendChild(badge);
    item.addEventListener('click', () => toggleCompareSelect(fitting.id));
  } else if (state.deleteMenuId === fitting.id) {
    item.appendChild(buildDeleteMenu(fitting.id));
  } else {
    attachLongPress(item, () => {
      state.deleteMenuId = fitting.id;
      render();
    });
    item.addEventListener('click', () => openFitting(fitting.id));
  }
  return item;
}

// 스와이프 삭제는 오작동 위험이 있어 금지 — 길게 눌러야 삭제 메뉴가 뜬다 (SPEC.md §6.3)
function attachLongPress(el, onLongPress) {
  let timer = null;
  el.addEventListener('pointerdown', () => { timer = setTimeout(onLongPress, 550); });
  el.addEventListener('pointerup', () => clearTimeout(timer));
  el.addEventListener('pointerleave', () => clearTimeout(timer));
  el.addEventListener('pointercancel', () => clearTimeout(timer));
}

function buildDeleteMenu(id) {
  const menu = document.createElement('div');
  menu.className = 'delete-menu';
  const del = document.createElement('button');
  del.type = 'button';
  del.className = 'btn';
  del.textContent = '삭제';
  del.addEventListener('click', (e) => { e.stopPropagation(); deleteFitting(id); });
  const cancel = document.createElement('button');
  cancel.type = 'button';
  cancel.className = 'btn';
  cancel.textContent = '취소';
  cancel.addEventListener('click', (e) => {
    e.stopPropagation();
    state.deleteMenuId = null;
    render();
  });
  menu.appendChild(del);
  menu.appendChild(cancel);
  return menu;
}

// ── JSON 백업 (SPEC.md §5.3) ───────────────────────────────────────────────
function buildBackupRow() {
  const wrap = document.createElement('div');
  wrap.className = 'backup-row';

  const exportBtn = document.createElement('button');
  exportBtn.type = 'button';
  exportBtn.className = 'btn';
  exportBtn.textContent = 'JSON 내보내기';
  exportBtn.addEventListener('click', exportJson);
  wrap.appendChild(exportBtn);

  const importLabel = document.createElement('label');
  importLabel.className = 'btn';
  importLabel.textContent = 'JSON 가져오기';
  const importInput = document.createElement('input');
  importInput.type = 'file';
  importInput.accept = 'application/json';
  importInput.style.display = 'none';
  importInput.addEventListener('change', (e) => importJson(e.target.files[0]));
  importLabel.appendChild(importInput);
  wrap.appendChild(importLabel);

  return wrap;
}

function exportJson() {
  const blob = new Blob([JSON.stringify(state.store, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `dress-tour-${todayStr().replace(/-/g, '')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// 기존 데이터와 병합하되 id 중복은 건너뛴다 (SPEC.md §5.3)
function importJson(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const incoming = JSON.parse(reader.result);
      const existingIds = new Set(state.store.fittings.map((f) => f.id));
      const merged = (incoming.fittings || []).filter((f) => !existingIds.has(f.id));
      merged.forEach((f) => ensureTextureRef(f.sketch));
      state.store.fittings = state.store.fittings.concat(merged);
      persistStore();
      render();
    } catch (e) {
      alert('JSON 파일을 읽을 수 없습니다.');
    }
  };
  reader.readAsText(file);
}

const COMPARE_ROWS = [
